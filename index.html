
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>PRODUCTION XANO SCANNER</title>
  <style>
    * { margin:0; padding:0; -webkit-box-sizing:border-box; box-sizing:border-box; }
    body {
      background: #1b1b1b;
      display: -webkit-box;
      display: -webkit-flex;
      display: flex;
      -webkit-box-pack: center;
      -webkit-justify-content: center;
      justify-content: center;
      -webkit-box-align: center;
      -webkit-align-items: center;
      align-items: center;
      min-height: 100vh;
      font-family: "Courier New", Courier, monospace;
      color: #ddd;
    }
    .device {
      width: 100%;
      max-width: 400px;
      background: #222;
      border: 3px solid #999;
      display: -webkit-box;
      display: -webkit-flex;
      display: flex;
      -webkit-box-orient: vertical;
      -webkit-box-direction: normal;
      -webkit-flex-direction: column;
      flex-direction: column;
      -webkit-border-radius: 12px;
      border-radius: 12px;
      overflow: hidden;
      -webkit-box-shadow: 0px 0px 10px rgba(0,0,0,0.5);
      box-shadow: 0px 0px 10px rgba(0,0,0,0.5);
    }
    .header {
      background: #444;
      color: white;
      height: 60px;
      display: -webkit-box;
      display: -webkit-flex;
      display: flex;
      -webkit-box-align: center;
      -webkit-align-items: center;
      align-items: center;
      -webkit-box-pack: justify;
      -webkit-justify-content: space-between;
      justify-content: space-between;
      padding: 0 12px;
      font-size: 18px;
      font-weight: bold;
      border-bottom: 3px solid #777;
    }
    .time-display {
      background: #222;
      padding: 4px 8px;
      font-size: 18px;
      font-family: monospace;
      -webkit-border-radius: 8px;
      border-radius: 8px;
      color: #f0f0f0;
    }
    .scan-row {
      display: -webkit-box;
      display: -webkit-flex;
      display: flex;
      -webkit-box-align: center;
      -webkit-align-items: center;
      align-items: center;
      padding: 12px 16px;
      background: #333;
      border-bottom: 2px solid #666;
    }
    .submit-btn {
      background: #777;
      color: white;
      border: none;
      width: 70px;
      height: 45px;
      -webkit-border-radius: 5px;
      border-radius: 5px;
      font-size: 18px;
      cursor: pointer;
      -webkit-transition: background 0.2s;
      transition: background 0.2s;
    }
    .submit-btn:active {
      background: #555;
    }
    .grid-container {
      display: -webkit-box;
      display: -webkit-flex;
      display: flex;
      gap: 5px;
      -webkit-box-pack: end;
      -webkit-justify-content: flex-end;
      justify-content: flex-end;
      margin-left: 12px;
    }
    /* gap not supported in old Android, use margin instead */
    .grid-container .cell {
      margin-left: 4px;
    }
    .grid-container .cell:first-child {
      margin-left: 0;
    }
    .cell {
      width: 40px;
      height: 50px;
      background: #333;
      border: 2px solid #777;
      -webkit-border-radius: 6px;
      border-radius: 6px;
      color: #f0f0f0;
      text-align: center;
      font-size: 22px;
      text-transform: uppercase;
      outline: none;
    }
    .cell:focus {
      border: 3px solid #bbb;
      background: #444;
    }
    .content {
      padding: 16px;
      background: #444;
    }
    .field {
      margin-bottom: 15px;
    }
    .field label {
      display: block;
      font-size: 14px;
      font-weight: bold;
      color: #bbb;
      margin-bottom: 4px;
    }
    .field input,
    .field select {
      width: 100%;
      padding: 12px;
      border: 2px solid #666;
      -webkit-border-radius: 5px;
      border-radius: 5px;
      font-size: 14px;
      background: #333;
      color: #f0f0f0;
      -webkit-appearance: none;
      appearance: none;
    }
    .field input[readonly] {
      background: #555;
      font-weight: bold;
    }
    .gps-status {
      font-size: 12px;
      color: #aaa;
      margin-top: 4px;
    }
    .status-message {
      padding: 12px;
      background: #444;
      border: 2px solid #777;
      -webkit-border-radius: 5px;
      border-radius: 5px;
      font-size: 14px;
      text-align: center;
      margin-top: 10px;
    }
    .popup {
      position: fixed;
      top: 50%;
      left: 50%;
      -webkit-transform: translate(-50%, -50%);
      transform: translate(-50%, -50%);
      width: 180px;
      background: #444;
      border: 3px solid #777;
      -webkit-border-radius: 12px;
      border-radius: 12px;
      text-align: center;
      padding: 16px;
      display: none;
      z-index: 999;
    }
    .popup .circle {
      width: 50px;
      height: 50px;
      background: #28a745;
      -webkit-border-radius: 50%;
      border-radius: 50%;
      margin: 0 auto 10px;
      color: white;
      font-size: 30px;
      line-height: 50px;
    }
    .result-section {
      border: 2px solid #777;
      -webkit-border-radius: 5px;
      border-radius: 5px;
      background: #555;
      margin-top: 16px;
      overflow: hidden;
    }
    .result-header {
      display: -webkit-box;
      display: -webkit-flex;
      display: flex;
      background: #777;
      border-bottom: 2px solid #444;
    }
    .result-header div {
      padding: 8px;
      font-weight: bold;
    }
    .result-row {
      display: -webkit-box;
      display: -webkit-flex;
      display: flex;
      border-bottom: 1px solid #777;
    }
    .result-row div {
      padding: 8px;
      font-size: 12px;
    }
    #empty-message {
      padding: 12px;
      color: #999;
      font-style: italic;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="device">
    <div class="header">
      <span>SCAN BARCODE</span>
      <span class="time-display" id="currentTime"></span>
    </div>
    
    <div class="scan-row">
      <button class="submit-btn" id="submitButton">OK</button>
      <div class="grid-container">
        <input class="cell" maxlength="1" id="cell1" type="text" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false">
        <input class="cell" maxlength="1" id="cell2" type="text" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false">
        <input class="cell" maxlength="1" id="cell3" type="text" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false">
        <input class="cell" maxlength="1" id="cell4" type="text" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false">
        <input class="cell" maxlength="1" id="cell5" type="text" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false">
        <input class="cell" maxlength="1" id="cell6" type="text" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false">
      </div>
    </div>
    
    <div class="content">
      <div class="field">
        <label>Label ID</label>
        <input type="text" id="labelId" readonly placeholder="---">
      </div>
      <div class="field">
        <label>Barcode Type</label>
        <input type="text" id="barcodeType" value="XANO-PROD" readonly>
      </div>
      <div class="field">
        <label>Status</label>
        <select id="statusSelect">
          <option value="Received">Received</option>
          <option value="Picked Up">Picked Up</option>
          <option value="Depart">Depart</option>
          <option value="Arrival">Arrival</option>
        </select>
      </div>
      <div class="field">
        <label>Location (Auto GPS)</label>
        <input type="text" id="locationField" readonly placeholder="Detecting location...">
        <div class="gps-status" id="gpsStatus">Requesting GPS...</div>
      </div>
      <div class="field">
        <label>ETA</label>
        <input type="date" id="etaField">
      </div>
      
      <div class="result-section">
        <div class="result-header">
          <div>#</div>
          <div>SCAN RECORD</div>
        </div>
        <div id="tableBody"></div>
        <div id="empty-message">No scans yet</div>
      </div>
      
      <div class="status-message" id="messageBox">Ready</div>
    </div>
    
    <div class="popup" id="successPopup">
      <div class="circle">&#10003;</div>
      <p>SAVED TO XANO</p>
      <div id="popupTime"></div>
    </div>
  </div>

  <script>
    // ===== CONFIGURATION =====
    var XANO_API_URL = 'https://x8ki-letl-twmt.n7.xano.io/api:WGx5FQAG';
    var XANO_API_KEY = '';

    // ===== SAFE LOCALSTORAGE =====
    var safeStorage = {
      get: function(key) {
        try { return localStorage.getItem(key); } catch(e) { return null; }
      },
      set: function(key, val) {
        try { localStorage.setItem(key, val); } catch(e) {}
      }
    };

    // ===== TIME DISPLAY =====
    function updateTime() {
      var timeEl = document.getElementById('currentTime');
      if (!timeEl) return;
      var now = new Date();
      var h = String(now.getHours()).length < 2 ? '0' + now.getHours() : '' + now.getHours();
      var m = now.getMinutes() < 10 ? '0' + now.getMinutes() : '' + now.getMinutes();
      var s = now.getSeconds() < 10 ? '0' + now.getSeconds() : '' + now.getSeconds();
      timeEl.innerHTML = h + ':' + m + ':' + s;
    }
    updateTime();
    setInterval(updateTime, 1000);

    // ===== BARCODE INPUT HANDLING =====
    var cells = [
      document.getElementById('cell1'),
      document.getElementById('cell2'),
      document.getElementById('cell3'),
      document.getElementById('cell4'),
      document.getElementById('cell5'),
      document.getElementById('cell6')
    ];

    function setupCell(cell, index) {
      cell.addEventListener('input', function() {
        this.value = this.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
        if (this.value.length === 1 && index < cells.length - 1) {
          cells[index + 1].focus();
        }
        updateLabelId();
      });
      cell.addEventListener('keydown', function(e) {
        var key = e.key || e.keyCode;
        if ((key === 'Backspace' || key === 8) && this.value.length === 0 && index > 0) {
          cells[index - 1].focus();
        }
      });
    }

    for (var i = 0; i < cells.length; i++) {
      setupCell(cells[i], i);
    }

    function updateLabelId() {
      var barcode = '';
      for (var j = 0; j < cells.length; j++) {
        barcode += cells[j].value;
      }
      document.getElementById('labelId').value = barcode || '---';
    }

    // ===== GPS =====
    function getGPS() {
      var locField = document.getElementById('locationField');
      var gpsStatus = document.getElementById('gpsStatus');

      if (!navigator.geolocation) {
        locField.value = 'GPS_NOT_SUPPORTED';
        gpsStatus.innerHTML = 'GPS not supported';
        return;
      }

      gpsStatus.innerHTML = 'Requesting GPS...';

      navigator.geolocation.getCurrentPosition(
        function(position) {
          var lat = position.coords.latitude.toFixed(6);
          var lng = position.coords.longitude.toFixed(6);
          var acc = Math.round(position.coords.accuracy);
          locField.value = lat + ', ' + lng;
          gpsStatus.innerHTML = 'GPS OK (+-' + acc + 'm)';
          safeStorage.set('last_gps', lat + ',' + lng);
        },
        function(error) {
          gpsStatus.innerHTML = 'GPS failed, trying IP...';
          getIPLocation();
        },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
      );
    }

    function getIPLocation() {
      var locField = document.getElementById('locationField');
      var gpsStatus = document.getElementById('gpsStatus');

      var xhr = new XMLHttpRequest();
      xhr.open('GET', 'https://ipapi.co/json/', true);
      xhr.timeout = 8000;
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
          if (xhr.status === 200) {
            try {
              var data = JSON.parse(xhr.responseText);
              if (data.latitude && data.longitude) {
                locField.value = data.latitude.toFixed(4) + ', ' + data.longitude.toFixed(4);
                gpsStatus.innerHTML = 'Approx location (IP)';
                safeStorage.set('last_gps', data.latitude + ',' + data.longitude);
              } else {
                useLastGPS();
              }
            } catch(e) {
              useLastGPS();
            }
          } else {
            useLastGPS();
          }
        }
      };
      xhr.onerror = function() { useLastGPS(); };
      xhr.ontimeout = function() { useLastGPS(); };
      try { xhr.send(); } catch(e) { useLastGPS(); }
    }

    function useLastGPS() {
      var locField = document.getElementById('locationField');
      var gpsStatus = document.getElementById('gpsStatus');
      var lastGPS = safeStorage.get('last_gps');
      if (lastGPS) {
        locField.value = lastGPS.replace(',', ', ');
        gpsStatus.innerHTML = 'Last known location';
      } else {
        locField.value = 'LOCATION_UNAVAILABLE';
        gpsStatus.innerHTML = 'Could not get location';
      }
    }

    // ===== DEFAULT DATE =====
    function setDefaultDate() {
      var etaField = document.getElementById('etaField');
      var today = new Date();
      var yyyy = today.getFullYear();
      var mm = today.getMonth() + 1 < 10 ? '0' + (today.getMonth() + 1) : '' + (today.getMonth() + 1);
      var dd = today.getDate() < 10 ? '0' + today.getDate() : '' + today.getDate();
      etaField.value = yyyy + '-' + mm + '-' + dd;
    }
    setDefaultDate();

    // ===== SCAN RECORDS =====
    var scanRecords = [];
    try {
      var stored = safeStorage.get('xano_scans');
      if (stored) scanRecords = JSON.parse(stored);
    } catch(e) { scanRecords = []; }

    function updateTable() {
      var tableBody = document.getElementById('tableBody');
      var emptyMessage = document.getElementById('empty-message');
      if (scanRecords.length === 0) {
        tableBody.innerHTML = '';
        emptyMessage.style.display = 'block';
        return;
      }
      emptyMessage.style.display = 'none';
      var html = '';
      var limit = scanRecords.length < 10 ? scanRecords.length : 10;
      for (var i = 0; i < limit; i++) {
        var rec = scanRecords[i];
        var d = new Date(rec.timestamp);
        var tstr = d.getHours() + ':' + (d.getMinutes() < 10 ? '0' : '') + d.getMinutes() + ':' + (d.getSeconds() < 10 ? '0' : '') + d.getSeconds();
        html += '<div class="result-row"><div>' + (i + 1) + '</div><div>' + rec.labelId + ' | ' + rec.status + ' | ' + tstr + '</div></div>';
      }
      tableBody.innerHTML = html;
    }
    updateTable();

    function showPopup() {
      var popup = document.getElementById('successPopup');
      var popupTime = document.getElementById('popupTime');
      var now = new Date();
      popupTime.innerHTML = now.getHours() + ':' + (now.getMinutes() < 10 ? '0' : '') + now.getMinutes();
      popup.style.display = 'block';
      setTimeout(function() { popup.style.display = 'none'; }, 1500);
    }

    // ===== XANO API (XMLHttpRequest - ES5 compatible) =====
    function saveToXano(data, onSuccess, onError) {
      var xhr = new XMLHttpRequest();
      xhr.open('POST', XANO_API_URL, true);
      xhr.setRequestHeader('Content-Type', 'application/json');
      xhr.setRequestHeader('Accept', 'application/json');
      if (XANO_API_KEY) {
        xhr.setRequestHeader('Authorization', 'Bearer ' + XANO_API_KEY);
      }
      xhr.timeout = 10000;
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
          if (xhr.status >= 200 && xhr.status < 300) {
            try {
              var result = JSON.parse(xhr.responseText);
              onSuccess(result);
            } catch(e) {
              onSuccess({});
            }
          } else {
            onError('XANO error ' + xhr.status + ': ' + xhr.responseText.substring(0, 50));
          }
        }
      };
      xhr.onerror = function() { onError('Network error'); };
      xhr.ontimeout = function() { onError('XANO timeout after 10s'); };
      try {
        xhr.send(JSON.stringify(data));
      } catch(e) {
        onError('Send failed: ' + e.message);
      }
    }

    // ===== SUBMIT HANDLER =====
    document.getElementById('submitButton').addEventListener('click', function() {
      var labelId = document.getElementById('labelId').value;
      var status = document.getElementById('statusSelect').value;
      var location = document.getElementById('locationField').value;
      var eta = document.getElementById('etaField').value;
      var messageBox = document.getElementById('messageBox');
      var submitBtn = document.getElementById('submitButton');

      if (labelId === '---' || labelId === '') {
        messageBox.innerHTML = 'BARCODE REQUIRED';
        messageBox.style.background = '#660000';
        setTimeout(function() {
          messageBox.innerHTML = 'Ready';
          messageBox.style.background = '#444';
        }, 2000);
        return;
      }

      var now = new Date();
      var isoTime = now.toISOString ? now.toISOString() : now.getFullYear() + '-' + (now.getMonth()+1) + '-' + now.getDate() + 'T' + now.getHours() + ':' + now.getMinutes() + ':' + now.getSeconds() + 'Z';

      var scanData = {
        barcode: labelId,
        status: status,
        location: location || 'NO_LOCATION',
        eta: eta,
        timestamp: isoTime,
        device: 'web-prod',
        type: document.getElementById('barcodeType').value
      };

      submitBtn.disabled = true;
      submitBtn.style.opacity = '0.5';
      messageBox.innerHTML = 'Sending to XANO...';
      messageBox.style.background = '#886622';

      saveToXano(
        scanData,
        function(result) {
          var localRecord = {
            labelId: labelId,
            status: status,
            location: location,
            eta: eta,
            timestamp: isoTime,
            xanoId: result.id || 'pending'
          };

          scanRecords.unshift(localRecord);
          if (scanRecords.length > 50) scanRecords.pop();
          try { safeStorage.set('xano_scans', JSON.stringify(scanRecords)); } catch(e) {}

          updateTable();
          showPopup();

          messageBox.innerHTML = 'XANO OK: ' + labelId;
          messageBox.style.background = '#226622';

          for (var k = 0; k < cells.length; k++) { cells[k].value = ''; }
          document.getElementById('labelId').value = '---';
          cells[0].focus();

          submitBtn.disabled = false;
          submitBtn.style.opacity = '1';

          setTimeout(function() {
            messageBox.innerHTML = 'Ready';
            messageBox.style.background = '#444';
          }, 3000);
        },
        function(errMsg) {
          messageBox.innerHTML = 'XANO FAIL: ' + errMsg.substring(0, 30);
          messageBox.style.background = '#660000';

          submitBtn.disabled = false;
          submitBtn.style.opacity = '1';

          setTimeout(function() {
            messageBox.innerHTML = 'Ready';
            messageBox.style.background = '#444';
          }, 3000);
        }
      );
    });

    // ===== SCANNER SUPPORT (physical barcode scanner) =====
    var scanBuffer = '';
    var scanTimer = null;

    document.addEventListener('keypress', function(e) {
      var target = e.target || e.srcElement;
      if (target.tagName !== 'INPUT') {
        var key = e.key || String.fromCharCode(e.charCode || e.keyCode);
        if (key && key.length === 1 && /[A-Za-z0-9]/i.test(key)) {
          if (scanTimer) clearTimeout(scanTimer);
          scanBuffer += key.toUpperCase();
          if (scanBuffer.length >= 6) {
            for (var i = 0; i < 6; i++) {
              if (cells[i]) cells[i].value = scanBuffer[i] || '';
            }
            updateLabelId();
            cells[5].focus();
            scanBuffer = '';
            setTimeout(function() {
              document.getElementById('submitButton').click();
            }, 100);
          }
          scanTimer = setTimeout(function() { scanBuffer = ''; }, 200);
        }
      }
    });

    // ===== ENTER KEY SHORTCUT =====
    document.addEventListener('keydown', function(e) {
      var key = e.key || e.keyCode;
      var target = e.target || e.srcElement;
      if ((key === 'Enter' || key === 13) && target.tagName !== 'BUTTON') {
        if (e.preventDefault) e.preventDefault();
        document.getElementById('submitButton').click();
      }
    });

    // ===== INIT =====
    cells[0].focus();
    getGPS();
    setInterval(getGPS, 300000);
  </script>
</body>
</html>
