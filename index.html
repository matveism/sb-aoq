<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Barcode Scanner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
    }
    .device {
      width: 340px;
      height: 600px;
      background: #B0C8E2;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .header {
      background: #15569B;
      color: white;
      height: 45px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 15px;
      font-size: 18px;
    }
    #deviceTime {
      background: #1e3a6b;
      padding: 5px 12px;
      border-radius: 20px;
      font-family: monospace;
      font-size: 16px;
    }
    .scan-row {
      display: flex;
      align-items: center;
      padding: 15px;
      gap: 10px;
      height: 80px;
    }
    .submit-btn {
      background: #28a745;
      color: white;
      border: none;
      width: 75px;
      height: 50px;
      border-radius: 6px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }
    .grid {
      display: flex;
      gap: 4px;
      flex: 1;
      justify-content: flex-end;
    }
    .cell {
      width: 35px;
      height: 50px;
      background: white;
      border: 2px solid #666;
      border-radius: 6px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      text-transform: uppercase;
      outline: none;
    }
    .cell:focus {
      border-color: #FCC57A;
      background: #FB9809;
    }
    .content {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
    }
    .status-box {
      background: #96BEEE;
      border: 2px solid #79A4D2;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 15px;
    }
    .row {
      margin-bottom: 12px;
    }
    .row label {
      display: block;
      font-size: 13px;
      font-weight: bold;
      color: #15569B;
      margin-bottom: 3px;
    }
    .row input, .row select {
      width: 100%;
      padding: 10px;
      border: 1px solid #79A4D2;
      border-radius: 6px;
      font-size: 15px;
      height: 45px;
    }
    .row input[readonly] {
      background: #e2e8d3;
    }
    .result-box {
      border: 2px solid #79A4D2;
      border-radius: 8px;
      overflow: hidden;
    }
    .result-header {
      display: flex;
      background: #79A4D2;
      color: white;
      font-weight: bold;
    }
    .result-header div:first-child {
      width: 45px;
      padding: 10px;
      text-align: center;
      border-right: 2px solid #15569B;
    }
    .result-header div:last-child {
      flex: 1;
      padding: 10px;
    }
    #resultTable div {
      display: flex;
      border-bottom: 1px solid #79A4D2;
    }
    #resultTable div span:first-child {
      width: 45px;
      padding: 8px;
      text-align: center;
      border-right: 1px solid #79A4D2;
    }
    #resultTable div span:last-child {
      flex: 1;
      padding: 8px;
    }
    #statusMsg {
      margin-top: 10px;
      padding: 8px;
      text-align: center;
      background: rgba(255,255,255,0.4);
      border-radius: 6px;
      min-height: 40px;
    }
  </style>
</head>
<body>
<div class="device">
  <div class="header">
    <span>SCAN BARCODE</span>
    <span id="deviceTime"></span>
  </div>

  <div class="scan-row">
    <button class="submit-btn" id="submitBtn">SUBMIT</button>
    <div class="grid">
      <input class="cell" maxlength="1" id="c1">
      <input class="cell" maxlength="1" id="c2">
      <input class="cell" maxlength="1" id="c3">
      <input class="cell" maxlength="1" id="c4">
      <input class="cell" maxlength="1" id="c5">
      <input class="cell" maxlength="1" id="c6">
    </div>
  </div>

  <div class="content">
    <div class="status-box">
      <div class="row">
        <label>Label ID</label>
        <input type="text" id="decoded" readonly>
      </div>
      <div class="row">
        <label>Type</label>
        <input type="text" value="manual" readonly>
      </div>
      <div class="row">
        <label>Status</label>
        <select id="status">
          <option>📥 Received</option>
          <option>📬 Picked Up</option>
          <option>🚚 Depart</option>
          <option>📍 Arrival</option>
        </select>
      </div>
      <div class="row">
        <label>Location</label>
        <input type="text" id="location" placeholder="City, State">
      </div>
      <div class="row">
        <label>ETA</label>
        <input type="text" id="eta" placeholder="2025-03-15">
      </div>
    </div>

    <div class="result-box">
      <div class="result-header">
        <div>#</div>
        <div>LABEL ID</div>
      </div>
      <div id="resultTable"></div>
      <div id="emptyRow" style="display: flex; padding: 8px; color: #666; font-style: italic;">No scans yet</div>
    </div>
    <div id="statusMsg"></div>
  </div>

  <div id="popup" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; border: 4px solid #28a745; border-radius: 30px; padding: 20px; text-align: center; display: none;">
    <div style="width: 50px; height: 50px; background: #28a745; border-radius: 50%; margin: 0 auto 10px; color: white; font-size: 30px; line-height: 50px;">✓</div>
    <p style="font-weight: bold; color: #1e7e34;">SAVED OK</p>
    <p id="popupTime" style="font-size: 12px; color: #666;"></p>
  </div>
</div>

<script>
// SIMPLE TIME DISPLAY
function updateTime() {
  let d = new Date();
  let h = d.getHours().toString().padStart(2,'0');
  let m = d.getMinutes().toString().padStart(2,'0');
  let s = d.getSeconds().toString().padStart(2,'0');
  document.getElementById('deviceTime').innerText = h + ':' + m + ':' + s;
}
updateTime();
setInterval(updateTime, 1000);

// CELLS SETUP
let cells = [
  document.getElementById('c1'),
  document.getElementById('c2'),
  document.getElementById('c3'),
  document.getElementById('c4'),
  document.getElementById('c5'),
  document.getElementById('c6')
];

// Make cells work
for (let i = 0; i < cells.length; i++) {
  cells[i].addEventListener('input', function(e) {
    let val = this.value.toUpperCase();
    // Only allow A-J
    if (val && !'ABCDEFGHIJ'.includes(val)) {
      this.value = '';
      return;
    }
    this.value = val;
    // Auto move to next cell
    if (val.length === 1 && i < cells.length - 1) {
      cells[i + 1].focus();
    }
    updateLabelId();
  });

  cells[i].addEventListener('keydown', function(e) {
    if (e.key === 'Backspace' && this.value === '' && i > 0) {
      cells[i - 1].focus();
    }
  });
}

// Convert letters to numbers
function decode(str) {
  let map = {A:'1',B:'2',C:'3',D:'4',E:'5',F:'6',G:'7',H:'8',I:'9',J:'0'};
  let result = '';
  for (let c of str) {
    if (!map[c]) return null;
    result += map[c];
  }
  return result;
}

function updateLabelId() {
  let code = cells.map(c => c.value).join('');
  if (code.length === 6) {
    let decoded = decode(code);
    document.getElementById('decoded').value = decoded || 'INVALID';
  } else {
    document.getElementById('decoded').value = '';
  }
}

// Result table
let scanCount = 0;
function addRow(val) {
  scanCount++;
  document.getElementById('emptyRow').style.display = 'none';
  let div = document.createElement('div');
  div.style.display = 'flex';
  div.style.borderBottom = '1px solid #79A4D2';
  div.innerHTML = '<span style="width:45px; padding:8px; text-align:center; border-right:1px solid #79A4D2;">' + scanCount + '</span>' +
                  '<span style="flex:1; padding:8px;">' + val + '</span>';
  document.getElementById('resultTable').appendChild(div);
}

function showPopup() {
  let p = document.getElementById('popup');
  let now = new Date();
  document.getElementById('popupTime').innerText = now.toLocaleDateString() + ' ' + now.toLocaleTimeString();
  p.style.display = 'block';
  setTimeout(() => p.style.display = 'none', 2000);
}

function setStatus(msg, isError) {
  let box = document.getElementById('statusMsg');
  box.style.color = isError ? '#b52e2e' : '#1e6f3f';
  box.innerText = msg;
}

// Submit function
function submitBarcode() {
  let labelId = document.getElementById('decoded').value;
  if (!labelId || labelId === 'INVALID') {
    setStatus('❗ Use A-J only', true);
    return;
  }

  let code = cells.map(c => c.value).join('');
  
  // Simulate API call
  showPopup();
  setStatus('✓ Saved', false);
  addRow(code);
  
  // Clear cells
  cells.forEach(c => { c.value = ''; });
  document.getElementById('decoded').value = '';
  cells[0].focus();
}

// Event listeners
document.getElementById('submitBtn').addEventListener('click', (e) => {
  e.preventDefault();
  submitBarcode();
});

cells[0].focus();
</script>
</body>
</html>
