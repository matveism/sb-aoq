<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN">
<html>
<head>
<title>Barcode Scanner</title>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
    background: #000;
    color: #fff;
    font-family: Arial;
    margin: 0;
    padding: 10px;
}
.container {
    max-width: 600px;
    margin: 0 auto;
}
.header {
    background: #2c3e6d;
    padding: 15px;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
    margin-bottom: 15px;
}
.btn {
    background: #3a3f4a;
    border: 2px solid #6a6f7a;
    color: white;
    font-size: 28px;
    padding: 15px;
    text-align: center;
    margin: 10px 0;
    cursor: pointer;
    width: 100%;
}
.grid {
    margin: 15px 0;
    text-align: center;
}
.grid input {
    width: 60px;
    height: 60px;
    font-size: 36px;
    text-align: center;
    background: #d47b2e;
    border: 2px solid #a85e1f;
    margin: 2px;
    text-transform: uppercase;
}
select {
    width: 100%;
    padding: 15px;
    font-size: 20px;
    background: #1b1f2a;
    color: white;
    border: 2px solid #6a8abe;
    margin: 10px 0;
}
select:disabled {
    opacity: 0.5;
}
.datetime {
    background: #1b1f2a;
    border: 2px solid #4a6a9e;
    color: #0f0;
    font-size: 20px;
    padding: 12px;
    text-align: center;
    margin: 10px 0;
    font-family: monospace;
}
table {
    width: 100%;
    border-collapse: collapse;
    margin: 10px 0;
}
th {
    background: #2c3e6d;
    padding: 10px;
    color: white;
    border: 1px solid #4a6a9e;
}
td {
    padding: 8px;
    border: 1px solid #4a6a9e;
    text-align: center;
}
#scannedList {
    background: rgba(74,106,158,0.2);
    max-height: 300px;
    overflow-y: auto;
}
#scanner {
    display: none;
    margin: 10px 0;
}
video {
    width: 100%;
    height: auto;
    background: #000;
}
#message {
    padding: 10px;
    margin: 10px 0;
    text-align: center;
    display: none;
}
.success {
    background: #004d00;
    border: 2px solid #0f0;
    color: #0f0;
}
.error {
    background: #4d0000;
    border: 2px solid #f00;
    color: #f00;
}
.warning {
    background: #4d4d00;
    border: 2px solid #ff0;
    color: #ff0;
}
.manual-section {
    background: #2a2f3a;
    border: 2px solid #6a8abe;
    padding: 15px;
    margin: 10px 0;
}
.manual-input {
    width: 100%;
    padding: 15px;
    font-size: 24px;
    background: #1b1f2a;
    color: #0f0;
    border: 2px solid #6a8abe;
    text-align: center;
    box-sizing: border-box;
}
</style>
</head>
<body>

<div class="container">
    <div class="header">
        SCAN BARCODE <span id="headerTime">12:00:00</span>
    </div>

    <!-- SCAN BUTTON -->
    <div class="btn" id="scanButton">START SCANNER</div>

    <!-- CAMERA SECTION -->
    <div id="scanner">
        <video id="video" autoplay></video>
        <div style="text-align:center; padding:10px;">
            <button onclick="stopScanner()" style="padding:10px 20px; margin:5px;">STOP</button>
            <button onclick="tryBackCamera()" style="padding:10px 20px; margin:5px;">TRY BACK CAMERA</button>
            <button onclick="tryFrontCamera()" style="padding:10px 20px; margin:5px;">TRY FRONT CAMERA</button>
        </div>
    </div>

    <!-- 6 DIGIT GRID -->
    <div class="grid" id="barcodeGrid">
        <input type="text" maxlength="1" id="c1" class="digit">
        <input type="text" maxlength="1" id="c2" class="digit">
        <input type="text" maxlength="1" id="c3" class="digit">
        <input type="text" maxlength="1" id="c4" class="digit">
        <input type="text" maxlength="1" id="c5" class="digit">
        <input type="text" maxlength="1" id="c6" class="digit">
    </div>

    <!-- MANUAL ENTRY SECTION (FALLBACK) -->
    <div class="manual-section">
        <div style="color:#aaccff; font-size:20px; margin-bottom:10px;">MANUAL ENTRY (CAMERA NOT WORKING?)</div>
        <input type="text" class="manual-input" id="manualBarcode" maxlength="6" placeholder="ENTER 6 DIGITS">
        <div class="btn" id="manualBtn" style="font-size:24px; padding:10px;">ENTER BARCODE</div>
    </div>

    <!-- MESSAGE AREA -->
    <div id="message"></div>

    <!-- STATUS DROPDOWN -->
    <select id="statusSelect" disabled>
        <option value="">-- SELECT STATUS --</option>
        <option value="Item Booked">Item Booked</option>
        <option value="Item Received">Item Received</option>
        <option value="Item Bagged">Item Bagged</option>
        <option value="Item Dispatched">Item Dispatched</option>
        <option value="In Transit">In Transit</option>
        <option value="Out for Delivery">Out for Delivery</option>
        <option value="Item Delivered">Item Delivered</option>
    </select>

    <!-- DATE TIME -->
    <div class="datetime" id="currentDateTime"></div>

    <!-- SCANNED ITEMS TABLE -->
    <table>
        <tr>
            <th>#</th>
            <th>BARCODE</th>
            <th>STATUS</th>
        </tr>
    </table>
    <div id="scannedList"></div>
</div>

<script>
// ==================== GLOBAL VARIABLES ====================
var API_URL = 'https://x8ki-letl-twmt.n7.xano.io/api:WGx5FQAG/qr_scans';
var video = document.getElementById('video');
var stream = null;
var scannerActive = false;
var scannedItems = [];
var itemId = 1;
var scanTimer = null;

// ==================== TIME UPDATE ====================
function updateTime() {
    var d = new Date();
    var h = d.getHours();
    var m = d.getMinutes();
    var s = d.getSeconds();
    
    h = h < 10 ? '0' + h : h;
    m = m < 10 ? '0' + m : m;
    s = s < 10 ? '0' + s : s;
    
    document.getElementById('headerTime').innerHTML = h + ':' + m + ':' + s;
    
    var y = d.getFullYear();
    var mn = d.getMonth() + 1;
    var dy = d.getDate();
    mn = mn < 10 ? '0' + mn : mn;
    dy = dy < 10 ? '0' + dy : dy;
    
    document.getElementById('currentDateTime').innerHTML = 
        y + '-' + mn + '-' + dy + ' ' + h + ':' + m + ':' + s;
}
updateTime();
setInterval(updateTime, 1000);

// ==================== GRID FUNCTIONS ====================
function setupGrid() {
    for (var i = 1; i <= 6; i++) {
        var input = document.getElementById('c' + i);
        
        input.oninput = function(e) {
            var id = parseInt(e.target.id.substring(1));
            if (this.value.length > 0) {
                this.value = this.value.charAt(0).toUpperCase();
                if (id < 6) {
                    document.getElementById('c' + (id + 1)).focus();
                }
            }
            checkGridFilled();
        };
        
        input.onkeydown = function(e) {
            var id = parseInt(e.target.id.substring(1));
            if (e.key === 'Backspace' && this.value.length === 0 && id > 1) {
                document.getElementById('c' + (id - 1)).focus();
            }
        };
    }
}
setupGrid();

function checkGridFilled() {
    var filled = true;
    for (var i = 1; i <= 6; i++) {
        if (document.getElementById('c' + i).value === '') {
            filled = false;
            break;
        }
    }
    document.getElementById('statusSelect').disabled = !filled;
}

function clearGrid() {
    for (var i = 1; i <= 6; i++) {
        document.getElementById('c' + i).value = '';
    }
    document.getElementById('c1').focus();
    checkGridFilled();
}

function fillGrid(barcode) {
    barcode = barcode.substring(0, 6).toUpperCase();
    for (var i = 1; i <= 6; i++) {
        if (i <= barcode.length) {
            document.getElementById('c' + i).value = barcode.charAt(i-1);
        } else {
            document.getElementById('c' + i).value = '';
        }
    }
    checkGridFilled();
}

// ==================== CAMERA FUNCTIONS - FIXED VERSION ====================
document.getElementById('scanButton').onclick = function() {
    // First check if browser supports getUserMedia
    if (!navigator.getUserMedia && !navigator.webkitGetUserMedia && !navigator.mozGetUserMedia) {
        showMessage('Camera not supported on this browser', 'error');
        return;
    }
    startCamera();
};

function startCamera() {
    stopScanner();
    document.getElementById('scanner').style.display = 'block';
    
    // Get the correct getUserMedia function
    var getUserMedia = navigator.getUserMedia || 
                      navigator.webkitGetUserMedia || 
                      navigator.mozGetUserMedia;
    
    if (!getUserMedia) {
        showMessage('Camera API not available', 'error');
        return;
    }
    
    showMessage('Requesting camera access...', 'warning');
    
    // Try with basic video first (no facing mode)
    getUserMedia.call(navigator, 
        { video: true },
        function(s) {
            stream = s;
            video.srcObject = s;
            video.onloadedmetadata = function() {
                video.play();
                scannerActive = true;
                showMessage('Camera started! Point at QR code', 'success');
                startQRScan();
            };
        },
        function(err) {
            var errorMsg = 'Camera error: ';
            if (err.name) errorMsg += err.name;
            if (err.message) errorMsg += ' - ' + err.message;
            showMessage(errorMsg, 'error');
            document.getElementById('scanner').style.display = 'none';
        }
    );
}

// Try back camera specifically
function tryBackCamera() {
    stopScanner();
    document.getElementById('scanner').style.display = 'block';
    
    var getUserMedia = navigator.getUserMedia || 
                      navigator.webkitGetUserMedia || 
                      navigator.mozGetUserMedia;
    
    if (!getUserMedia) return;
    
    // Try with environment facing (back camera)
    getUserMedia.call(navigator, 
        { video: { facingMode: { exact: "environment" } } },
        function(s) {
            stream = s;
            video.srcObject = s;
            video.onloadedmetadata = function() {
                video.play();
                scannerActive = true;
                showMessage('Back camera started!', 'success');
                startQRScan();
            };
        },
        function(err) {
            showMessage('Back camera failed, trying default...', 'warning');
            startCamera(); // Fall back to default camera
        }
    );
}

// Try front camera
function tryFrontCamera() {
    stopScanner();
    document.getElementById('scanner').style.display = 'block';
    
    var getUserMedia = navigator.getUserMedia || 
                      navigator.webkitGetUserMedia || 
                      navigator.mozGetUserMedia;
    
    if (!getUserMedia) return;
    
    getUserMedia.call(navigator, 
        { video: { facingMode: "user" } },
        function(s) {
            stream = s;
            video.srcObject = s;
            video.onloadedmetadata = function() {
                video.play();
                scannerActive = true;
                showMessage('Front camera started!', 'success');
                startQRScan();
            };
        },
        function(err) {
            showMessage('Front camera failed', 'error');
        }
    );
}

function stopScanner() {
    if (stream) {
        try {
            stream.getTracks().forEach(function(t) { t.stop(); });
        } catch(e) {}
        video.srcObject = null;
    }
    document.getElementById('scanner').style.display = 'none';
    scannerActive = false;
    if (scanTimer) {
        clearInterval(scanTimer);
        scanTimer = null;
    }
}

// ==================== QR SCANNING ====================
function startQRScan() {
    if (!scannerActive) return;
    
    // Load QR scanner if not loaded
    if (!window.jsQR) {
        var script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js';
        script.onload = function() { 
            if (scannerActive) initScanning();
        };
        script.onerror = function() {
            showMessage('Failed to load QR scanner', 'error');
        };
        document.head.appendChild(script);
    } else {
        initScanning();
    }
}

function initScanning() {
    var canvas = document.createElement('canvas');
    var ctx = canvas.getContext('2d');
    
    scanTimer = setInterval(function() {
        if (!scannerActive || video.readyState !== 4) return;
        
        try {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            if (canvas.width === 0 || canvas.height === 0) return;
            
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            var imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            var code = jsQR(imageData.data, imageData.width, imageData.height);
            
            if (code && code.data) {
                fillGrid(code.data);
                stopScanner();
                showMessage('QR Code detected!', 'success');
            }
        } catch(e) {
            // Silent fail for scanning errors
        }
    }, 500);
}

// ==================== MANUAL ENTRY ====================
document.getElementById('manualBtn').onclick = function() {
    var manual = document.getElementById('manualBarcode');
    var barcode = manual.value.trim().replace(/[^a-zA-Z0-9]/g, '').toUpperCase();
    if (barcode.length > 0) {
        fillGrid(barcode);
        manual.value = '';
        showMessage('Barcode entered manually', 'success');
    }
};

document.getElementById('manualBarcode').onkeypress = function(e) {
    if (e.key === 'Enter') {
        document.getElementById('manualBtn').click();
    }
};

// ==================== API FUNCTIONS ====================
function showMessage(text, type) {
    var msg = document.getElementById('message');
    msg.innerHTML = text;
    msg.className = type;
    msg.style.display = 'block';
    setTimeout(function() { msg.style.display = 'none'; }, 3000);
}

function sendToApi(barcode, status) {
    var now = new Date();
    var data = {
        label_id: barcode,
        barcode_type: 'QR_CODE',
        status: status,
        date: now.toISOString().split('T')[0],
        time: Math.floor(now.getTime() / 1000),
        location: 'Default',
        eta: ''
    };
    
    showMessage('Sending data...', 'warning');
    
    var xhr = new XMLHttpRequest();
    xhr.open('POST', API_URL, true);
    xhr.setRequestHeader('Content-Type', 'application/json');
    
    xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
            if (xhr.status >= 200 && xhr.status < 300) {
                showMessage('✓ Data sent successfully!', 'success');
                addToList(barcode, status);
            } else {
                showMessage('✗ Failed to send: ' + xhr.status, 'error');
            }
        }
    };
    
    xhr.onerror = function() {
        showMessage('✗ Network error - check connection', 'error');
    };
    
    xhr.send(JSON.stringify(data));
}

function addToList(barcode, status) {
    barcode = barcode.padStart(6, '0').substring(0, 6);
    
    scannedItems.unshift({
        id: itemId++,
        barcode: barcode,
        status: status
    });
    
    if (scannedItems.length > 30) scannedItems.pop();
    
    var html = '';
    for (var i = 0; i < scannedItems.length; i++) {
        html += '<div style="border-bottom:1px solid #4a6a9e; padding:8px; overflow:hidden;">' +
                '<span style="float:left; width:20%; color:#aaccff;">' + scannedItems[i].id + '</span>' +
                '<span style="float:left; width:40%; color:#0f0;">' + scannedItems[i].barcode + '</span>' +
                '<span style="float:left; width:40%; color:#fff;">' + scannedItems[i].status + '</span>' +
                '<div style="clear:both;"></div>' +
                '</div>';
    }
    
    document.getElementById('scannedList').innerHTML = html;
}

// ==================== STATUS SELECT ====================
document.getElementById('statusSelect').onchange = function() {
    var barcode = '';
    for (var i = 1; i <= 6; i++) {
        barcode += document.getElementById('c' + i).value;
    }
    
    if (barcode.length === 6 && this.value) {
        sendToApi(barcode, this.value);
        clearGrid();
        this.selectedIndex = 0;
        this.disabled = true;
    }
};

// ==================== INIT ====================
document.getElementById('c1').focus();

// Check camera support on load
if (!navigator.getUserMedia && !navigator.webkitGetUserMedia && !navigator.mozGetUserMedia) {
    showMessage('Camera not supported. Use manual entry.', 'warning');
}
</script>
</body>
</html>
