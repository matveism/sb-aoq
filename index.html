<!DOCTYPE html>
<html>
<head>
<title>Frame</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style type="text/css">
body {
    margin:0;
    padding:0;
    background:#000;
    font-family:"Courier New", monospace;
    overflow-x:hidden;
}

#device {
    width:100%;
    max-width:720px;
    height:1280px;
    margin:0 auto;
    background:#fff;
    border:2px solid #444;
}

/* HEADER BAR */
#header {
    width:100%;
    height:45px;
    background:#405e87;
    border-bottom:1px solid #2a3f5c;
    font-size:18px;
    line-height:45px;
    overflow:hidden;
}

/* FLOATS */
.left {
    float:left;
    padding-left:10px;
    color:#ffffff;
    font-weight:bold;
}

.right {
    float:right;
    padding-right:10px;
    color:#ffffff;
}

/* UNDER HEADER FULL BACKGROUND */
#under {
    width:100%;
    height:50px;
    background:#a2c2de;
    border-bottom:1px solid #8eaac7;
    font-size:18px;
    line-height:50px;
    overflow:hidden;
}

/* TEXT INSIDE UNDER HEADER */
#undertext {
    float:left;
    padding-left:10px;
    color:#000000;
    font-weight:bold;
}

.clear { clear:both; }

#content {
    width:100%;
    height:1185px;
    background:#ffffff;
}
</style>
</head>

<body>
<div id="device">

    <!-- HEADER -->
    <div id="header">
        <div class="left">Scan Barcode</div>
        <div class="right" id="clock">--:-- --</div>
        <div class="clear"></div>
    </div>

    <!-- UNDER HEADER FULL COLOR -->
    <div id="under">
        <div id="undertext">Scan/Key-in Barcode:</div>
        <div class="clear"></div>
    </div>

    <div id="content">
        <!-- blank -->
    </div>

</div>

<script type="text/javascript">
function updateClock() {
    var d = new Date();
    var h = d.getHours();
    var m = d.getMinutes();
    var ampm = "AM";

    if (h >= 12) ampm = "PM";
    if (h > 12) h = h - 12;
    if (h == 0) h = 12;
    if (m < 10) m = "0" + m;

    document.getElementById("clock").innerHTML = h + ":" + m + " " + ampm;
}

setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
