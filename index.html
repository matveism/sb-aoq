<!DOCTYPE html>
<html>
<head>
<title>Frame</title>
<meta name="viewport" content="width=720, initial-scale=1.0">
<style type="text/css">
body {
    margin:0;
    padding:0;
    background:#000;
    font-family:"Courier New", monospace;
}

#device {
    width:720px;
    height:1280px;
    margin:0 auto;
    background:#fff;
    border:2px solid #444;
}

/* SHRUNK HEADER */
#header {
    width:100%;
    height:40px;
    background:#d0d0d0;
    border-bottom:1px solid #777;
    font-size:18px;
    line-height:40px;
}

/* OLD FLOATS */
.left {
    float:left;
    padding-left:10px;
}

.right {
    float:right;
    padding-right:10px;
}

.clear { clear:both; }

#content {
    width:100%;
    height:1240px;
    background:#ffffff;
}
</style>
</head>

<body>
<div id="device">

    <div id="header">
        <div class="left">Scan Barcode</div>
        <div class="right" id="clock">--:-- --</div>
        <div class="clear"></div>
    </div>

    <div id="content">
        <!-- blank -->
    </div>

</div>

<script type="text/javascript">
function updateClock() {
    var d = new Date();
    var h = d.getHours();
    var m = d.getMinutes();
    var ampm = "AM";

    if (h >= 12) ampm = "PM";
    if (h > 12) h = h - 12;
    if (h == 0) h = 12;
    if (m < 10) m = "0" + m;

    document.getElementById("clock").innerHTML = h + ":" + m + " " + ampm;
}

setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
