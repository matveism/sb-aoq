<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN">
<html>
<head>
<title>Win CE 2007 - Scan Barcode</title>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=5">
<meta name="viewport" content="width=device-width, initial-scale=0.4, maximum-scale=0.4, user-scalable=no">

<!-- Simple styling - no fancy features -->
<style type="text/css">
body {
margin: 0;
padding: 0;
background: #000000;
text-align: center;
font-family: Arial, Helvetica, sans-serif;
}

#canvas {
width: 720px;
height: 1280px;
background: #1b1f2a;
border: 2px solid #333333;
margin: 0 auto;
overflow-y: auto;
overflow-x: hidden;
}

#header {
width: 720px;
height: 60px;
background: #2c3e6d;
color: #ffffff;
font-size: 28px;
line-height: 60px;
border-bottom: 2px solid #4a6a9e;
font-weight: bold;
}

#header-left {
float: left;
padding-left: 15px;
}

#header-right {
float: right;
padding-right: 15px;
}

.clear {
clear: both;
}

#content {
width: 720px;
background: #1b1f2a;
padding: 20px;
box-sizing: border-box;
}

/* Simple scan button */
#scanBtn {
width: 200px;
height: 80px;
background: #3a3f4a;
border: 3px solid #6a6f7a;
color: #ffffff;
font-size: 32px;
font-weight: bold;
text-align: center;
line-height: 80px;
cursor: pointer;
margin-bottom: 20px;
}

/* 6-digit grid */
.grid-container {
display: inline-block;
margin-bottom: 20px;
}

.grid-cell {
float: left;
width: 70px;
height: 80px;
background: #d47b2e;
border: 2px solid #a85e1f;
margin-right: 5px;
}

.grid-cell input {
width: 100%;
height: 100%;
background: transparent;
border: none;
color: #000000;
font-size: 36px;
font-weight: bold;
text-align: center;
text-transform: uppercase;
}

/* Status dropdown */
.status-row {
background: #2a2f3a;
border: 2px solid #4a5270;
padding: 10px;
margin: 20px 0;
}

.status-label {
color: #aaccff;
font-size: 24px;
font-weight: bold;
margin-right: 15px;
display: inline-block;
}

.status-dropdown {
padding: 12px 15px;
background: #1b1f2a;
border: 2px solid #6a8abe;
color: #ffffff;
font-size: 22px;
width: 300px;
}

.status-dropdown:disabled {
opacity: 0.5;
}

/* Date/Time display */
.datetime-row {
width: 100%;
margin: 15px 0;
padding: 12px;
background: #1b1f2a;
border: 2px solid #4a6a9e;
color: #00ff00;
font-size: 26px;
font-family: 'Courier New', monospace;
text-align: center;
box-sizing: border-box;
}

/* Table header */
.table-header {
width: 100%;
background: #2c3e6d;
border: 2px solid #4a6a9e;
margin-bottom: 5px;
overflow: hidden;
}

.header-cell {
float: left;
padding: 12px 0;
color: #ffffff;
font-size: 22px;
font-weight: bold;
text-align: center;
}

.header-num {
width: 20%;
}

.header-barcode {
width: 40%;
}

.header-label {
width: 40%;
}

/* Scanned items */
.scanned-items {
width: 100%;
height: 350px;
background: rgba(74, 106, 158, 0.15);
border: 2px solid #4a6a9e;
overflow-y: scroll;
}

.scanned-row {
width: 100%;
border-bottom: 1px solid #4a6a9e;
overflow: hidden;
font-size: 20px;
font-family: 'Courier New', monospace;
}

.scanned-num {
float: left;
width: 20%;
padding: 8px 0;
color: #aaccff;
text-align: center;
}

.scanned-barcode {
float: left;
width: 40%;
padding: 8px 0;
color: #00ff00;
text-align: center;
}

.scanned-label {
float: left;
width: 40%;
padding: 8px 0;
color: #ffffff;
text-align: center;
}

/* Scanner video */
#scanner-container {
width: 100%;
margin-top: 20px;
border: 2px solid #4a6a9e;
background: #000000;
display: none;
}

#videoElement {
width: 100%;
height: 250px;
background: #000000;
}

/* API message */
#api-message {
margin: 10px 0;
padding: 10px;
font-size: 18px;
text-align: center;
display: none;
border-radius: 5px;
}

.success {
background: #004d00;
border: 2px solid #00ff00;
color: #00ff00;
}

.error {
background: #4d0000;
border: 2px solid #ff0000;
color: #ff0000;
}
</style>
</head>

<body>
<div id="canvas">
<div id="header">
<div id="header-left">SCAN BARCODE</div>
<div id="header-right" id="headerTime">21:23:49</div>
<div class="clear"></div>
</div>

<div id="content">
<!-- Scan button -->
<div id="scanBtn">SCAN</div>

<!-- 6-digit grid -->
<div class="grid-container">
<div class="grid-cell"><input type="text" maxlength="1" id="char1" class="digit"></div>
<div class="grid-cell"><input type="text" maxlength="1" id="char2" class="digit"></div>
<div class="grid-cell"><input type="text" maxlength="1" id="char3" class="digit"></div>
<div class="grid-cell"><input type="text" maxlength="1" id="char4" class="digit"></div>
<div class="grid-cell"><input type="text" maxlength="1" id="char5" class="digit"></div>
<div class="grid-cell"><input type="text" maxlength="1" id="char6" class="digit"></div>
<div style="clear:both"></div>
</div>

<!-- API Message -->
<div id="api-message"></div>

<!-- Status dropdown -->
<div class="status-row">
<span class="status-label">STATUS</span>
<select class="status-dropdown" id="statusDropdown" disabled>
<option value="">-- Select Status --</option>
<option value="Item Booked">Item Booked</option>
<option value="Item Received">Item Received</option>
<option value="Item Bagged">Item Bagged</option>
<option value="Item Dispatched">Item Dispatched</option>
<option value="In Transit">In Transit</option>
<option value="Out for Delivery">Out for Delivery</option>
<option value="Item Delivered">Item Delivered</option>
</select>
</div>

<!-- Date/Time display -->
<div class="datetime-row" id="datetimeDisplay">2024-01-15 14:30:45</div>

<!-- Table header -->
<div class="table-header">
<div class="header-cell header-num">#</div>
<div class="header-cell header-barcode">BARCODE</div>
<div class="header-cell header-label">STATUS</div>
<div style="clear:both"></div>
</div>

<!-- Scanned items -->
<div class="scanned-items" id="scannedItems"></div>

<!-- Camera container -->
<div id="scanner-container">
<video id="videoElement" autoplay></video>
</div>
</div>
</div>

<script type="text/javascript">
// =============================================
// API Configuration
// =============================================
var API_URL = 'https://x8ki-letl-twmt.n7.xano.io/api:WGx5FQAG/qr_scans';

// =============================================
// Simple time update
// =============================================
function updateTime() {
var now = new Date();
var hours = now.getHours();
var minutes = now.getMinutes();
var seconds = now.getSeconds();
    
hours = hours < 10 ? '0' + hours : hours;
minutes = minutes < 10 ? '0' + minutes : minutes;
seconds = seconds < 10 ? '0' + seconds : seconds;
    
// Update header time
document.getElementById('header-right').innerHTML = hours + ':' + minutes + ':' + seconds;
    
// Update datetime display
var year = now.getFullYear();
var month = (now.getMonth() + 1).toString().padStart(2, '0');
var day = now.getDate().toString().padStart(2, '0');
document.getElementById('datetimeDisplay').innerHTML = 
year + '-' + month + '-' + day + ' ' + hours + ':' + minutes + ':' + seconds;
}

// Update time every second
updateTime();
setInterval(updateTime, 1000);

// =============================================
// Grid input handling
// =============================================
var inputs = document.querySelectorAll('.digit');
for (var i = 0; i < inputs.length; i++) {
inputs[i].addEventListener('input', function(e) {
var current = e.target;
var id = parseInt(current.id.replace('char', ''));
    
if (current.value.length > 0) {
current.value = current.value.charAt(0).toUpperCase();
if (id < 6) {
document.getElementById('char' + (id + 1)).focus();
}
}
    
// Check if all filled
checkAllFilled();
});
    
inputs[i].addEventListener('keydown', function(e) {
var current = e.target;
var id = parseInt(current.id.replace('char', ''));
    
if (e.key === 'Backspace' && current.value.length === 0) {
if (id > 1) {
e.preventDefault();
document.getElementById('char' + (id - 1)).focus();
}
}
});
}

function checkAllFilled() {
var allFilled = true;
for (var i = 1; i <= 6; i++) {
if (document.getElementById('char' + i).value === '') {
allFilled = false;
break;
}
}
    
var dropdown = document.getElementById('statusDropdown');
if (allFilled) {
dropdown.disabled = false;
dropdown.focus();
} else {
dropdown.disabled = true;
dropdown.selectedIndex = 0;
}
}

function clearGrid() {
for (var i = 1; i <= 6; i++) {
document.getElementById('char' + i).value = '';
}
document.getElementById('char1').focus();
checkAllFilled();
}

function fillGrid(barcode) {
barcode = barcode.substring(0, 6).toUpperCase();
for (var i = 1; i <= 6; i++) {
if (i <= barcode.length) {
document.getElementById('char' + i).value = barcode.charAt(i-1);
} else {
document.getElementById('char' + i).value = '';
}
}
checkAllFilled();
}

// =============================================
// Simple beep
// =============================================
function beep() {
try {
var ctx = new (window.AudioContext || window.webkitAudioContext)();
var osc = ctx.createOscillator();
osc.connect(ctx.destination);
osc.frequency.value = 800;
osc.start();
osc.stop(ctx.currentTime + 0.1);
} catch(e) {}
}

// =============================================
// Camera functions - SIMPLE version for old Android
// =============================================
var video = document.getElementById('videoElement');
var stream = null;

function startCamera() {
// Check if browser supports getUserMedia
if (!navigator.getUserMedia && !navigator.webkitGetUserMedia && 
!navigator.mozGetUserMedia && !navigator.msGetUserMedia) {
alert('Your browser does not support camera access');
return;
}

// Show scanner container
document.getElementById('scanner-container').style.display = 'block';

// Get user media with back camera
var getUserMedia = navigator.getUserMedia || navigator.webkitGetUserMedia || 
navigator.mozGetUserMedia || navigator.msGetUserMedia;

if (getUserMedia) {
getUserMedia.call(navigator, 
{ video: { facingMode: { exact: "environment" } } }, // Try back camera first
function(s) {
stream = s;
video.srcObject = stream;
video.play();
startScanning(); // Start scanning for barcodes
},
function(error) {
// If back camera fails, try any camera
getUserMedia.call(navigator, 
{ video: true },
function(s) {
stream = s;
video.srcObject = stream;
video.play();
startScanning();
},
function(error) {
alert('Cannot access camera: ' + error);
document.getElementById('scanner-container').style.display = 'none';
}
);
}
);
}
}

function stopCamera() {
if (stream) {
stream.getTracks().forEach(function(track) {
track.stop();
});
video.srcObject = null;
}
document.getElementById('scanner-container').style.display = 'none';
clearInterval(scanInterval);
}

// =============================================
// Barcode scanning - Simple timer-based scanning
// =============================================
var scanInterval = null;

function startScanning() {
// Clear any existing interval
if (scanInterval) {
clearInterval(scanInterval);
}

// Create a canvas for capturing frames
var canvas = document.createElement('canvas');
var ctx = canvas.getContext('2d');

// Scan every 500ms
scanInterval = setInterval(function() {
if (video.readyState === video.HAVE_ENOUGH_DATA) {
// Set canvas size to video size
canvas.width = video.videoWidth;
canvas.height = video.videoHeight;
    
// Draw video frame to canvas
ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    
// Get image data for scanning
try {
// Look for QR code in the image
scanImageData(ctx.getImageData(0, 0, canvas.width, canvas.height));
} catch(e) {}
}
}, 500);
}

function scanImageData(imageData) {
// For Android 5.0, we need a simple QR scanner
// Use dynamic script loading for the scanner library
if (!window.QRScanner) {
// Load jsQR library for QR scanning
var script = document.createElement('script');
script.src = 'https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js';
script.onload = function() {
scanWithJSQR(imageData);
};
document.head.appendChild(script);
} else {
scanWithJSQR(imageData);
}
}

function scanWithJSQR(imageData) {
try {
var code = jsQR(imageData.data, imageData.width, imageData.height);
if (code) {
// Found a QR code
beep();
fillGrid(code.data);
stopCamera();
}
} catch(e) {}
}

// =============================================
// API functions
// =============================================
function showMessage(msg, isSuccess) {
var msgDiv = document.getElementById('api-message');
msgDiv.innerHTML = msg;
msgDiv.style.display = 'block';
msgDiv.className = isSuccess ? 'success' : 'error';
setTimeout(function() { msgDiv.style.display = 'none'; }, 3000);
}

function sendToAPI(barcode, status) {
var now = new Date();
var data = {
label_id: barcode,
barcode_type: 'QR_CODE',
status: status,
date: now.toISOString().split('T')[0],
time: Math.floor(now.getTime() / 1000),
location: 'Default Location',
eta: ''
};

// Use XMLHttpRequest for better compatibility
var xhr = new XMLHttpRequest();
xhr.open('POST', API_URL, true);
xhr.setRequestHeader('Content-Type', 'application/json');
xhr.onreadystatechange = function() {
if (xhr.readyState === 4) {
if (xhr.status === 200 || xhr.status === 201) {
showMessage('✓ Data sent successfully!', true);
addToScannedList(barcode, status);
} else {
showMessage('✗ Failed to send data', false);
}
}
};
xhr.send(JSON.stringify(data));
}

// =============================================
// Scanned items list
// =============================================
var scannedItems = [];
var itemCounter = 1;

function addToScannedList(barcode, status) {
var item = {
id: itemCounter++,
barcode: barcode.padStart(6, '0').substring(0, 6),
status: status
};

scannedItems.unshift(item);
if (scannedItems.length > 30) scannedItems.pop();

var container = document.getElementById('scannedItems');
container.innerHTML = '';

for (var i = 0; i < scannedItems.length; i++) {
var item = scannedItems[i];
container.innerHTML += 
'<div class="scanned-row">' +
'<div class="scanned-num">' + item.id + '</div>' +
'<div class="scanned-barcode">' + item.barcode + '</div>' +
'<div class="scanned-label">' + item.status + '</div>' +
'<div style="clear:both"></div>' +
'</div>';
}
}

// =============================================
// Event handlers
// =============================================
// Scan button
document.getElementById('scanBtn').onclick = function() {
startCamera();
};

// Status dropdown
document.getElementById('statusDropdown').onchange = function() {
var dropdown = this;
var selected = dropdown.options[dropdown.selectedIndex];
    
if (selected.value) {
var barcode = '';
for (var i = 1; i <= 6; i++) {
barcode += document.getElementById('char' + i).value;
}
    
if (barcode.length === 6) {
sendToAPI(barcode, selected.value);
clearGrid();
dropdown.selectedIndex = 0;
}
}
};

// Focus first input
document.getElementById('char1').focus();
</script>
</body>
</html>
