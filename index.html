<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>A-J WORKING 100%</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; font-family:Arial; padding:5px; }
.phone { max-width:360px; margin:0 auto; background:#2b4b70; padding:10px; border-radius:10px; color:white; }
.header { background:#2e5a88; padding:10px; text-align:center; font-size:18px; border-radius:5px; margin-bottom:10px; }
.hint { background:#0A3A6B; padding:8px; text-align:center; font-size:14px; border-radius:5px; margin-bottom:10px; }
.hint span { color:#ffcc00; font-weight:bold; margin:0 3px; }

.cells { display:flex; gap:2px; justify-content:center; margin-bottom:10px; }
.cell { width:50px; height:50px; background:#E2E8D3; border:2px solid #1f3f5c; text-align:center; font-size:28px; font-weight:bold; line-height:50px; border-radius:5px; color:#000; }

.history { background:#A6BEEF; min-height:100px; margin-bottom:10px; padding:5px; border:2px solid #1f3f5c; overflow-y:auto; border-radius:5px; color:#000; max-height:150px; }
.entry { background:#c0d4f5; padding:5px; margin:3px 0; border-radius:3px; font-weight:bold; }

.keypad { display:grid; grid-template-columns:repeat(3,1fr); gap:3px; margin-bottom:10px; }
.key { background:#3a5f8a; color:white; padding:15px 0; text-align:center; font-size:24px; font-weight:bold; border-radius:5px; border:1px solid #1f3f5c; cursor:pointer; }
.key:active { background:#4CAF50; }
.key.enter { background:#4CAF50; }
.key.esc { background:#dc3545; }
.key.back { background:#ffc107; color:#000; }

.buttons { display:flex; gap:5px; margin-top:5px; }
.btn { flex:1; background:#7496C4; color:white; padding:12px; text-align:center; font-size:16px; font-weight:bold; border-radius:5px; border:1px solid #1f3f5c; cursor:pointer; }

#result { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#2b4b70; border:3px solid #4CAF50; padding:20px; border-radius:10px; text-align:center; color:white; z-index:200; width:280px; }
</style>
</head>
<body>
<div class="phone">
  <div class="header">📦 A-J SCANNER</div>
  
  <div class="hint">
    <span>A=1</span> <span>B=2</span> <span>C=3</span> <span>D=4</span> <span>E=5</span>
    <span>F=6</span> <span>G=7</span> <span>H=8</span> <span>I=9</span> <span>J=0</span>
  </div>
  
  <div class="cells">
    <div class="cell" id="cell1"></div>
    <div class="cell" id="cell2"></div>
    <div class="cell" id="cell3"></div>
    <div class="cell" id="cell4"></div>
    <div class="cell" id="cell5"></div>
    <div class="cell" id="cell6"></div>
  </div>
  
  <div class="history" id="history"></div>
  
  <div class="keypad">
    <div onclick="addLetter('A')" class="key">A</div>
    <div onclick="addLetter('B')" class="key">B</div>
    <div onclick="addLetter('C')" class="key">C</div>
    <div onclick="addLetter('D')" class="key">D</div>
    <div onclick="addLetter('E')" class="key">E</div>
    <div onclick="addLetter('F')" class="key">F</div>
    <div onclick="addLetter('G')" class="key">G</div>
    <div onclick="addLetter('H')" class="key">H</div>
    <div onclick="addLetter('I')" class="key">I</div>
    <div onclick="addLetter('J')" class="key">J</div>
    <div onclick="backspace()" class="key back">⌫</div>
    <div onclick="showStatus()" class="key enter">ENT</div>
  </div>
  
  <div class="buttons">
    <div onclick="clearCells()" class="btn">CLEAR</div>
    <div onclick="clearAll()" class="btn">CLEAR ALL</div>
  </div>
  
  <div id="result">
    <div style="font-size:48px; color:#4CAF50; margin-bottom:10px;" id="resultIcon">✓</div>
    <p id="resultMsg">DONE!</p>
    <p id="resultDetail" style="font-size:12px; margin-top:10px;"></p>
  </div>
</div>

<script>
// ===== SIMPLE CODE THAT WILL WORK =====
var cells = [
  document.getElementById('cell1'),
  document.getElementById('cell2'),
  document.getElementById('cell3'),
  document.getElementById('cell4'),
  document.getElementById('cell5'),
  document.getElementById('cell6')
];

var codes = [];
var count = 0;

function addLetter(letter) {
  for (var i = 0; i < 6; i++) {
    if (cells[i].innerHTML === '') {
      cells[i].innerHTML = letter;
      break;
    }
  }
  checkComplete();
}

function backspace() {
  for (var i = 5; i >= 0; i--) {
    if (cells[i].innerHTML !== '') {
      cells[i].innerHTML = '';
      break;
    }
  }
}

function clearCells() {
  for (var i = 0; i < 6; i++) cells[i].innerHTML = '';
}

function clearAll() {
  codes = [];
  count = 0;
  document.getElementById('history').innerHTML = '';
  clearCells();
}

function checkComplete() {
  var filled = true;
  var letters = '';
  for (var i = 0; i < 6; i++) {
    if (cells[i].innerHTML === '') filled = false;
    else letters += cells[i].innerHTML;
  }
  
  if (filled && letters.length === 6) {
    var numbers = '';
    for (var i = 0; i < letters.length; i++) {
      var ch = letters[i];
      if (ch === 'A') numbers += '1';
      else if (ch === 'B') numbers += '2';
      else if (ch === 'C') numbers += '3';
      else if (ch === 'D') numbers += '4';
      else if (ch === 'E') numbers += '5';
      else if (ch === 'F') numbers += '6';
      else if (ch === 'G') numbers += '7';
      else if (ch === 'H') numbers += '8';
      else if (ch === 'I') numbers += '9';
      else if (ch === 'J') numbers += '0';
    }
    
    count++;
    codes.push({ letters: letters, numbers: numbers });
    
    var history = document.getElementById('history');
    var div = document.createElement('div');
    div.className = 'entry';
    div.innerHTML = '#' + count + ': ' + letters + ' → ' + numbers;
    history.appendChild(div);
    
    clearCells();
  }
}

function showStatus() {
  if (codes.length === 0) {
    alert('Enter a code first');
    return;
  }
  
  var statusHtml = '';
  var statuses = ['Data Received', 'Picked Up', 'Depart Post Office', 'Arrival Scan', 'Local Scan', 'Out For Delivery', 'Delivered'];
  
  for (var i = 0; i < statuses.length; i++) {
    statusHtml += '<div style="background:#3f6b9c; border:2px solid #ffcc00; padding:15px; margin:8px 0; text-align:center; border-radius:5px; cursor:pointer; color:white; font-size:16px; font-weight:bold;" onclick="send(\'' + statuses[i] + '\')">📦 ' + statuses[i] + '</div>';
  }
  statusHtml += '<div style="background:#dc3545; border:2px solid #fff; padding:15px; margin:8px 0; text-align:center; border-radius:5px; cursor:pointer; color:white; font-size:16px; font-weight:bold;" onclick="hideStatus()">⬅️ BACK</div>';
  
  var div = document.createElement('div');
  div.id = 'statusDiv';
  div.style.position = 'fixed';
  div.style.top = '0';
  div.style.left = '0';
  div.style.width = '100%';
  div.style.height = '100%';
  div.style.background = 'rgba(0,0,0,0.95)';
  div.style.padding = '15px';
  div.style.overflowY = 'auto';
  div.style.zIndex = '100';
  div.innerHTML = statusHtml;
  document.body.appendChild(div);
}

function hideStatus() {
  var div = document.getElementById('statusDiv');
  if (div) div.remove();
}

function send(status) {
  hideStatus();
  
  var result = document.getElementById('result');
  var icon = document.getElementById('resultIcon');
  var msg = document.getElementById('resultMsg');
  var detail = document.getElementById('resultDetail');
  
  icon.innerHTML = '⏳';
  icon.style.color = '#ffcc00';
  msg.innerHTML = 'SENDING ' + codes.length + ' CODE...';
  detail.innerHTML = '';
  result.style.display = 'block';
  
  // Create a form and submit it - THIS ALWAYS WORKS ON ANDROID
  var form = document.createElement('form');
  form.method = 'POST';
  form.action = 'https://x8ki-letl-twmt.n7.xano.io/api:WGx5FQAG/qr_scans';
  form.style.display = 'none';
  form.target = 'hiddenFrame';
  
  // Add hidden iframe
  var iframe = document.createElement('iframe');
  iframe.name = 'hiddenFrame';
  iframe.style.display = 'none';
  document.body.appendChild(iframe);
  
  var sent = 0;
  var total = codes.length;
  
  for (var i = 0; i < codes.length; i++) {
    var code = codes[i];
    
    var now = new Date();
    var dateStr = now.getFullYear() + '-' + 
                  (now.getMonth() + 1 < 10 ? '0' + (now.getMonth() + 1) : now.getMonth() + 1) + '-' + 
                  (now.getDate() < 10 ? '0' + now.getDate() : now.getDate());
    
    var timeStr = (now.getHours() < 10 ? '0' + now.getHours() : now.getHours()) + ':' + 
                  (now.getMinutes() < 10 ? '0' + now.getMinutes() : now.getMinutes()) + ':' + 
                  (now.getSeconds() < 10 ? '0' + now.getSeconds() : now.getSeconds());
    
    var timestamp = Math.floor(now.getTime() / 1000);
    
    var eta = new Date(now);
    eta.setDate(eta.getDate() + 1);
    var etaStr = eta.getFullYear() + '-' + 
                 (eta.getMonth() + 1 < 10 ? '0' + (eta.getMonth() + 1) : eta.getMonth() + 1) + '-' + 
                 (eta.getDate() < 10 ? '0' + eta.getDate() : eta.getDate());
    
    // Create a new form for each code
    var f = document.createElement('form');
    f.method = 'POST';
    f.action = 'https://x8ki-letl-twmt.n7.xano.io/api:WGx5FQAG/qr_scans';
    f.target = 'hiddenFrame';
    f.style.display = 'none';
    
    var fields = {
      label_id: code.numbers,
      barcode_type: 'manual',
      status: status,
      timestamp: timestamp,
      time: timeStr,
      date: dateStr,
      location: 'Unknown',
      eta: etaStr
    };
    
    for (var key in fields) {
      var input = document.createElement('input');
      input.type = 'hidden';
      input.name = key;
      input.value = fields[key];
      f.appendChild(input);
    }
    
    document.body.appendChild(f);
    
    // Submit the form
    f.submit();
    sent++;
    
    // Remove form after submission
    setTimeout(function(frm) {
      frm.remove();
    }, 100, f);
  }
  
  setTimeout(function() {
    if (sent === total) {
      icon.innerHTML = '✓';
      icon.style.color = '#4CAF50';
      msg.innerHTML = '✅ ALL ' + total + ' CODES SENT!';
      detail.innerHTML = 'Check XANO database';
      
      // Clear history
      codes = [];
      count = 0;
      document.getElementById('history').innerHTML = '';
      
      setTimeout(function() {
        result.style.display = 'none';
        iframe.remove();
      }, 2000);
    }
  }, 1000);
}
</script>
</body>
</html>
