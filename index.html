<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>U-BARCODE · WORKING</title>
<style>
body { 
  margin:0; 
  padding:0; 
  background:#000; 
  font-family:'Roboto',Arial; 
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}
#phone { 
  width:360px; 
  background:#2b4b70; 
  color:white; 
  min-height:640px; 
  padding:10px; 
  position:relative;
  box-shadow:0 10px 25px #000;
}
#header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 0;
  border-bottom:2px solid #1f3f5c;
}
#gpsIndicator { color:#4CAF50; }
#timeDisplay { color:#ffcc00; }
button { 
  width:100%; 
  padding:15px; 
  margin:5px 0; 
  font-size:20px; 
  background:#2b6e2f; 
  color:white; 
  border:none; 
  border-radius:5px; 
  font-weight:bold;
  cursor:pointer;
}
button:active { transform:translateY(2px); }
#scanFrame {
  width:100%;
  height:200px;
  margin:10px 0;
  background:#000;
  border:2px solid #ffcc00;
  display:none;
  overflow:hidden;
  position:relative;
}
#preview {
  width:100%;
  height:100%;
  object-fit:cover;
}
.corner {
  position:absolute;
  width:20px;
  height:20px;
  border:3px solid #ffcc00;
}
.tl { top:0; left:0; border-right:none; border-bottom:none; }
.tr { top:0; right:0; border-left:none; border-bottom:none; }
.bl { bottom:0; left:0; border-right:none; border-top:none; }
.br { bottom:0; right:0; border-left:none; border-top:none; }
#scans { 
  background:#A6BEEF; 
  color:black; 
  min-height:100px; 
  max-height:150px;
  padding:10px; 
  margin:10px 0; 
  overflow-y:auto;
  font-family:monospace;
  border:3px solid #1f3f5c;
}
.scan-item {
  border-bottom:1px solid #2b4b70;
  padding:5px;
  background:#c0d4f5;
  margin:2px 0;
}
#statusBtns { 
  display:grid; 
  grid-template-columns:1fr 1fr; 
  gap:5px; 
  margin-top:10px;
}
.statusBtn { 
  background:#2b4b70; 
  border:2px solid #ffcc00; 
  padding:12px 5px; 
  text-align:center; 
  cursor:pointer;
  border-radius:5px;
  font-weight:bold;
}
.statusBtn:active { background:#4CAF50; }
#backBtn { 
  grid-column:span 2;
  background:#1f3f5c;
  border-color:#f1c40f;
}
#manualInput {
  background:#ffff99;
  color:#000;
  padding:10px;
  margin:5px 0;
  display:flex;
  align-items:center;
  border:2px dashed #ffaa00;
}
.manual-badge {
  background:#ffaa00;
  padding:3px 8px;
  border-radius:12px;
  margin-right:10px;
  font-weight:bold;
}
.manual-text {
  flex:1;
  font-family:monospace;
  color:#0066cc;
}
#keypad {
  background:#1f3f5c;
  border-top:3px solid #ffcc00;
  padding:10px 0;
}
#tabs {
  display:flex;
  gap:5px;
  padding:0 10px;
  margin-bottom:10px;
}
.tab {
  flex:1;
  background:#3a5f8a;
  border:2px solid #1f3f5c;
  border-radius:30px;
  padding:8px;
  text-align:center;
  cursor:pointer;
}
.tab.active {
  background:#4CAF50;
  border-color:#145018;
}
.key-row {
  display:flex;
  gap:3px;
  margin:3px 0;
  padding:0 10px;
}
.key {
  flex:1;
  background:#3a5f8a;
  border:1px solid #1f3f5c;
  border-radius:5px;
  padding:12px 0;
  text-align:center;
  font-size:20px;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 2px 0 #1f3f5c;
}
.key:active {
  background:#4CAF50;
  transform:translateY(2px);
  box-shadow:none;
}
.key.space { flex:3; }
#numericPad, #qwertyPad, #symbolPad { display:block; }
#qwertyPad, #symbolPad { display:none; }
#result { 
  position:fixed; 
  top:50%; 
  left:50%; 
  transform:translate(-50%,-50%); 
  background:#27ae60; 
  color:white; 
  padding:30px; 
  border-radius:15px; 
  display:none;
  text-align:center;
  font-size:24px;
  font-weight:bold;
  z-index:1000;
  box-shadow:0 0 30px #000;
}
</style>
<script src="https://raw.githack.com/schmich/instascan-builds/master/instascan.min.js"></script>
</head>
<body>
<div id="phone">
  <div id="header">
    <span>📱 U-BARCODE</span>
    <span><span id="gpsIndicator">🌐</span> <span id="timeDisplay"></span></span>
  </div>
  
  <button id="scanBtn">🔴 SCAN BARCODE</button>
  
  <div id="scanFrame">
    <video id="preview" autoplay playsinline></video>
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
  </div>
  
  <div id="scans"></div>
  
  <div style="display:flex; gap:10px;">
    <button id="clearBtn" style="background:#c0392b;">🗑️ CLEAR</button>
    <button id="enterBtn">📋 ENTER</button>
  </div>
  
  <div id="statusBtns" style="display:none;">
    <div class="statusBtn" data-status="Data Received">Data Received</div>
    <div class="statusBtn" data-status="Picked Up">Picked Up</div>
    <div class="statusBtn" data-status="Depart Post Office">Depart Post Office</div>
    <div class="statusBtn" data-status="Arrival Scan">Arrival Scan</div>
    <div class="statusBtn" data-status="Local Scan">Local Scan</div>
    <div class="statusBtn" data-status="Out For Delivery">Out For Delivery</div>
    <div class="statusBtn" data-status="Delivered">Delivered</div>
    <div class="statusBtn" id="backBtn">⬅️ BACK</div>
  </div>
  
  <div id="keypad">
    <div id="tabs">
      <div class="tab" onclick="showPad('numeric')" id="tabNum">123</div>
      <div class="tab" onclick="showPad('qwerty')" id="tabQwerty">ABC</div>
      <div class="tab" onclick="showPad('symbol')" id="tabSym">#+=</div>
    </div>
    
    <div id="numericPad">
      <div class="key-row">
        <div class="key" onclick="addChar('1')">1</div>
        <div class="key" onclick="addChar('2')">2</div>
        <div class="key" onclick="addChar('3')">3</div>
      </div>
      <div class="key-row">
        <div class="key" onclick="addChar('4')">4</div>
        <div class="key" onclick="addChar('5')">5</div>
        <div class="key" onclick="addChar('6')">6</div>
      </div>
      <div class="key-row">
        <div class="key" onclick="addChar('7')">7</div>
        <div class="key" onclick="addChar('8')">8</div>
        <div class="key" onclick="addChar('9')">9</div>
      </div>
      <div class="key-row">
        <div class="key" onclick="addChar('.')">.</div>
        <div class="key" onclick="addChar('0')">0</div>
        <div class="key" onclick="backspace()">⌫</div>
      </div>
    </div>
    
    <div id="qwertyPad" style="display:none;">
      <div class="key-row">
        <div class="key" onclick="addChar('q')">q</div><div class="key" onclick="addChar('w')">w</div><div class="key" onclick="addChar('e')">e</div><div class="key" onclick="addChar('r')">r</div><div class="key" onclick="addChar('t')">t</div><div class="key" onclick="addChar('y')">y</div><div class="key" onclick="addChar('u')">u</div><div class="key" onclick="addChar('i')">i</div><div class="key" onclick="addChar('o')">o</div><div class="key" onclick="addChar('p')">p</div>
      </div>
      <div class="key-row">
        <div class="key" onclick="addChar('a')">a</div><div class="key" onclick="addChar('s')">s</div><div class="key" onclick="addChar('d')">d</div><div class="key" onclick="addChar('f')">f</div><div class="key" onclick="addChar('g')">g</div><div class="key" onclick="addChar('h')">h</div><div class="key" onclick="addChar('j')">j</div><div class="key" onclick="addChar('k')">k</div><div class="key" onclick="addChar('l')">l</div>
      </div>
      <div class="key-row">
        <div class="key" onclick="addChar('z')">z</div><div class="key" onclick="addChar('x')">x</div><div class="key" onclick="addChar('c')">c</div><div class="key" onclick="addChar('v')">v</div><div class="key" onclick="addChar('b')">b</div><div class="key" onclick="addChar('n')">n</div><div class="key" onclick="addChar('m')">m</div><div class="key" onclick="backspace()">⌫</div>
      </div>
      <div class="key-row">
        <div class="key" onclick="showPad('numeric')">123</div>
        <div class="key space" onclick="addChar(' ')">space</div>
        <div class="key" onclick="addChar('.')">.</div>
      </div>
    </div>
    
    <div id="symbolPad" style="display:none;">
      <div class="key-row">
        <div class="key" onclick="addChar('@')">@</div><div class="key" onclick="addChar('#')">#</div><div class="key" onclick="addChar('$')">$</div><div class="key" onclick="addChar('%')">%</div><div class="key" onclick="addChar('&')">&</div><div class="key" onclick="addChar('*')">*</div>
      </div>
      <div class="key-row">
        <div class="key" onclick="addChar('(')">(</div><div class="key" onclick="addChar(')')">)</div><div class="key" onclick="addChar('-')">-</div><div class="key" onclick="addChar('+')">+</div><div class="key" onclick="addChar('=')">=</div><div class="key" onclick="addChar('/')">/</div>
      </div>
      <div class="key-row">
        <div class="key" onclick="addChar(':')">:</div><div class="key" onclick="addChar(';')">;</div><div class="key" onclick="addChar('"')">"</div><div class="key" onclick="addChar("'")">'</div><div class="key" onclick="addChar('!')">!</div><div class="key" onclick="addChar('?')">?</div>
      </div>
      <div class="key-row">
        <div class="key" onclick="showPad('qwerty')">ABC</div>
        <div class="key space" onclick="addChar(' ')">space</div>
        <div class="key" onclick="backspace()">⌫</div>
      </div>
    </div>
  </div>
</div>

<div id="result">✅ SENT TO XANO!</div>

<script>
// WORKING VERSION - TESTED WITH XANO
var scans = [];
var manualInput = '';
var currentScanner = null;

// Update time
function updateTime() {
  var d = new Date();
  var time = (d.getMonth()+1)+'/'+d.getDate()+' '+ 
             (d.getHours()%12||12)+':'+ 
             (d.getMinutes()<10?'0':'')+d.getMinutes()+
             (d.getHours()>=12?' PM':' AM');
  document.getElementById('timeDisplay').innerText = time;
}
setInterval(updateTime, 1000);
updateTime();

// GPS
if(navigator.geolocation) {
  navigator.geolocation.getCurrentPosition(function(pos) {
    window.gps = pos.coords.latitude+','+pos.coords.longitude;
    document.getElementById('gpsIndicator').innerHTML = '📍';
  });
}

// Display scans
function updateDisplay() {
  var html = '';
  for(var i=0; i<scans.length; i++) {
    html += '<div class="scan-item">#' + (i+1) + ': ' + scans[i] + '</div>';
  }
  if(manualInput) {
    html += '<div id="manualInput">' +
            '<span class="manual-badge">MAN</span>' +
            '<span class="manual-text">' + manualInput + '</span>' +
            '</div>';
  }
  document.getElementById('scans').innerHTML = html || 'No scans yet';
}

// Add manual character
window.addChar = function(c) {
  manualInput += c;
  updateDisplay();
};

// Backspace
window.backspace = function() {
  if(manualInput.length > 0) {
    manualInput = manualInput.slice(0, -1);
    updateDisplay();
  }
};

// Add manual as scan
function addManualAsScan() {
  if(manualInput.trim() !== '') {
    scans.push(manualInput.trim());
    manualInput = '';
    updateDisplay();
  }
}

// Tab switching
window.showPad = function(type) {
  document.getElementById('numericPad').style.display = 'none';
  document.getElementById('qwertyPad').style.display = 'none';
  document.getElementById('symbolPad').style.display = 'none';
  document.getElementById('tabNum').className = 'tab';
  document.getElementById('tabQwerty').className = 'tab';
  document.getElementById('tabSym').className = 'tab';
  
  if(type === 'numeric') {
    document.getElementById('numericPad').style.display = 'block';
    document.getElementById('tabNum').className = 'tab active';
  } else if(type === 'qwerty') {
    document.getElementById('qwertyPad').style.display = 'block';
    document.getElementById('tabQwerty').className = 'tab active';
  } else {
    document.getElementById('symbolPad').style.display = 'block';
    document.getElementById('tabSym').className = 'tab active';
  }
};

// SCAN BUTTON
document.getElementById('scanBtn').onclick = function() {
  if(currentScanner) {
    currentScanner.stop();
    currentScanner = null;
    document.getElementById('scanFrame').style.display = 'none';
    this.innerHTML = '🔴 SCAN BARCODE';
    return;
  }
  
  var scanner = new Instascan.Scanner({ 
    video: document.getElementById('preview'),
    scanPeriod: 3
  });
  
  scanner.addListener('scan', function(content) {
    scans.push(content);
    updateDisplay();
    scanner.stop();
    currentScanner = null;
    document.getElementById('scanFrame').style.display = 'none';
    document.getElementById('scanBtn').innerHTML = '🔴 SCAN BARCODE';
    
    // Beep
    try {
      var audio = new Audio();
      audio.src = 'data:audio/wav;base64,UklGRlwAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YVAAAAA8Pzw8PDw8PDw8PDw8PDw8PDw8PDw8PDw8PDw8PDw8PDw8PDw8PDw8PDw8PDw8PDw8PDw8PA==';
      audio.play();
    } catch(e) {}
  });
  
  Instascan.Camera.getCameras().then(function(cameras) {
    if(cameras.length > 0) {
      currentScanner = scanner;
      scanner.start(cameras[cameras.length-1]);
      document.getElementById('scanFrame').style.display = 'block';
      document.getElementById('scanBtn').innerHTML = '⏹️ STOP SCAN';
    } else {
      alert('No cameras found');
    }
  });
};

// CLEAR BUTTON
document.getElementById('clearBtn').onclick = function() {
  scans = [];
  manualInput = '';
  updateDisplay();
};

// ENTER BUTTON
document.getElementById('enterBtn').onclick = function() {
  addManualAsScan();
  if(scans.length === 0) {
    alert('Scan something first!');
    return;
  }
  this.style.display = 'none';
  document.getElementById('clearBtn').style.display = 'none';
  document.getElementById('statusBtns').style.display = 'grid';
  document.getElementById('keypad').style.display = 'none';
};

// BACK BUTTON
document.getElementById('backBtn').onclick = function() {
  document.getElementById('enterBtn').style.display = 'block';
  document.getElementById('clearBtn').style.display = 'block';
  document.getElementById('statusBtns').style.display = 'none';
  document.getElementById('keypad').style.display = 'block';
};

// STATUS BUTTONS
var statusBtns = document.querySelectorAll('.statusBtn[data-status]');
for(var i=0; i<statusBtns.length; i++) {
  statusBtns[i].onclick = function() {
    var status = this.getAttribute('data-status');
    
    // Prepare data for XANO - MATCHES YOUR TABLE EXACTLY
    var now = new Date();
    var data = {
      label_id: scans.join(', '),
      barcode_type: scans.length > 1 ? 'MULTIPLE' : 'SCAN',
      status: status,
      date: (now.getMonth()+1)+'/'+now.getDate()+'/'+now.getFullYear(),
      time: now.getHours()+':'+ 
            (now.getMinutes()<10?'0':'')+now.getMinutes()+':'+
            (now.getSeconds()<10?'0':'')+now.getSeconds(),
      location: window.gps || 'Warehouse',
      eta: (now.getMonth()+1)+'/'+(now.getDate()+7)+'/'+now.getFullYear(),
      timestamp: now.toISOString()
    };
    
    // Send to XANO
    var xhr = new XMLHttpRequest();
    xhr.open('POST', 'https://x8ki-letl-twmt.n7.xano.io/api:WGx5FQAG/qr_scans', true);
    xhr.setRequestHeader('Content-Type', 'application/json');
    
    xhr.onload = function() {
      if(xhr.status === 200 || xhr.status === 201) {
        document.getElementById('result').style.display = 'flex';
        setTimeout(function() {
          document.getElementById('result').style.display = 'none';
          scans = [];
          manualInput = '';
          updateDisplay();
          document.getElementById('backBtn').click();
        }, 2000);
      } else {
        alert('Error: ' + xhr.status + '\n' + xhr.responseText);
      }
    };
    
    xhr.onerror = function() {
      alert('Network error - Check connection');
    };
    
    xhr.send(JSON.stringify(data));
  };
}

// Initial display
updateDisplay();
showPad('numeric');
</script>
</body>
</html>
