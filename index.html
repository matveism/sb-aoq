<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>A-J Scanner</title>
<style>
body { background:#000; margin:0; padding:10px; font-family:Arial; }
.phone { max-width:360px; margin:0 auto; background:#2b4b70; padding:10px; border-radius:10px; }
.header { background:#2e5a88; color:white; padding:10px; text-align:center; font-size:18px; margin-bottom:10px; border-radius:5px; }
.hint { background:#0A3A6B; color:white; padding:8px; text-align:center; font-size:14px; margin-bottom:10px; border-radius:5px; }
.hint span { color:#ffcc00; font-weight:bold; margin:0 3px; }
.cells { display:flex; gap:3px; justify-content:center; margin-bottom:10px; }
.cell { width:50px; height:50px; background:#E2E8D3; border:2px solid #1f3f5c; text-align:center; font-size:28px; font-weight:bold; line-height:50px; border-radius:5px; }
.history { background:#A6BEEF; min-height:80px; max-height:120px; margin-bottom:10px; padding:5px; border:2px solid #1f3f5c; overflow-y:auto; border-radius:5px; }
.entry { background:#c0d4f5; padding:5px; margin:3px 0; border-radius:3px; font-weight:bold; }
.keypad { display:grid; grid-template-columns:repeat(3, 1fr); gap:5px; margin-bottom:10px; }
.key { background:#3a5f8a; color:white; padding:15px 0; text-align:center; font-size:24px; font-weight:bold; border-radius:5px; border:1px solid #1f3f5c; cursor:pointer; }
.key:active { background:#4CAF50; }
.key.enter { background:#4CAF50; }
.key.esc { background:#dc3545; }
.key.back { background:#ffc107; color:#000; }
.buttons { display:flex; gap:5px; margin-top:5px; }
.btn { flex:1; background:#7496C4; color:white; padding:12px; text-align:center; font-size:16px; font-weight:bold; border-radius:5px; border:1px solid #1f3f5c; cursor:pointer; }
.btn:active { background:#4CAF50; }
.popup { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#2b4b70; border:3px solid #4CAF50; padding:20px; border-radius:10px; text-align:center; color:white; z-index:100; width:250px; }
</style>
</head>
<body>
<div class="phone">
  <div class="header">📦 A-J SCANNER (A=1 B=2 C=3 D=4 E=5 F=6 G=7 H=8 I=9 J=0)</div>
  
  <div class="hint">
    <span>A=1</span> <span>B=2</span> <span>C=3</span> <span>D=4</span> <span>E=5</span>
    <span>F=6</span> <span>G=7</span> <span>H=8</span> <span>I=9</span> <span>J=0</span>
  </div>
  
  <div class="cells">
    <div class="cell" id="cell1"></div>
    <div class="cell" id="cell2"></div>
    <div class="cell" id="cell3"></div>
    <div class="cell" id="cell4"></div>
    <div class="cell" id="cell5"></div>
    <div class="cell" id="cell6"></div>
  </div>
  
  <div class="history" id="history"></div>
  
  <div class="keypad">
    <div class="key" onclick="add('A')">A</div>
    <div class="key" onclick="add('B')">B</div>
    <div class="key" onclick="add('C')">C</div>
    <div class="key" onclick="add('D')">D</div>
    <div class="key" onclick="add('E')">E</div>
    <div class="key" onclick="add('F')">F</div>
    <div class="key" onclick="add('G')">G</div>
    <div class="key" onclick="add('H')">H</div>
    <div class="key" onclick="add('I')">I</div>
    <div class="key" onclick="add('J')">J</div>
    <div class="key back" onclick="back()">⌫</div>
    <div class="key enter" onclick="showStatus()">ENT</div>
  </div>
  
  <div class="buttons">
    <div class="btn" onclick="clearAll()">CLEAR ALL</div>
    <div class="btn" onclick="clearCells()">CLEAR CELLS</div>
  </div>
  
  <!-- Status Screen (hidden by default) -->
  <div id="statusScreen" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); padding:20px; overflow-y:auto; z-index:90;">
    <div style="background:#3f6b9c; border:2px solid #ffcc00; padding:15px; margin:5px 0; text-align:center; border-radius:5px; cursor:pointer; color:white; font-size:18px; font-weight:bold;" onclick="send('Data Received')">📥 DATA RECEIVED</div>
    <div style="background:#3f6b9c; border:2px solid #ffcc00; padding:15px; margin:5px 0; text-align:center; border-radius:5px; cursor:pointer; color:white; font-size:18px; font-weight:bold;" onclick="send('Picked Up')">📬 PICKED UP</div>
    <div style="background:#3f6b9c; border:2px solid #ffcc00; padding:15px; margin:5px 0; text-align:center; border-radius:5px; cursor:pointer; color:white; font-size:18px; font-weight:bold;" onclick="send('Depart Post Office')">🚚 DEPART</div>
    <div style="background:#3f6b9c; border:2px solid #ffcc00; padding:15px; margin:5px 0; text-align:center; border-radius:5px; cursor:pointer; color:white; font-size:18px; font-weight:bold;" onclick="send('Arrival Scan')">📍 ARRIVAL</div>
    <div style="background:#3f6b9c; border:2px solid #ffcc00; padding:15px; margin:5px 0; text-align:center; border-radius:5px; cursor:pointer; color:white; font-size:18px; font-weight:bold;" onclick="send('Local Scan')">🏙️ LOCAL</div>
    <div style="background:#3f6b9c; border:2px solid #ffcc00; padding:15px; margin:5px 0; text-align:center; border-radius:5px; cursor:pointer; color:white; font-size:18px; font-weight:bold;" onclick="send('Out For Delivery')">🛵 OUT</div>
    <div style="background:#3f6b9c; border:2px solid #ffcc00; padding:15px; margin:5px 0; text-align:center; border-radius:5px; cursor:pointer; color:white; font-size:18px; font-weight:bold;" onclick="send('Delivered')">✅ DELIVERED</div>
    <div style="background:#dc3545; border:2px solid #fff; padding:15px; margin:5px 0; text-align:center; border-radius:5px; cursor:pointer; color:white; font-size:18px; font-weight:bold;" onclick="hideStatus()">⬅️ BACK</div>
  </div>
  
  <div class="popup" id="popup">
    <div style="font-size:48px; color:#4CAF50;">✓</div>
    <p id="popupMsg">SENDING...</p>
  </div>
</div>

<script>
// SIMPLE VARIABLES
var cells = [
  document.getElementById('cell1'),
  document.getElementById('cell2'),
  document.getElementById('cell3'),
  document.getElementById('cell4'),
  document.getElementById('cell5'),
  document.getElementById('cell6')
];
var codes = [];
var count = 0;

// ADD LETTER
function add(letter) {
  for (var i = 0; i < 6; i++) {
    if (cells[i].innerHTML === '') {
      cells[i].innerHTML = letter;
      break;
    }
  }
  checkComplete();
}

// BACKSPACE
function back() {
  for (var i = 5; i >= 0; i--) {
    if (cells[i].innerHTML !== '') {
      cells[i].innerHTML = '';
      break;
    }
  }
}

// CLEAR CELLS
function clearCells() {
  for (var i = 0; i < 6; i++) {
    cells[i].innerHTML = '';
  }
}

// CLEAR ALL
function clearAll() {
  codes = [];
  count = 0;
  document.getElementById('history').innerHTML = '';
  clearCells();
}

// CHECK IF ALL CELLS FILLED
function checkComplete() {
  var filled = true;
  var letters = '';
  
  for (var i = 0; i < 6; i++) {
    if (cells[i].innerHTML === '') {
      filled = false;
    } else {
      letters += cells[i].innerHTML;
    }
  }
  
  if (filled && letters.length === 6) {
    // Convert to numbers
    var numbers = '';
    for (var i = 0; i < letters.length; i++) {
      var ch = letters.charAt(i);
      if (ch === 'A') numbers += '1';
      else if (ch === 'B') numbers += '2';
      else if (ch === 'C') numbers += '3';
      else if (ch === 'D') numbers += '4';
      else if (ch === 'E') numbers += '5';
      else if (ch === 'F') numbers += '6';
      else if (ch === 'G') numbers += '7';
      else if (ch === 'H') numbers += '8';
      else if (ch === 'I') numbers += '9';
      else if (ch === 'J') numbers += '0';
    }
    
    count++;
    codes.push({ letters: letters, numbers: numbers });
    
    var history = document.getElementById('history');
    var div = document.createElement('div');
    div.className = 'entry';
    div.innerHTML = '📦 #' + count + ': ' + letters + ' → ' + numbers;
    history.appendChild(div);
    
    clearCells();
  }
}

// SHOW STATUS SCREEN
function showStatus() {
  if (codes.length === 0) {
    alert('Enter a code first');
    return;
  }
  document.getElementById('statusScreen').style.display = 'block';
}

// HIDE STATUS SCREEN
function hideStatus() {
  document.getElementById('statusScreen').style.display = 'none';
}

// SEND TO XANO - SIMPLE AND RELIABLE
function send(status) {
  if (codes.length === 0) {
    hideStatus();
    return;
  }
  
  var popup = document.getElementById('popup');
  var popupMsg = document.getElementById('popupMsg');
  popup.style.display = 'block';
  popupMsg.innerHTML = 'SENDING ' + codes.length + ' CODE(S)...';
  
  var sent = 0;
  var total = codes.length;
  
  for (var i = 0; i < codes.length; i++) {
    var code = codes[i];
    
    var now = new Date();
    
    // Simple date format: YYYY-MM-DD
    var year = now.getFullYear();
    var month = now.getMonth() + 1;
    if (month < 10) month = '0' + month;
    var day = now.getDate();
    if (day < 10) day = '0' + day;
    var dateStr = year + '-' + month + '-' + day;
    
    // Simple time format: HH:MM:SS
    var hours = now.getHours();
    if (hours < 10) hours = '0' + hours;
    var minutes = now.getMinutes();
    if (minutes < 10) minutes = '0' + minutes;
    var seconds = now.getSeconds();
    if (seconds < 10) seconds = '0' + seconds;
    var timeStr = hours + ':' + minutes + ':' + seconds;
    
    // Simple timestamp (seconds since 1970)
    var timestamp = Math.floor(now.getTime() / 1000);
    
    // Simple ETA (tomorrow)
    var eta = new Date(now);
    eta.setDate(eta.getDate() + 1);
    var etaYear = eta.getFullYear();
    var etaMonth = eta.getMonth() + 1;
    if (etaMonth < 10) etaMonth = '0' + etaMonth;
    var etaDay = eta.getDate();
    if (etaDay < 10) etaDay = '0' + etaDay;
    var etaStr = etaYear + '-' + etaMonth + '-' + etaDay;
    
    // Data to send
    var data = {
      label_id: code.numbers,
      barcode_type: 'manual',
      status: status,
      timestamp: timestamp,
      time: timeStr,
      date: dateStr,
      location: 'Unknown',
      eta: etaStr
    };
    
    console.log('Sending:', JSON.stringify(data));
    
    // Create request
    var xhr = new XMLHttpRequest();
    xhr.open('POST', 'https://x8ki-letl-twmt.n7.xano.io/api:WGx5FQAG/qr_scans', true);
    xhr.setRequestHeader('Content-Type', 'application/json');
    
    xhr.onreadystatechange = function() {
      if (xhr.readyState === 4) {
        if (xhr.status === 200 || xhr.status === 201 || xhr.status === 204) {
          sent++;
          console.log('✓ Sent:', code.numbers);
        } else {
          console.log('✗ Failed:', xhr.status, xhr.responseText);
        }
        
        if (sent === total) {
          popupMsg.innerHTML = '✅ ALL ' + total + ' CODES SENT!';
          codes = [];
          document.getElementById('history').innerHTML = '';
          
          setTimeout(function() {
            popup.style.display = 'none';
            hideStatus();
          }, 1500);
        }
      }
    };
    
    xhr.send(JSON.stringify(data));
  }
}
</script>
</body>
</html>
