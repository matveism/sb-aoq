<!DOCTYPE html>
<html>
<head>
    <title>Scanner Frame</title>
    <meta name="viewport" content="width=720, height=1280, initial-scale=1.0">
    <style type="text/css">
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
        }

        /* Device frame */
        #device {
            width: 720px;
            height: 1280px;
            margin: 0 auto;
            background-color: #ffffff;
            border: 2px solid #333333;
            box-sizing: border-box;
            font-family: "Courier New", Courier, monospace;
        }

        /* Small header bar */
        #header {
            height: 60px; /* shrunk header */
            background-color: #dddddd;
            border-bottom: 1px solid #999999;
            padding: 8px 10px;
            box-sizing: border-box;
            font-size: 18px;
        }

        /* Simple float layout (old-school) */
        #time {
            float: left;
        }

        #scan-label {
            float: right;
        }

        /* Clear floats */
        .clear {
            clear: both;
        }

        /* Blank content area */
        #content {
            width: 100%;
            height: 1220px; /* 1280 - 60 header */
            background-color: #ffffff;
        }
    </style>
</head>
<body>
    <div id="device">
        <div id="header">
            <div id="time">10:24 AM</div>
            <div id="scan-label">Scan Barcode</div>
            <div class="clear"></div>
        </div>
        <div id="content">
            <!-- blank inside for this device -->
        </div>
    </div>
</body>
</html>
