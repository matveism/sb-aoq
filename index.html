<!DOCTYPE html>
<html>
<head>
    <title>Simple Barcode Scanner</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Simple QR scanner library -->
    <script src="https://unpkg.com/html5-qrcode@2.3.7/html5-qrcode.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            background: #000;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            padding: 10px;
        }
        
        .container {
            max-width: 500px;
            width: 100%;
            background: #1a1a1a;
            border: 2px solid #333;
            padding: 20px;
        }
        
        h1 {
            color: #00ff00;
            text-align: center;
            margin-bottom: 20px;
            font-size: 24px;
        }
        
        .time-display {
            color: #00ff00;
            text-align: center;
            font-size: 20px;
            margin-bottom: 20px;
            font-family: monospace;
        }
        
        .scan-button {
            width: 100%;
            padding: 20px;
            font-size: 32px;
            background: #333;
            color: white;
            border: 3px solid #666;
            cursor: pointer;
            margin-bottom: 20px;
            font-weight: bold;
        }
        
        .scan-button:hover {
            background: #444;
        }
        
        .barcode-grid {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
        }
        
        .grid-cell {
            flex: 1;
            height: 70px;
            background: #ff9900;
            border: 2px solid #cc7700;
        }
        
        .grid-cell input {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            text-align: center;
            font-size: 36px;
            font-weight: bold;
            color: black;
            text-transform: uppercase;
        }
        
        .status-section {
            margin-bottom: 20px;
        }
        
        .status-label {
            color: #00ff00;
            font-size: 18px;
            margin-bottom: 5px;
        }
        
        select {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            background: #333;
            color: white;
            border: 2px solid #666;
        }
        
        select:disabled {
            opacity: 0.5;
        }
        
        .scanner-container {
            width: 100%;
            margin-bottom: 20px;
            display: none;
        }
        
        #reader {
            width: 100%;
            height: 300px;
            background: #000;
        }
        
        .scanned-list {
            border: 2px solid #333;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .list-header {
            display: flex;
            background: #333;
            padding: 10px;
            color: white;
            font-weight: bold;
        }
        
        .header-num { width: 20%; }
        .header-code { width: 40%; }
        .header-status { width: 40%; }
        
        .list-item {
            display: flex;
            padding: 8px;
            border-bottom: 1px solid #333;
            color: #00ff00;
            font-family: monospace;
        }
        
        .item-num { width: 20%; }
        .item-code { width: 40%; }
        .item-status { width: 40%; }
        
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 30px;
            border-radius: 5px;
            display: none;
            z-index: 9999;
        }
        
        .toast.success {
            background: #00C851;
            color: white;
        }
        
        .toast.error {
            background: #ff4444;
            color: white;
        }
        
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 24px;
            z-index: 9998;
        }
        
        .close-scanner {
            width: 100%;
            padding: 10px;
            background: #ff4444;
            color: white;
            border: none;
            font-size: 18px;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>SCAN BARCODE</h1>
        
        <div class="time-display" id="timeDisplay"></div>
        
        <button class="scan-button" id="scanBtn">SCAN</button>
        
        <div class="barcode-grid">
            <div class="grid-cell"><input type="text" maxlength="1" id="char1"></div>
            <div class="grid-cell"><input type="text" maxlength="1" id="char2"></div>
            <div class="grid-cell"><input type="text" maxlength="1" id="char3"></div>
            <div class="grid-cell"><input type="text" maxlength="1" id="char4"></div>
            <div class="grid-cell"><input type="text" maxlength="1" id="char5"></div>
            <div class="grid-cell"><input type="text" maxlength="1" id="char6"></div>
        </div>
        
        <div class="status-section">
            <div class="status-label">STATUS</div>
            <select id="statusSelect" disabled>
                <option value="">Select Status</option>
                <option value="Item Booked">Item Booked</option>
                <option value="Item Received">Item Received</option>
                <option value="Item Bagged">Item Bagged</option>
                <option value="Item Dispatched">Item Dispatched</option>
                <option value="In Transit">In Transit</option>
                <option value="Out for Delivery">Out for Delivery</option>
                <option value="Item Delivered">Item Delivered</option>
            </select>
        </div>
        
        <div class="scanner-container" id="scannerContainer">
            <div id="reader"></div>
            <button class="close-scanner" id="closeScanner">Close Camera</button>
        </div>
        
        <div class="scanned-list">
            <div class="list-header">
                <div class="header-num">#</div>
                <div class="header-code">CODE</div>
                <div class="header-status">STATUS</div>
            </div>
            <div id="scannedItems"></div>
        </div>
    </div>
    
    <div class="loading" id="loading">Sending to database...</div>
    <div class="toast success" id="successToast">Success!</div>
    <div class="toast error" id="errorToast">Error!</div>

    <script>
        // XANO API
        const XANO_URL = 'https://x8ki-letl-twmt.n7.xano.io/api:WGx5FQAG/qr_scans';
        
        // State
        let scanner = null;
        let isScanning = false;
        let scannedItems = [];
        let itemId = 1;
        
        // DOM elements
        const scanBtn = document.getElementById('scanBtn');
        const closeScanner = document.getElementById('closeScanner');
        const scannerContainer = document.getElementById('scannerContainer');
        const statusSelect = document.getElementById('statusSelect');
        const loading = document.getElementById('loading');
        const successToast = document.getElementById('successToast');
        const errorToast = document.getElementById('errorToast');
        
        // Time update
        function updateTime() {
            const now = new Date();
            const time = now.toLocaleTimeString();
            document.getElementById('timeDisplay').textContent = time;
        }
        setInterval(updateTime, 1000);
        updateTime();
        
        // Grid input handling
        const inputs = [1,2,3,4,5,6].map(i => document.getElementById('char' + i));
        
        inputs.forEach((input, index) => {
            input.addEventListener('input', function(e) {
                this.value = this.value.toUpperCase().slice(0,1);
                if (this.value && index < 5) {
                    inputs[index + 1].focus();
                }
                checkGridFilled();
            });
            
            input.addEventListener('keydown', function(e) {
                if (e.key === 'Backspace' && !this.value && index > 0) {
                    inputs[index - 1].focus();
                    inputs[index - 1].value = '';
                }
                checkGridFilled();
            });
        });
        
        function checkGridFilled() {
            const allFilled = inputs.every(input => input.value);
            statusSelect.disabled = !allFilled;
        }
        
        function clearGrid() {
            inputs.forEach(input => input.value = '');
            inputs[0].focus();
            statusSelect.disabled = true;
            statusSelect.value = '';
        }
        
        // Scanner functions
        function startScanner() {
            try {
                if (!scanner) {
                    scanner = new Html5Qrcode("reader");
                }
                
                scannerContainer.style.display = 'block';
                
                scanner.start(
                    { facingMode: "environment" },
                    { fps: 10, qrbox: 250 },
                    (decodedText) => {
                        // Success
                        console.log('Scanned:', decodedText);
                        
                        // Fill grid
                        const barcode = decodedText.slice(0,6);
                        for (let i = 0; i < 6; i++) {
                            if (inputs[i]) {
                                inputs[i].value = barcode[i]?.toUpperCase() || '';
                            }
                        }
                        
                        // Stop scanner
                        stopScanner();
                        
                        // Check grid
                        checkGridFilled();
                        
                        // Beep
                        try {
                            const audio = new AudioContext();
                            const osc = audio.createOscillator();
                            osc.connect(audio.destination);
                            osc.frequency.value = 800;
                            osc.start();
                            osc.stop(0.1);
                        } catch(e) {}
                    },
                    (error) => {
                        // Ignore errors
                    }
                ).then(() => {
                    isScanning = true;
                }).catch((err) => {
                    console.log('Camera error:', err);
                    scannerContainer.style.display = 'none';
                    showError('Cannot access camera');
                });
            } catch(err) {
                console.log('Scanner error:', err);
                showError('Scanner failed to start');
            }
        }
        
        function stopScanner() {
            if (scanner && isScanning) {
                scanner.stop().then(() => {
                    isScanning = false;
                    scannerContainer.style.display = 'none';
                }).catch(() => {});
            } else {
                scannerContainer.style.display = 'none';
            }
        }
        
        // API function
        async function sendToXano(barcode, status) {
            loading.style.display = 'flex';
            
            try {
                const now = new Date();
                const data = {
                    created_at: now.getTime(),
                    epochs: now.getTime(),
                    label_id: barcode,
                    text: status,
                    barcode_type: 'QR_CODE',
                    status: status,
                    date: now.toISOString().split('T')[0],
                    time: now.toTimeString().split(' ')[0],
                    location: 'Default',
                    eta: 'N/A',
                    timestamp: now.getTime()
                };
                
                console.log('Sending:', data);
                
                const response = await fetch(XANO_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if (!response.ok) throw new Error('Failed');
                
                loading.style.display = 'none';
                successToast.style.display = 'block';
                setTimeout(() => successToast.style.display = 'none', 2000);
                
                return true;
                
            } catch(err) {
                loading.style.display = 'none';
                showError('Failed to send to database');
                return false;
            }
        }
        
        function showError(msg) {
            errorToast.textContent = msg;
            errorToast.style.display = 'block';
            setTimeout(() => errorToast.style.display = 'none', 3000);
        }
        
        function addToList(barcode, status) {
            const item = {
                id: itemId++,
                barcode: barcode.padStart(6,'0').slice(0,6),
                status: status
            };
            
            scannedItems.unshift(item);
            if (scannedItems.length > 20) scannedItems.pop();
            
            const container = document.getElementById('scannedItems');
            container.innerHTML = scannedItems.map(i => `
                <div class="list-item">
                    <div class="item-num">${i.id}</div>
                    <div class="item-code">${i.barcode}</div>
                    <div class="item-status">${i.status}</div>
                </div>
            `).join('');
        }
        
        // Event listeners
        scanBtn.onclick = (e) => {
            e.preventDefault();
            startScanner();
        };
        
        closeScanner.onclick = () => stopScanner();
        
        statusSelect.onchange = async () => {
            const barcode = inputs.map(i => i.value).join('');
            const status = statusSelect.value;
            
            if (barcode.length === 6 && status) {
                const sent = await sendToXano(barcode, status);
                if (sent) {
                    addToList(barcode, status);
                    clearGrid();
                    statusSelect.value = '';
                }
            }
        };
        
        // Start
        inputs[0].focus();
        console.log('Ready');
    </script>
</body>
</html>
