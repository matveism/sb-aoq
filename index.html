<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PRODUCTION XANO SCANNER</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#000; display:flex; justify-content:center; align-items:center; min-height:100vh; font-family:Roboto,Arial,sans-serif; }
    .device { width:100%; max-width:400px; background:#B0C8E2; display:flex; flex-direction:column; border-radius:15px; overflow:hidden; }
    .header { background:#15569B; color:white; height:60px; display:flex; align-items:center; justify-content:space-between; padding:0 16px; font-size:20px; font-weight:bold; }
    .time-display { background:#1e3a6b; padding:8px 16px; border-radius:30px; font-size:18px; font-family:monospace; min-width:110px; text-align:center; border:1px solid #79A4D2; }
    .scan-row { display:flex; align-items:center; padding:12px 16px; gap:10px; background:#B0C8E2; border-bottom:2px solid #79A4D2; }
    .submit-btn { background:#28a745; color:white; border:none; width:70px; height:55px; border-radius:8px; font-size:20px; font-weight:bold; cursor:pointer; }
    .grid-container { display:flex; gap:4px; flex:1; justify-content:flex-end; }
    .cell { width:40px; height:55px; background:white; border:2px solid #666; border-radius:8px; text-align:center; font-size:28px; font-weight:bold; text-transform:uppercase; outline:none; }
    .cell:focus { border:3px solid #FCC57A; background:#FB9809; }
    .content { padding:16px; background:#B0C8E2; }
    .field { margin-bottom:15px; }
    .field label { display:block; font-size:14px; font-weight:bold; color:#15569B; margin-bottom:4px; }
    .field input, .field select { width:100%; padding:12px; border:2px solid #79A4D2; border-radius:8px; font-size:14px; background:white; }
    .field input[readonly] { background:#e2e8d3; font-weight:bold; }
    .gps-status { font-size:12px; color:#15569B; margin-top:4px; }
    .status-message { padding:12px; text-align:center; background:white; border-radius:8px; border:2px solid #79A4D2; font-size:14px; font-weight:bold; margin-top:10px; }
    .popup { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:200px; background:white; border:4px solid #28a745; border-radius:20px; text-align:center; padding:20px; display:none; z-index:999; }
    .popup .circle { width:60px; height:60px; background:#28a745; border-radius:50%; margin:0 auto 10px; color:white; font-size:40px; line-height:60px; }
    .result-section { border:2px solid #79A4D2; border-radius:8px; overflow:hidden; background:white; margin-bottom:16px; }
    .result-header { display:flex; background:#79A4D2; border-bottom:2px solid #15569B; }
    .result-header div:first-child { width:45px; padding:10px; text-align:center; border-right:2px solid #15569B; font-weight:bold; }
    .result-header div:last-child { flex:1; padding:10px; font-weight:bold; }
    .result-row { display:flex; border-bottom:1px solid #79A4D2; }
    .result-row div:first-child { width:45px; padding:10px; text-align:center; border-right:1px solid #79A4D2; }
    .result-row div:last-child { flex:1; padding:10px; font-size:12px; }
    #empty-message { padding:15px; color:#666; font-style:italic; text-align:center; }
  </style>
</head>
<body>
  <div class="device">
    <div class="header">
      <span>SCAN BARCODE</span>
      <span class="time-display" id="currentTime"></span>
    </div>
    
    <div class="scan-row">
      <button class="submit-btn" id="submitButton">OK</button>
      <div class="grid-container">
        <input class="cell" maxlength="1" id="cell1">
        <input class="cell" maxlength="1" id="cell2">
        <input class="cell" maxlength="1" id="cell3">
        <input class="cell" maxlength="1" id="cell4">
        <input class="cell" maxlength="1" id="cell5">
        <input class="cell" maxlength="1" id="cell6">
      </div>
    </div>
    
    <div class="content">
      <div class="field">
        <label>Label ID (A-J → 1-0)</label>
        <input type="text" id="labelId" readonly placeholder="---">
      </div>
      <div class="field">
        <label>Barcode Type</label>
        <input type="text" id="barcodeType" value="manual" readonly>
      </div>
      <div class="field">
        <label>Status</label>
        <select id="statusSelect">
          <option value="Received">📥 Received</option>
          <option value="Picked Up">📬 Picked Up</option>
          <option value="Depart">🚚 Depart</option>
          <option value="Arrival">📍 Arrival</option>
        </select>
      </div>
      <div class="field">
        <label>📍 Location (Auto GPS)</label>
        <input type="text" id="locationField" readonly placeholder="Detecting location...">
        <div class="gps-status" id="gpsStatus">Getting GPS...</div>
      </div>
      <div class="field">
        <label>📅 ETA</label>
        <input type="date" id="etaField">
      </div>
      
      <div class="result-section">
        <div class="result-header">
          <div>#</div>
          <div>SCAN RECORD</div>
        </div>
        <div id="tableBody"></div>
        <div id="empty-message">No scans yet</div>
      </div>
      
      <div class="status-message" id="messageBox">Ready</div>
    </div>
    
    <div class="popup" id="successPopup">
      <div class="circle">✓</div>
      <p>SAVED TO XANO</p>
      <div id="popupTime"></div>
    </div>
  </div>

  <script>
  // ===== PRODUCTION XANO CONFIGURATION =====
  var XANO_BASE_URL = 'https://x8ki-letl-twmt.n7.xano.io/api:WGx5FQAG';
  var XANO_TABLE = 'qr_scans'; // <-- Ensure this is the correct table name
  
  var XANO_URL = XANO_BASE_URL + '/' + XANO_TABLE;

  // ===== TIME DISPLAY =====
  function updateTime() {
    var timeEl = document.getElementById('currentTime');
    if (!timeEl) return;
    var now = new Date();
    var hours = now.getHours().toString().padStart(2,'0');
    var minutes = now.getMinutes().toString().padStart(2,'0');
    var seconds = now.getSeconds().toString().padStart(2,'0');
    timeEl.innerHTML = hours + ':' + minutes + ':' + seconds;
  }
  updateTime();
  setInterval(updateTime, 1000);

  // ===== AUTO GPS =====
  function getGPS() {
    var locField = document.getElementById('locationField');
    var gpsStatus = document.getElementById('gpsStatus');
    
    if (!navigator.geolocation) {
      locField.value = 'GPS not supported';
      gpsStatus.innerHTML = 'Not available';
      return;
    }

    gpsStatus.innerHTML = '📍 Getting GPS...';
    navigator.geolocation.getCurrentPosition(
      function(position) {
        var lat = position.coords.latitude.toFixed(4);
        var lon = position.coords.longitude.toFixed(4);
        var acc = Math.round(position.coords.accuracy);
        locField.value = lat + ', ' + lon;
        gpsStatus.innerHTML = '✅ GPS: ±' + acc + 'm';
      },
      function(error) {
        var msg = 'GPS error';
        if (error.code === 1) msg = 'Permission denied';
        else if (error.code === 2) msg = 'Unavailable';
        else if (error.code === 3) msg = 'Timeout';
        locField.value = 'Tap to retry GPS';
        gpsStatus.innerHTML = '❌ ' + msg;
      }
    );
  }

  // ===== CELLS HANDLING =====
  var cells = [
    document.getElementById('cell1'),
    document.getElementById('cell2'),
    document.getElementById('cell3'),
    document.getElementById('cell4'),
    document.getElementById('cell5'),
    document.getElementById('cell6')
  ];

  var letterMap = {
    'A':'1','B':'2','C':'3','D':'4','E':'5',
    'F':'6','G':'7','H':'8','I':'9','J':'0'
  };

  for (var i = 0; i < cells.length; i++) {
    cells[i].addEventListener('input', function() {
      var val = this.value.toUpperCase();
      if (val.match(/[A-J]/)) {
        this.value = val;
        updateLabel();
        var next = this.nextElementSibling;
        if (next) next.focus();
      } else {
        this.value = '';
      }
    });
  }

  function updateLabel() {
    var code = '';
    for (var i = 0; i < cells.length; i++) code += cells[i].value;
    var num = '';
    for (var i = 0; i < code.length; i++) num += letterMap[code[i]] || '';
    document.getElementById('labelId').value = num;
  }

  // ===== BEEP =====
  function beep() {
    try {
      var ctx = new (window.AudioContext || window.webkitAudioContext)();
      var osc = ctx.createOscillator();
      osc.connect(ctx.destination);
      osc.frequency.value = 800;
      osc.start();
      osc.stop(ctx.currentTime + 0.1);
    } catch(e) {}
  }

  // ===== ADD TO LOCAL TABLE =====
  var scanCounter = 0;

  function addToTable(labelId) {
    scanCounter++;
    var emptyMsg = document.getElementById('empty-message');
    if (emptyMsg) emptyMsg.style.display = 'none';
    
    var tableBody = document.getElementById('tableBody');
    var row = document.createElement('div');
    row.className = 'result-row';
    
    var now = new Date();
    var timeStr = now.getHours() + ':' + 
                 (now.getMinutes() < 10 ? '0' + now.getMinutes() : now.getMinutes()) + ':' + 
                 (now.getSeconds() < 10 ? '0' + now.getSeconds() : now.getSeconds());
    
    row.innerHTML = '<div>' + scanCounter + '</div><div>' + labelId + ' @ ' + timeStr + '</div>';
    tableBody.appendChild(row);
  }

  // ===== SEND TO XANO =====
  function sendToXano() {
    var letters = '';
    for (var i = 0; i < cells.length; i++) letters += cells[i].value;

    if (letters.length !== 6) {
      document.getElementById('messageBox').innerHTML = '❌ Enter 6 letters A-J';
      return;
    }

    var numbers = '';
    for (var i = 0; i < letters.length; i++) numbers += letterMap[letters[i]];

    var data = {
      label_id: numbers,
      barcode_type: 'manual',
      status: document.getElementById('statusSelect').value,
      date: new Date().toISOString().split('T')[0],
      time: Math.floor(new Date().getTime() / 1000),
      location: document.getElementById('locationField').value || 'Unknown',
      eta: document.getElementById('etaField').value
    };

    document.getElementById('messageBox').innerHTML = '⏳ Sending to XANO...';

    var xhr = new XMLHttpRequest();
    xhr.open('POST', XANO_URL, true);
    xhr.setRequestHeader('Content-Type', 'application/json');

    xhr.onload = function() {
      beep();
      if (xhr.status >= 200 && xhr.status < 300) {
        document.getElementById('messageBox').innerHTML = '✅ SAVED TO XANO';
        document.getElementById('successPopup').style.display = 'block';
        document.getElementById('popupTime').innerHTML = new Date().toLocaleTimeString();
        setTimeout(function() { 
          document.getElementById('successPopup').style.display = 'none'; 
        }, 1500);
        
        addToTable(numbers);
        
        // Clear cells
        for (var i = 0; i < cells.length; i++) cells[i].value = '';
        cells[0].focus();
        document.getElementById('labelId').value = '';
      } else {
        var errorMsg = `❌ Error ${xhr.status}: ${xhr.responseText || 'Check table name'}`;
        document.getElementById('messageBox').innerHTML = errorMsg;
        beep();
      }
    };

    xhr.onerror = function() {
      beep();
      document.getElementById('messageBox').innerHTML = '❌ Cannot reach XANO - Check URL';
    };

    xhr.send(JSON.stringify(data));
  }

  // ===== EVENT LISTENERS =====
  document.getElementById('locationField').addEventListener('click', getGPS);
  document.getElementById('submitButton').onclick = function(e) {
    e.preventDefault();
    sendToXano();
  };

  // ===== INIT =====
  var today = new Date().toISOString().split('T')[0];
  document.getElementById('etaField').value = today;

  cells[0].focus();
  setTimeout(getGPS, 500);
</script>
</body>
</html>
