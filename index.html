<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Courier Scanner - FINAL FIX</title>
  <style>
    body {
      background: #000000;
      margin: 0;
      padding: 5px;
      font-family: Arial, Helvetica, sans-serif;
    }
    
    .phone {
      max-width: 360px;
      margin: 0 auto;
      background: #B0C8E2;
      border: 2px solid #333;
      padding: 8px;
    }
    
    .header {
      background: #15569B;
      color: white;
      padding: 6px 10px;
      margin-bottom: 8px;
      font-size: 16px;
      font-weight: bold;
    }
    
    .header span {
      float: right;
    }
    
    .submit-btn {
      background: #28a745;
      color: white;
      border: 2px solid #1e7e34;
      padding: 12px 15px;
      font-size: 20px;
      font-weight: bold;
      width: 100%;
      margin-bottom: 10px;
      border-radius: 5px;
      cursor: pointer;
    }
    
    .mini-grid {
      background: #96BEEE;
      padding: 10px;
      margin-bottom: 10px;
      text-align: center;
    }
    
    .cell-box {
      display: inline-block;
      width: 45px;
      margin: 2px;
    }
    
    .cell-box input {
      width: 100%;
      height: 40px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      background: #E2E8D3;
      border: 2px solid #666;
    }
    
    .field {
      background: #96BEEE;
      padding: 10px;
      margin-bottom: 8px;
      border: 2px solid #79A4D2;
    }
    
    .field label {
      display: block;
      font-weight: bold;
      font-size: 14px;
      color: #15569B;
      margin-bottom: 4px;
    }
    
    .field input, .field select {
      width: 100%;
      padding: 8px;
      font-size: 16px;
      border: 2px solid #79A4D2;
      background: white;
      box-sizing: border-box;
    }
    
    .field input[readonly] {
      background: #E2E8D3;
      font-weight: bold;
    }
    
    .result-box {
      border: 2px solid #79A4D2;
      background: #96BEEE;
      margin-top: 10px;
    }
    
    .result-header {
      background: #79A4D2;
      padding: 8px;
      font-weight: bold;
      border-bottom: 2px solid #333;
    }
    
    .result-row {
      padding: 8px;
      border-bottom: 1px solid #666;
      overflow: hidden;
    }
    
    .result-row div {
      float: left;
    }
    
    .result-num {
      width: 40px;
      font-weight: bold;
    }
    
    .result-val {
      font-weight: bold;
    }
    
    .popup {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 200px;
      margin-left: -100px;
      margin-top: -70px;
      background: white;
      border: 5px solid #28a745;
      padding: 20px;
      text-align: center;
      display: none;
      z-index: 9999;
      font-size: 18px;
      font-weight: bold;
    }
    
    .error {
      color: #b52e2e;
      font-weight: bold;
      margin-top: 5px;
    }
    
    .success {
      color: #1e7e34;
    }
    
    .clearfix {
      clear: both;
    }
    
    /* Hidden iframe for form submission */
    #submitFrame {
      display: none;
    }
  </style>
</head>
<body>

<div class="phone">

  <div class="header">
    COURIER SCANNER 
    <span id="timeDisplay">--:--</span>
  </div>

  <button class="submit-btn" id="submitBtn" onclick="submitForm()">📤 SUBMIT TO XANO</button>

  <div class="mini-grid">
    <div class="cell-box"><input type="text" maxlength="1" id="cell1" onkeyup="cellChanged(1)" onkeydown="handleBackspace(event, 1)"></div>
    <div class="cell-box"><input type="text" maxlength="1" id="cell2" onkeyup="cellChanged(2)" onkeydown="handleBackspace(event, 2)"></div>
    <div class="cell-box"><input type="text" maxlength="1" id="cell3" onkeyup="cellChanged(3)" onkeydown="handleBackspace(event, 3)"></div>
    <div class="cell-box"><input type="text" maxlength="1" id="cell4" onkeyup="cellChanged(4)" onkeydown="handleBackspace(event, 4)"></div>
    <div class="cell-box"><input type="text" maxlength="1" id="cell5" onkeyup="cellChanged(5)" onkeydown="handleBackspace(event, 5)"></div>
    <div class="cell-box"><input type="text" maxlength="1" id="cell6" onkeyup="cellChanged(6)" onkeydown="handleBackspace(event, 6)"></div>
    <div class="clearfix"></div>
  </div>

  <div class="field">
    <label>Decoded Label ID</label>
    <input type="text" id="decoded" readonly>
  </div>

  <div class="field">
    <label>Entry Type</label>
    <input type="text" id="barcode_type" value="manual" readonly>
  </div>

  <div class="field">
    <label>Status</label>
    <select id="status">
      <option value="Data Received">Data Received</option>
      <option value="Picked Up">Picked Up</option>
      <option value="Depart Post Office">Depart Post Office</option>
      <option value="Arrival Scan">Arrival Scan</option>
      <option value="Local Scan">Local Scan</option>
      <option value="Out For Delivery">Out For Delivery</option>
      <option value="Delivered">Delivered</option>
    </select>
  </div>

  <div class="field">
    <label>Location</label>
    <input type="text" id="location" placeholder="City, State">
  </div>

  <div class="field">
    <label>ETA</label>
    <input type="text" id="eta" placeholder="e.g., 2026-02-21">
  </div>

  <div class="result-box">
    <div class="result-header">LABEL ID HISTORY</div>
    <div id="historyContainer">
      <div class="result-row" id="emptyHistoryRow">
        <div class="result-num"></div>
        <div class="result-val"></div>
        <div class="clearfix"></div>
      </div>
    </div>
  </div>

  <div id="statusMessage" class="error"></div>

</div>

<div class="popup" id="successPopup">
  <div style="font-size:40px; color:#28a745;">✓</div>
  SENT TO XANO<br>
  <span id="popupTime"></span>
</div>

<!-- HIDDEN IFRAME FOR FORM SUBMISSION -->
<iframe id="submitFrame" name="submitFrame"></iframe>

<!-- REAL FORM - URL ENCODED (WHAT XANO EXPECTS) -->
<form id="xanoForm" method="POST" action="https://x8ki-letl-twmt.n7.xano.io/api:WGx5FQAG/qr_scans" target="submitFrame" style="display:none">
  <input type="text" name="label_id" id="form_label_id">
  <input type="text" name="barcode_type" id="form_barcode_type">
  <input type="text" name="status" id="form_status">
  <input type="text" name="timestamp" id="form_timestamp">
  <input type="text" name="time" id="form_time">
  <input type="text" name="date" id="form_date">
  <input type="text" name="location" id="form_location">
  <input type="text" name="eta" id="form_eta">
</form>

<script>
  // ===== TIME UPDATE =====
  function updateTime() {
    var d = new Date();
    var hours = d.getHours();
    var mins = d.getMinutes();
    var secs = d.getSeconds();
    if (hours < 10) hours = "0" + hours;
    if (mins < 10) mins = "0" + mins;
    if (secs < 10) secs = "0" + secs;
    document.getElementById('timeDisplay').innerHTML = hours + ":" + mins + ":" + secs;
  }
  updateTime();
  setInterval(updateTime, 1000);

  // ===== CELL HANDLING =====
  var cells = [
    document.getElementById('cell1'),
    document.getElementById('cell2'),
    document.getElementById('cell3'),
    document.getElementById('cell4'),
    document.getElementById('cell5'),
    document.getElementById('cell6')
  ];
  
  function cellChanged(num) {
    var index = num - 1;
    var cell = cells[index];
    
    cell.value = cell.value.toUpperCase();
    
    if (cell.value.length == 1 && index < 5) {
      cells[index + 1].focus();
    }
    
    checkAllCells();
  }
  
  function handleBackspace(e, num) {
    var index = num - 1;
    if (e.keyCode == 8) {
      var cell = cells[index];
      if (cell.value == "" && index > 0) {
        cells[index - 1].focus();
      }
    }
  }
  
  function checkAllCells() {
    var code = "";
    for (var i = 0; i < 6; i++) {
      code += cells[i].value;
    }
    
    if (code.length == 6) {
      var decoded = decodeLetters(code);
      if (decoded) {
        document.getElementById('decoded').value = decoded;
        addToHistory(code);
      } else {
        alert("Use only letters A-J");
      }
    }
  }
  
  function decodeLetters(encoded) {
    var result = "";
    for (var i = 0; i < encoded.length; i++) {
      var ch = encoded.charAt(i);
      if (ch == 'A') result += "1";
      else if (ch == 'B') result += "2";
      else if (ch == 'C') result += "3";
      else if (ch == 'D') result += "4";
      else if (ch == 'E') result += "5";
      else if (ch == 'F') result += "6";
      else if (ch == 'G') result += "7";
      else if (ch == 'H') result += "8";
      else if (ch == 'I') result += "9";
      else if (ch == 'J') result += "0";
      else return null;
    }
    return result;
  }
  
  // ===== HISTORY =====
  var historyCount = 0;
  
  function addToHistory(value) {
    historyCount++;
    document.getElementById('emptyHistoryRow').style.display = "none";
    
    var container = document.getElementById('historyContainer');
    var newRow = document.createElement('div');
    newRow.className = 'result-row';
    newRow.innerHTML = '<div class="result-num">' + historyCount + '</div>' +
                       '<div class="result-val">' + value + '</div>' +
                       '<div class="clearfix"></div>';
    container.appendChild(newRow);
  }
  
  function showPopup() {
    var d = new Date();
    document.getElementById('popupTime').innerHTML = d.toLocaleDateString() + " " + d.toLocaleTimeString();
    document.getElementById('successPopup').style.display = 'block';
    setTimeout(function() {
      document.getElementById('successPopup').style.display = 'none';
    }, 2000);
  }
  
  function setStatus(msg, isError) {
    var box = document.getElementById('statusMessage');
    box.innerHTML = msg;
    box.className = isError ? 'error' : 'success';
  }
  
  // ===== FINAL SUBMIT FUNCTION =====
  function submitForm() {
    var labelId = document.getElementById('decoded').value;
    
    if (!labelId) {
      setStatus("❗ Enter a barcode first", true);
      return;
    }
    
    var now = new Date();
    var timestampSec = Math.floor(now.getTime() / 1000);
    var timestampMs = now.getTime();
    var dateStr = now.getFullYear() + '-' + 
                  ('0' + (now.getMonth()+1)).slice(-2) + '-' + 
                  ('0' + now.getDate()).slice(-2);
    
    // Set ALL form values
    document.getElementById('form_label_id').value = labelId;
    document.getElementById('form_barcode_type').value = "manual";
    document.getElementById('form_status').value = document.getElementById('status').value;
    document.getElementById('form_timestamp').value = timestampSec;
    document.getElementById('form_time').value = timestampMs;
    document.getElementById('form_date').value = dateStr;
    document.getElementById('form_location').value = document.getElementById('location').value || "";
    document.getElementById('form_eta').value = document.getElementById('eta').value || "";
    
    // Log what we're sending
    console.log("Submitting to XANO:");
    console.log("label_id: " + labelId);
    console.log("timestamp: " + timestampSec);
    console.log("time: " + timestampMs);
    
    setStatus("Sending to XANO...", false);
    
    // Show popup optimistically
    showPopup();
    
    // Submit the form to the hidden iframe
    document.getElementById('xanoForm').submit();
    
    // Clear cells
    for (var i = 0; i < 6; i++) {
      cells[i].value = "";
    }
    document.getElementById('decoded').value = "";
    
    setStatus("✓ Form submitted - check XANO", false);
  }
  
  // ===== ENTER KEY =====
  for (var i = 0; i < cells.length; i++) {
    cells[i].onkeypress = function(e) {
      if (e.keyCode == 13) {
        submitForm();
        return false;
      }
    };
  }
  
  window.onload = function() {
    cells[0].focus();
  };
</script>

</body>
</html>
