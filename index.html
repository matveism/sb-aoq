<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Android 5.0 Barcode Scanner - FIXED</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    * {
      -webkit-box-sizing: border-box;
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: Roboto, Arial, sans-serif;
      padding: 5px;
    }
    .device {
      width: 100%;
      max-width: 400px;
      background: #B0C8E2;
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 20px rgba(0,0,0,0.7);
      border-radius: 15px;
      overflow: hidden;
    }
    .header {
      background: #15569B;
      color: white;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      font-size: 18px;
      font-weight: bold;
    }
    .time-display {
      background: #1e3a6b;
      padding: 5px 12px;
      border-radius: 20px;
      font-family: monospace;
      font-size: 16px;
      color: white;
      border: 1px solid #79A4D2;
      min-width: 100px;
      text-align: center;
    }
    .scan-row {
      display: flex;
      align-items: center;
      padding: 12px;
      gap: 8px;
      background: #B0C8E2;
      border-bottom: 2px solid #79A4D2;
    }
    .submit-btn {
      background: #28a745;
      color: white;
      border: 2px solid #1e7e34;
      width: 70px;
      height: 50px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }
    .grid-container {
      display: flex;
      gap: 3px;
      flex: 1;
      justify-content: flex-end;
    }
    .cell {
      width: 30px;
      height: 50px;
      background: white;
      border: 2px solid #666;
      border-radius: 6px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
      text-transform: uppercase;
      outline: none;
    }
    .cell:focus {
      border: 3px solid #FCC57A;
      background: #FB9809;
    }
    .content {
      flex: 1;
      padding: 12px;
      overflow-y: auto;
      background: #B0C8E2;
      max-height: 550px;
    }
    .status-section {
      background: #96BEEE;
      border: 2px solid #79A4D2;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .field {
      margin-bottom: 10px;
    }
    .field label {
      display: block;
      font-size: 13px;
      font-weight: bold;
      color: #15569B;
      margin-bottom: 3px;
    }
    .location-row {
      display: flex;
      gap: 5px;
      align-items: center;
    }
    .location-row input {
      flex: 1;
      padding: 8px;
      border: 2px solid #79A4D2;
      border-radius: 6px;
      font-size: 14px;
      background: white;
      height: 40px;
    }
    .gps-btn {
      background: #15569B;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 8px;
      font-size: 18px;
      cursor: pointer;
      height: 40px;
      width: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .field input, .field select {
      width: 100%;
      padding: 8px;
      border: 2px solid #79A4D2;
      border-radius: 6px;
      font-size: 14px;
      background: white;
      height: 40px;
    }
    .field input[readonly] {
      background: #e2e8d3;
      font-weight: bold;
      color: #15569B;
    }
    .gps-status {
      font-size: 11px;
      color: #15569B;
      margin-top: 3px;
      padding-left: 4px;
    }
    .result-section {
      border: 2px solid #79A4D2;
      border-radius: 8px;
      overflow: hidden;
      background: #96BEEE;
      margin-bottom: 12px;
    }
    .result-header {
      display: flex;
      background: #79A4D2;
      border-bottom: 2px solid #15569B;
    }
    .result-header div:first-child {
      width: 45px;
      padding: 8px;
      text-align: center;
      border-right: 2px solid #15569B;
      color: white;
      font-weight: bold;
    }
    .result-header div:last-child {
      flex: 1;
      padding: 8px;
      color: white;
      font-weight: bold;
    }
    .result-row {
      display: flex;
      border-bottom: 1px solid #79A4D2;
      background: white;
    }
    .result-row div:first-child {
      width: 45px;
      padding: 8px;
      text-align: center;
      border-right: 1px solid #79A4D2;
    }
    .result-row div:last-child {
      flex: 1;
      padding: 8px;
      font-size: 12px;
    }
    #empty-message {
      padding: 10px;
      color: #666;
      font-style: italic;
      text-align: center;
      background: white;
    }
    .status-message {
      padding: 8px;
      text-align: center;
      background: white;
      border-radius: 6px;
      min-height: 40px;
      border: 2px solid #79A4D2;
      font-size: 13px;
    }
    .popup {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 180px;
      background: white;
      border: 4px solid #28a745;
      border-radius: 20px;
      text-align: center;
      padding: 15px;
      display: none;
      z-index: 999;
    }
    .popup .circle {
      width: 50px;
      height: 50px;
      background: #28a745;
      border-radius: 50%;
      margin: 0 auto 8px;
      color: white;
      font-size: 30px;
      line-height: 50px;
    }
    .mode-badge {
      background: #15569B;
      color: white;
      padding: 3px 8px;
      border-radius: 12px;
      font-size: 11px;
      display: inline-block;
      margin-left: 5px;
    }
  </style>
</head>
<body>
  <div class="device">
    <div class="header">
      <span>SCAN BARCODE</span>
      <span class="time-display" id="currentTime">--:--:--</span>
    </div>
    
    <div class="scan-row">
      <button class="submit-btn" id="submitButton">OK</button>
      <div class="grid-container">
        <input class="cell" maxlength="1" id="cell1" value="A">
        <input class="cell" maxlength="1" id="cell2" value="B">
        <input class="cell" maxlength="1" id="cell3" value="C">
        <input class="cell" maxlength="1" id="cell4" value="D">
        <input class="cell" maxlength="1" id="cell5" value="E">
        <input class="cell" maxlength="1" id="cell6" value="F">
      </div>
    </div>
    
    <div class="content">
      <div class="status-section">
        <div class="field">
          <label>Label ID (Numeric) <span class="mode-badge" id="modeDisplay">LIVE</span></label>
          <input type="text" id="labelId" readonly placeholder="---" value="123456">
        </div>
        <div class="field">
          <label>Type</label>
          <input type="text" id="scanType" value="manual" readonly>
        </div>
        <div class="field">
          <label>Status</label>
          <select id="statusSelect">
            <option value="Received" selected>📥 Received</option>
            <option value="Picked Up">📬 Picked Up</option>
            <option value="Depart">🚚 Depart</option>
            <option value="Arrival">📍 Arrival</option>
          </select>
        </div>
        <div class="field">
          <label>📍 Location (GPS)</label>
          <div class="location-row">
            <input type="text" id="locationField" readonly value="Press 📍 for GPS">
            <button class="gps-btn" id="gpsBtn">📍</button>
          </div>
          <div class="gps-status" id="gpsStatus">Ready - Tap 📍 for GPS</div>
        </div>
        <div class="field">
          <label>📅 ETA</label>
          <input type="date" id="etaField">
        </div>
      </div>
      
      <div class="result-section">
        <div class="result-header">
          <div>#</div>
          <div>SCAN RECORD</div>
        </div>
        <div id="tableBody"></div>
        <div id="empty-message">No scans yet</div>
      </div>
      
      <div class="status-message" id="messageBox">Ready - Testing connection...</div>
    </div>
    
    <div class="popup" id="successPopup">
      <div class="circle">✓</div>
      <p>SAVED</p>
      <div class="popup-time" id="popupTime"></div>
    </div>
  </div>

  <script>
    // ===== CONFIGURATION =====
    var XANO_API_URL = 'https://x8ki-letl-twmt.n7.xano.io/api:WGx5FQAG/qr_scans';
    var USE_REAL_XANO = false; // SET TO FALSE FOR TESTING, TRUE WHEN XANO WORKS
    var modeDisplay = document.getElementById('modeDisplay');
    
    // Update mode display
    if (!USE_REAL_XANO) {
      modeDisplay.innerHTML = 'OFFLINE MODE';
      modeDisplay.style.background = '#dc3545';
    } else {
      modeDisplay.innerHTML = 'LIVE XANO';
      modeDisplay.style.background = '#28a745';
    }
    
    // ===== TIME DISPLAY =====
    function updateClock() {
      var timeElement = document.getElementById('currentTime');
      if (!timeElement) return;
      
      var now = new Date();
      var hours = now.getHours().toString().padStart(2, '0');
      var minutes = now.getMinutes().toString().padStart(2, '0');
      var seconds = now.getSeconds().toString().padStart(2, '0');
      
      timeElement.innerHTML = hours + ':' + minutes + ':' + seconds;
    }
    updateClock();
    setInterval(updateClock, 1000);
    
    // ===== GPS LOCATION =====
    var currentLocation = 'Unknown';
    var latitude = null;
    var longitude = null;
    
    function getLocation() {
      var gpsStatus = document.getElementById('gpsStatus');
      var locationField = document.getElementById('locationField');
      var gpsBtn = document.getElementById('gpsBtn');
      
      if (!navigator.geolocation) {
        gpsStatus.innerHTML = '❌ GPS not supported';
        locationField.value = 'GPS unavailable';
        return;
      }
      
      gpsStatus.innerHTML = '⏳ Getting GPS...';
      locationField.value = 'Detecting...';
      gpsBtn.disabled = true;
      
      navigator.geolocation.getCurrentPosition(
        function(position) {
          latitude = position.coords.latitude;
          longitude = position.coords.longitude;
          var accuracy = position.coords.accuracy;
          
          // Show coordinates
          var coordStr = latitude.toFixed(4) + ', ' + longitude.toFixed(4);
          locationField.value = coordStr;
          currentLocation = coordStr;
          gpsStatus.innerHTML = '✅ GPS lock! Accuracy: ±' + Math.round(accuracy) + 'm';
          gpsBtn.disabled = false;
          
          // Try to get city name (optional)
          getCityFromCoords(latitude, longitude);
        },
        function(error) {
          var errorMsg = 'GPS error';
          if (error.code === 1) errorMsg = 'Permission denied';
          else if (error.code === 2) errorMsg = 'Position unavailable';
          else if (error.code === 3) errorMsg = 'GPS timeout';
          
          gpsStatus.innerHTML = '❌ ' + errorMsg + ' - Tap 📍 to retry';
          locationField.value = 'GPS failed';
          gpsBtn.disabled = false;
        },
        {
          enableHighAccuracy: true,
          timeout: 10000,
          maximumAge: 0
        }
      );
    }
    
    function getCityFromCoords(lat, lon) {
      var xhr = new XMLHttpRequest();
      var url = 'https://nominatim.openstreetmap.org/reverse?format=json&lat=' + lat + '&lon=' + lon + '&zoom=10';
      
      xhr.open('GET', url, true);
      xhr.timeout = 5000;
      
      xhr.onload = function() {
        if (xhr.status === 200) {
          try {
            var data = JSON.parse(xhr.responseText);
            var locationField = document.getElementById('locationField');
            var gpsStatus = document.getElementById('gpsStatus');
            
            var city = data.address.city || data.address.town || data.address.village || '';
            var state = data.address.state || '';
            
            if (city && state) {
              locationField.value = city + ', ' + state;
              currentLocation = city + ', ' + state;
              gpsStatus.innerHTML = '✅ Location: ' + city + ', ' + state;
            }
          } catch(e) {}
        }
      };
      xhr.send();
    }
    
    // ===== CELL HANDLING =====
    var cells = [
      document.getElementById('cell1'),
      document.getElementById('cell2'),
      document.getElementById('cell3'),
      document.getElementById('cell4'),
      document.getElementById('cell5'),
      document.getElementById('cell6')
    ];
    
    var letterMap = {
      'A':'1','B':'2','C':'3','D':'4','E':'5',
      'F':'6','G':'7','H':'8','I':'9','J':'0'
    };
    var validLetters = 'ABCDEFGHIJ';
    
    for (var i = 0; i < cells.length; i++) {
      (function(index) {
        cells[index].addEventListener('input', function() {
          var val = this.value.toUpperCase();
          if (val.length > 0 && validLetters.indexOf(val) === -1) {
            this.value = '';
            return;
          }
          this.value = val;
          if (this.value.length === 1 && index < cells.length - 1) {
            cells[index + 1].focus();
          }
          updateLabelId();
        });
        
        cells[index].addEventListener('keydown', function(e) {
          if (e.key === 'Backspace' && this.value === '' && index > 0) {
            cells[index - 1].focus();
          }
        });
      })(i);
    }
    
    function updateLabelId() {
      var code = '';
      for (var i = 0; i < cells.length; i++) {
        code = code + cells[i].value;
      }
      var labelField = document.getElementById('labelId');
      if (code.length === 6) {
        var numbers = '';
        var valid = true;
        for (var j = 0; j < code.length; j++) {
          var letter = code[j];
          if (letterMap[letter]) {
            numbers = numbers + letterMap[letter];
          } else {
            valid = false;
            break;
          }
        }
        labelField.value = valid ? numbers : 'INVALID';
      } else {
        labelField.value = '';
      }
    }
    
    function getBarcodeValue() {
      var code = '';
      for (var i = 0; i < cells.length; i++) {
        code = code + cells[i].value;
      }
      return code;
    }
    
    function clearCells() {
      for (var i = 0; i < cells.length; i++) {
        cells[i].value = '';
      }
      document.getElementById('labelId').value = '';
      cells[0].focus();
    }
    
    // ===== LOCAL TABLE =====
    var scanCounter = 0;
    
    function addToLocalTable(record) {
      scanCounter++;
      var emptyMsg = document.getElementById('empty-message');
      if (emptyMsg) emptyMsg.style.display = 'none';
      
      var tableBody = document.getElementById('tableBody');
      var row = document.createElement('div');
      row.className = 'result-row';
      
      var now = new Date();
      var timeStr = now.getHours() + ':' + 
                   ('0' + now.getMinutes()).slice(-2) + ':' + 
                   ('0' + now.getSeconds()).slice(-2);
      
      row.innerHTML = '<div>' + scanCounter + '</div><div>' + record + ' @ ' + timeStr + '</div>';
      tableBody.appendChild(row);
    }
    
    // ===== TEST XANO CONNECTION FIRST =====
    function testXanoConnection() {
      var msgBox = document.getElementById('messageBox');
      msgBox.innerHTML = '🔍 Testing XANO connection...';
      
      var xhr = new XMLHttpRequest();
      xhr.open('GET', XANO_API_URL, true);
      xhr.timeout = 5000;
      
      xhr.onload = function() {
        if (xhr.status === 200) {
          msgBox.innerHTML = '✅ XANO connected! Ready to send.';
          USE_REAL_XANO = true;
          modeDisplay.innerHTML = 'LIVE XANO';
          modeDisplay.style.background = '#28a745';
        } else if (xhr.status === 403) {
          msgBox.innerHTML = '⚠️ XANO returned 403 Forbidden - Using OFFLINE mode';
          USE_REAL_XANO = false;
          modeDisplay.innerHTML = 'OFFLINE MODE (403)';
          modeDisplay.style.background = '#dc3545';
        } else {
          msgBox.innerHTML = '⚠️ XANO error ' + xhr.status + ' - Using OFFLINE mode';
          USE_REAL_XANO = false;
          modeDisplay.innerHTML = 'OFFLINE MODE';
          modeDisplay.style.background = '#dc3545';
        }
      };
      
      xhr.onerror = function() {
        msgBox.innerHTML = '⚠️ Cannot reach XANO - Using OFFLINE mode';
        USE_REAL_XANO = false;
        modeDisplay.innerHTML = 'OFFLINE MODE';
        modeDisplay.style.background = '#dc3545';
      };
      
      xhr.ontimeout = function() {
        msgBox.innerHTML = '⚠️ XANO timeout - Using OFFLINE mode';
        USE_REAL_XANO = false;
        modeDisplay.innerHTML = 'OFFLINE MODE';
        modeDisplay.style.background = '#dc3545';
      };
      
      xhr.send();
    }
    
    // ===== SEND TO XANO =====
    function sendToXano(scanData, callback) {
      var xhr = new XMLHttpRequest();
      xhr.open('POST', XANO_API_URL, true);
      xhr.setRequestHeader('Content-Type', 'application/json');
      xhr.timeout = 8000; // 8 second timeout
      
      xhr.onload = function() {
        console.log('XANO response status:', xhr.status);
        console.log('XANO response text:', xhr.responseText);
        
        if (xhr.status >= 200 && xhr.status < 300) {
          callback(null, 'Success');
        } else {
          callback('XANO error: ' + xhr.status + ' - ' + xhr.statusText, null);
        }
      };
      
      xhr.onerror = function() {
        callback('Network error - cannot reach XANO', null);
      };
      
      xhr.ontimeout = function() {
        callback('Request timeout - XANO not responding', null);
      };
      
      var jsonData = JSON.stringify(scanData);
      console.log('Sending to XANO:', jsonData);
      xhr.send(jsonData);
    }
    
    // ===== SUBMIT =====
    function submitScan() {
      var msgBox = document.getElementById('messageBox');
      var rawBarcode = getBarcodeValue();
      var numericLabel = document.getElementById('labelId').value;
      
      // If cells are empty, use demo values
      if (rawBarcode === '') {
        rawBarcode = 'ABCDEF';
        for (var i = 0; i < cells.length; i++) {
          cells[i].value = 'ABCDEF'[i];
        }
        updateLabelId();
        numericLabel = '123456';
      }
      
      // Validate
      var isValid = true;
      if (rawBarcode.length !== 6) isValid = false;
      for (var ch = 0; ch < rawBarcode.length; ch++) {
        if (validLetters.indexOf(rawBarcode[ch]) === -1) {
          isValid = false;
          break;
        }
      }
      
      if (!numericLabel || numericLabel === 'INVALID' || !isValid) {
        msgBox.innerHTML = '❌ Invalid barcode';
        return;
      }
      
      var locationField = document.getElementById('locationField');
      var locationValue = locationField.value || 'Unknown';
      var statusSelect = document.getElementById('statusSelect');
      var etaField = document.getElementById('etaField');
      
      // Prepare data
      var scanData = {
        barcode_letters: rawBarcode,
        barcode_numbers: numericLabel,
        timestamp: new Date().toISOString(),
        device_time: new Date().toString(),
        status: statusSelect.options[statusSelect.selectedIndex].value,
        location: locationValue,
        eta: etaField.value || new Date().toISOString().split('T')[0],
        scan_type: 'manual',
        device_info: 'Android 5.0'
      };
      
      msgBox.innerHTML = '⏳ Sending...';
      console.log('Submitting scan:', scanData);
      
      // Try XANO if enabled
      if (USE_REAL_XANO) {
        sendToXano(scanData, function(error, result) {
          if (error) {
            msgBox.innerHTML = '❌ ' + error;
            // Still save locally even if XANO fails
            addToLocalTable(rawBarcode + ' → ' + numericLabel + ' (local only)');
            showSuccessPopup('LOCAL ONLY');
          } else {
            msgBox.innerHTML = '✅ Saved to XANO!';
            addToLocalTable(rawBarcode + ' → ' + numericLabel);
            showSuccessPopup('XANO');
          }
          clearCells();
        });
      } else {
        // OFFLINE MODE - instant save
        setTimeout(function() {
          msgBox.innerHTML = '✅ Saved (offline mode)';
          addToLocalTable(rawBarcode + ' → ' + numericLabel);
          showSuccessPopup('OFFLINE');
          clearCells();
        }, 500);
      }
    }
    
    // ===== POPUP =====
    function showSuccessPopup(mode) {
      var popup = document.getElementById('successPopup');
      var popupTime = document.getElementById('popupTime');
      var now = new Date();
      popupTime.innerHTML = now.toLocaleTimeString() + ' (' + mode + ')';
      popup.style.display = 'block';
      setTimeout(function() { popup.style.display = 'none'; }, 1500);
    }
    
    // ===== EVENT LISTENERS =====
    document.getElementById('submitButton').addEventListener('click', function(e) {
      e.preventDefault();
      submitScan();
    });
    
    document.getElementById('gpsBtn').addEventListener('click', function() {
      getLocation();
    });
    
    // Enter key
    for (var k = 0; k < cells.length; k++) {
      (function(idx) {
        cells[idx].addEventListener('keypress', function(e) {
          if (e.key === 'Enter') {
            e.preventDefault();
            submitScan();
          }
        });
      })(k);
    }
    
    // ===== INIT =====
    // Set default date
    var today = new Date();
    var year = today.getFullYear();
    var month = ('0' + (today.getMonth() + 1)).slice(-2);
    var day = ('0' + today.getDate()).slice(-2);
    document.getElementById('etaField').value = year + '-' + month + '-' + day;
    
    // Focus first cell
    cells[0].focus();
    
    // Test XANO connection
    testXanoConnection();
    
    // Pre-fill demo data
    setTimeout(function() {
      if (document.getElementById('labelId').value === '') {
        for (var i = 0; i < cells.length; i++) {
          cells[i].value = 'ABCDEF'[i];
        }
        updateLabelId();
      }
    }, 500);
  </script>
</body>
</html>
