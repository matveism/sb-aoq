<!DOCTYPE html>
<html>
<head>
<title>Grid</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
    margin:0;
    padding:0;
    background:#000;
    font-family:"Courier New", monospace;
    overflow-x:hidden;
}

#device {
    width:100%;
    max-width:720px;
    margin:0 auto;
    background:#fff;
    border:2px solid #444;
}

/* HEADER */
#header {
    width:100%;
    height:45px;
    background:#405e87;
    color:#fff;
    font-weight:bold;
    line-height:45px;
    padding-left:10px;
    padding-right:10px;
}

#header .right {
    float:right;
}

#under {
    width:100%;
    height:50px;
    background:#a2c2de;
    line-height:50px;
    font-size:18px;
    font-weight:bold;
    padding-left:10px;
    color:#000;
}

/* GRID TABLE */
#gridtable {
    border-collapse:collapse;
    margin:10px;
}

#gridtable td {
    width:25px;
    height:25px;
    border:1px solid #000;
    background:#ffffff;
}

/* COLORS */
.orange { background:#d97a1e; }
.gray { background:#b5b5b5; }
</style>
</head>

<body>
<div id="device">

    <div id="header">
        <span>Scan Barcode</span>
        <span class="right" id="clock">--:-- --</span>
    </div>

    <div id="under">
        Scan/Key-in Barcode:
        <input type="text" id="pos" style="width:40px;">
    </div>

    <!-- GRID -->
    <table id="gridtable">
        <tbody id="gridbody"></tbody>
    </table>

</div>

<script>
// CLOCK
function updateClock() {
    var d=new Date(),h=d.getHours(),m=d.getMinutes(),ampm="AM";
    if(h>=12) ampm="PM";
    if(h>12) h=h-12;
    if(h==0) h=12;
    if(m<10) m="0"+m;
    document.getElementById("clock").innerHTML=h+":"+m+" "+ampm;
}
setInterval(updateClock,1000); updateClock();

// BUILD GRID (2 rows × 20 columns)
var rows=2, cols=20;
var grid=document.getElementById("gridbody");

for(var r=0;r<rows;r++){
    var tr=document.createElement("tr");
    for(var c=0;c<cols;c++){
        var td=document.createElement("td");
        td.id="cell_"+(r*cols+c+1);
        tr.appendChild(td);
    }
    grid.appendChild(tr);
}

// INITIAL COLORS
document.getElementById("cell_1").className="orange"; // dark orange
for(var i=31;i<=40;i++){
    document.getElementById("cell_"+i).className="gray"; // last 10 gray
}

// MOVE ORANGE WHEN TYPING
document.getElementById("pos").onkeyup=function(){
    var n=parseInt(this.value);
    if(n>=1 && n<=40){
        // clear old orange
        var old=document.getElementsByClassName("orange");
        if(old.length>0) old[0].className="";
        // set new orange
        document.getElementById("cell_"+n).className="orange";
    }
};
</script>

</body>
</html>
