<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Courier Scanner · A-J Only</title>
<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin:0; padding:0; }
body { background:#000; display:flex; justify-content:center; align-items:center; min-height:100vh; font-family:Arial,sans-serif; }
#phone { width:360px; height:640px; background:linear-gradient(180deg,#3f6b9c 0%,#2b4b70 100%); color:#fff; display:flex; flex-direction:column; box-shadow:0 10px 25px rgba(0,0,0,0.5); position:relative; }
#header { background:#2e5a88; padding:12px; display:flex; justify-content:space-between; font-size:16px; }
#gpsIndicator { color:#4CAF50; }
#timeDisplay { color:#ffcc00; }

/* Disable keyboard on mobile */
.cell-grid { display:flex; gap:5px; padding:15px; justify-content:center; }
.cell-box { width:45px; height:45px; }
.cell-box input { width:100%; height:100%; text-align:center; font-size:24px; font-weight:bold; background:#E2E8D3; border:3px solid #1f3f5c; border-radius:5px; text-transform:uppercase; color:#000; }

.letter-hint { background:#0A3A6B; padding:8px; margin:5px; border-radius:5px; text-align:center; font-size:14px; }
.letter-hint span { display:inline-block; margin:0 5px; color:#ffcc00; font-weight:bold; }

#labelBox { background:#A6BEEF; min-height:100px; max-height:150px; margin:10px; padding:8px; border:3px solid #1f3f5c; overflow-y:auto; color:#000; font-size:14px; }
.scan-entry { display:block; background:#c0d4f5; padding:8px; margin:3px 0; border-radius:3px; font-weight:bold; }

#labelButtons { display:flex; justify-content:space-between; padding:0 20px; margin:5px 10px; }
#labelButtons span { background:#7496C4; padding:12px 25px; border-radius:5px; cursor:pointer; font-weight:bold; font-size:18px; text-align:center; border:2px solid #1f3f5c; display:inline-block; }
#labelButtons span:active { background:#4CAF50; }

.keypad { padding:10px; background:#1f3f5c; }
.keypad-row { display:flex; gap:5px; margin-bottom:5px; }
.key { flex:1; background:#3a5f8a; padding:18px 0; text-align:center; font-size:28px; font-weight:bold; border-radius:5px; cursor:pointer; border:2px solid #1f3f5c; color:#fff; }
.key:active { background:#4CAF50; }
.key.enter { background:#4CAF50; }
.key.esc { background:#dc3545; }
.key.backspace { background:#ffc107; color:#000; }

#statusScreen { display:none; position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); padding:20px; overflow-y:auto; z-index:100; }
.statusBtn { background:#3f6b9c; border:2px solid #ffcc00; padding:18px; margin:8px 0; text-align:center; border-radius:5px; cursor:pointer; font-size:18px; font-weight:bold; color:#fff; }
.statusBtn:active { background:#4CAF50; }
.statusBtn.back { background:#dc3545; border-color:#fff; }

#successPopup { display:none; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:#2b4b70; border:4px solid #4CAF50; padding:25px; border-radius:15px; text-align:center; z-index:200; width:80%; }
#successPopup .check { font-size:60px; color:#4CAF50; }
#successPopup p { font-size:18px; margin:10px 0; color:#fff; }
</style>
</head>
<body>
<div id="phone">
  <div id="header">
    <span>📦 COURIER</span>
    <span><span id="gpsIndicator">📍</span> <span id="timeDisplay"></span></span>
  </div>

  <!-- Letter hint -->
  <div class="letter-hint">
    <span>A=1</span> <span>B=2</span> <span>C=3</span> <span>D=4</span> <span>E=5</span>
    <span>F=6</span> <span>G=7</span> <span>H=8</span> <span>I=9</span> <span>J=0</span>
  </div>

  <!-- 6 cells for display -->
  <div class="cell-grid">
    <div class="cell-box"><input type="text" id="cell1" readonly></div>
    <div class="cell-box"><input type="text" id="cell2" readonly></div>
    <div class="cell-box"><input type="text" id="cell3" readonly></div>
    <div class="cell-box"><input type="text" id="cell4" readonly></div>
    <div class="cell-box"><input type="text" id="cell5" readonly></div>
    <div class="cell-box"><input type="text" id="cell6" readonly></div>
  </div>

  <!-- History box -->
  <div id="labelBox"></div>

  <!-- Control buttons -->
  <div id="labelButtons">
    <span id="clearBtn" onclick="clearAll()">CLEAR</span>
    <span id="statusBtn" onclick="showStatus()">ENTER</span>
  </div>

  <!-- A-J Keypad -->
  <div class="keypad">
    <div class="keypad-row">
      <div class="key" onclick="addLetter('A')">A</div>
      <div class="key" onclick="addLetter('B')">B</div>
      <div class="key" onclick="addLetter('C')">C</div>
    </div>
    <div class="keypad-row">
      <div class="key" onclick="addLetter('D')">D</div>
      <div class="key" onclick="addLetter('E')">E</div>
      <div class="key" onclick="addLetter('F')">F</div>
    </div>
    <div class="keypad-row">
      <div class="key" onclick="addLetter('G')">G</div>
      <div class="key" onclick="addLetter('H')">H</div>
      <div class="key" onclick="addLetter('I')">I</div>
    </div>
    <div class="keypad-row">
      <div class="key" onclick="addLetter('J')">J</div>
      <div class="key backspace" onclick="doBackspace()">⌫</div>
      <div class="key enter" onclick="showStatus()">ENT</div>
    </div>
    <div class="keypad-row">
      <div class="key esc" onclick="clearCells()">ESC</div>
      <div class="key" style="visibility:hidden;"></div>
      <div class="key" style="visibility:hidden;"></div>
    </div>
  </div>

  <!-- Status screen -->
  <div id="statusScreen">
    <div class="statusBtn" onclick="submitStatus('Data Received')">📥 DATA RECEIVED</div>
    <div class="statusBtn" onclick="submitStatus('Picked Up')">📬 PICKED UP</div>
    <div class="statusBtn" onclick="submitStatus('Depart Post Office')">🚚 DEPART</div>
    <div class="statusBtn" onclick="submitStatus('Arrival Scan')">📍 ARRIVAL</div>
    <div class="statusBtn" onclick="submitStatus('Local Scan')">🏙️ LOCAL</div>
    <div class="statusBtn" onclick="submitStatus('Out For Delivery')">🛵 OUT</div>
    <div class="statusBtn" onclick="submitStatus('Delivered')">✅ DELIVERED</div>
    <div class="statusBtn back" onclick="hideStatus()">⬅️ BACK</div>
  </div>

  <!-- Success popup -->
  <div id="successPopup">
    <div class="check">✓</div>
    <p>SAVED!</p>
    <p id="popupInfo"></p>
  </div>
</div>

<script>
// ===== ANDROID 5.0 COMPATIBLE =====
// Use only var, function, and older syntax

// ===== VARIABLES =====
var scanCount = 0;
var scans = [];
var currentLocation = null;

// ===== CELL REFERENCES =====
var c1 = document.getElementById('cell1');
var c2 = document.getElementById('cell2');
var c3 = document.getElementById('cell3');
var c4 = document.getElementById('cell4');
var c5 = document.getElementById('cell5');
var c6 = document.getElementById('cell6');
var cells = [c1, c2, c3, c4, c5, c6];

// ===== TIME UPDATE =====
function updateTime() {
  var d = new Date();
  var h = d.getHours();
  var m = d.getMinutes();
  var s = d.getSeconds();
  
  if (h < 10) h = '0' + h;
  if (m < 10) m = '0' + m;
  if (s < 10) s = '0' + s;
  
  document.getElementById('timeDisplay').innerHTML = h + ':' + m + ':' + s;
}
setInterval(updateTime, 1000);
updateTime();

// ===== GPS =====
function initGPS() {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      function(pos) {
        currentLocation = { 
          lat: pos.coords.latitude, 
          lng: pos.coords.longitude
        };
        document.getElementById('gpsIndicator').innerHTML = '📍';
      },
      function(err) { 
        document.getElementById('gpsIndicator').innerHTML = '🌐';
      }
    );
  } else {
    document.getElementById('gpsIndicator').innerHTML = '🚫';
  }
}
initGPS();

// ===== ADD LETTER =====
function addLetter(letter) {
  for (var i = 0; i < cells.length; i++) {
    if (cells[i].value === '') {
      cells[i].value = letter;
      break;
    }
  }
  checkAllFilled();
}

// ===== BACKSPACE =====
function doBackspace() {
  for (var i = cells.length - 1; i >= 0; i--) {
    if (cells[i].value !== '') {
      cells[i].value = '';
      break;
    }
  }
}

// ===== CLEAR CELLS ONLY =====
function clearCells() {
  for (var i = 0; i < cells.length; i++) {
    cells[i].value = '';
  }
}

// ===== CLEAR ALL =====
function clearAll() {
  scans = [];
  scanCount = 0;
  document.getElementById('labelBox').innerHTML = '';
  clearCells();
}

// ===== CHECK IF ALL CELLS FILLED =====
function checkAllFilled() {
  var filled = true;
  for (var i = 0; i < cells.length; i++) {
    if (cells[i].value === '') filled = false;
  }
  
  if (filled) {
    var letters = '';
    for (var i = 0; i < cells.length; i++) {
      letters += cells[i].value;
    }
    
    var numbers = '';
    for (var i = 0; i < letters.length; i++) {
      var ch = letters.charAt(i);
      if (ch === 'A') numbers += '1';
      else if (ch === 'B') numbers += '2';
      else if (ch === 'C') numbers += '3';
      else if (ch === 'D') numbers += '4';
      else if (ch === 'E') numbers += '5';
      else if (ch === 'F') numbers += '6';
      else if (ch === 'G') numbers += '7';
      else if (ch === 'H') numbers += '8';
      else if (ch === 'I') numbers += '9';
      else if (ch === 'J') numbers += '0';
    }
    
    scanCount++;
    scans.push({ letters: letters, numbers: numbers });
    
    var box = document.getElementById('labelBox');
    var div = document.createElement('div');
    div.className = 'scan-entry';
    
    var locText = '';
    if (currentLocation) {
      locText = ' 📍 ' + currentLocation.lat.toFixed(4) + ', ' + currentLocation.lng.toFixed(4);
    }
    
    div.innerHTML = '📦 #' + scanCount + ': ' + letters + ' → ' + numbers + locText;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
    
    setTimeout(clearCells, 100);
  }
}

// ===== SHOW STATUS SCREEN =====
function showStatus() {
  if (scans.length === 0) {
    alert('Enter a code first');
    return;
  }
  document.getElementById('statusScreen').style.display = 'block';
}

function hideStatus() {
  document.getElementById('statusScreen').style.display = 'none';
}

// ===== SUBMIT TO XANO - FIXED FOR API =====
function submitStatus(status) {
  if (scans.length === 0) {
    hideStatus();
    return;
  }
  
  var popup = document.getElementById('successPopup');
  document.getElementById('popupInfo').innerHTML = 'Sending ' + scans.length + ' code(s)...';
  popup.style.display = 'block';
  
  var successCount = 0;
  var failCount = 0;
  var totalScans = scans.length;
  var sentCount = 0;
  
  for (var i = 0; i < scans.length; i++) {
    var scan = scans[i];
    
    var now = new Date();
    
    // API expects these exact field names based on your schema
    var data = {
      label_id: scan.numbers,                    // The decoded number
      barcode_type: 'manual',                     // They expect 'manual' not 'MANUAL A-J'
      status: status,                             // The status selected
      timestamp: Math.floor(now.getTime() / 1000), // Unix timestamp in seconds
      time: now.getHours() + ':' + now.getMinutes() + ':' + now.getSeconds(), // HH:MM:SS
      date: (now.getMonth()+1) + '/' + now.getDate() + '/' + now.getFullYear(), // MM/DD/YYYY
      location: currentLocation ? currentLocation.lat.toFixed(6) + ',' + currentLocation.lng.toFixed(6) : 'Unknown',
      eta: (new Date(now.getTime() + 3*24*60*60*1000)).toLocaleDateString() // 3 days from now
    };
    
    console.log('Sending:', JSON.stringify(data));
    
    // Use XMLHttpRequest
    (function(index, scanData) {
      var xhr = new XMLHttpRequest();
      xhr.open('POST', 'https://x8ki-letl-twmt.n7.xano.io/api:WGx5FQAG/qr_scans', true);
      xhr.setRequestHeader('Content-Type', 'application/json');
      
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
          console.log('Response status:', xhr.status);
          console.log('Response text:', xhr.responseText);
          
          if (xhr.status >= 200 && xhr.status < 300) {
            successCount++;
          } else {
            failCount++;
          }
          
          sentCount++;
          
          if (sentCount === totalScans) {
            var info = '✅ ' + successCount + ' sent';
            if (failCount > 0) info += ' ❌ ' + failCount + ' failed';
            document.getElementById('popupInfo').innerHTML = info;
            
            setTimeout(function() {
              popup.style.display = 'none';
              if (successCount > 0) {
                scans = [];
                scanCount = 0;
                document.getElementById('labelBox').innerHTML = '';
              }
              hideStatus();
            }, 2000);
          }
        }
      };
      
      xhr.send(JSON.stringify(scanData));
    })(i, data);
  }
}

// Make functions global
window.addLetter = addLetter;
window.doBackspace = doBackspace;
window.clearCells = clearCells;
window.clearAll = clearAll;
window.showStatus = showStatus;
window.hideStatus = hideStatus;
window.submitStatus = submitStatus;

console.log('App loaded - Android 5 compatible');
</script>
</body>
</html>
