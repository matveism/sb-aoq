<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Android 5.0 Barcode Scanner - GPS & Real Time</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    * {
      -webkit-box-sizing: border-box;
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: Roboto, Arial, sans-serif;
      padding: 8px;
    }
    .device {
      width: 100%;
      max-width: 400px;
      min-height: 700px;
      background: #B0C8E2;
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 20px rgba(0,0,0,0.7);
      overflow: hidden;
      position: relative;
      border-radius: 20px;
    }
    .header {
      background: #15569B;
      color: white;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      font-size: 20px;
      font-weight: bold;
      flex-shrink: 0;
    }
    .time-display {
      background: #1e3a6b;
      padding: 6px 16px;
      border-radius: 30px;
      font-family: monospace;
      font-size: 18px;
      color: white;
      border: 1px solid #79A4D2;
      min-width: 140px;
      text-align: center;
    }
    .scan-row {
      display: flex;
      align-items: center;
      padding: 16px;
      gap: 12px;
      background: #B0C8E2;
      min-height: 90px;
      border-bottom: 2px solid #79A4D2;
      flex-shrink: 0;
    }
    .submit-btn {
      background: #28a745;
      color: white;
      border: 2px solid #1e7e34;
      width: 80px;
      height: 56px;
      border-radius: 8px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      flex-shrink: 0;
    }
    .grid-container {
      display: flex;
      gap: 4px;
      flex: 1;
      justify-content: flex-end;
    }
    .cell {
      width: 32px;
      height: 56px;
      background: white;
      border: 2px solid #666;
      border-radius: 6px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      text-transform: uppercase;
      outline: none;
      color: black;
    }
    .cell:focus {
      border: 3px solid #FCC57A;
      background: #FB9809 !important;
    }
    .content {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      background: #B0C8E2;
    }
    .status-section {
      background: #96BEEE;
      border: 2px solid #79A4D2;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .field {
      margin-bottom: 12px;
    }
    .field label {
      display: block;
      font-size: 14px;
      font-weight: bold;
      color: #15569B;
      margin-bottom: 4px;
    }
    .location-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .location-row input {
      flex: 1;
    }
    .gps-btn {
      background: #15569B;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 10px;
      font-size: 20px;
      cursor: pointer;
      height: 46px;
      width: 46px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .gps-btn:active {
      background: #0e3a6b;
    }
    .gps-btn:disabled {
      background: #999;
      cursor: not-allowed;
    }
    .field input, .field select {
      width: 100%;
      padding: 10px;
      border: 2px solid #79A4D2;
      border-radius: 6px;
      font-size: 16px;
      background: white;
      height: 46px;
    }
    .field input[readonly] {
      background: #e2e8d3;
      font-weight: bold;
      color: #15569B;
    }
    .result-section {
      border: 2px solid #79A4D2;
      border-radius: 8px;
      overflow: hidden;
      background: #96BEEE;
      margin-bottom: 16px;
    }
    .result-header {
      display: flex;
      background: #79A4D2;
      border-bottom: 2px solid #15569B;
    }
    .result-header div:first-child {
      width: 50px;
      padding: 10px;
      text-align: center;
      border-right: 2px solid #15569B;
      color: white;
      font-weight: bold;
    }
    .result-header div:last-child {
      flex: 1;
      padding: 10px;
      color: white;
      font-weight: bold;
    }
    .result-row {
      display: flex;
      border-bottom: 1px solid #79A4D2;
    }
    .result-row div:first-child {
      width: 50px;
      padding: 10px;
      text-align: center;
      border-right: 1px solid #79A4D2;
    }
    .result-row div:last-child {
      flex: 1;
      padding: 10px;
      font-size: 13px;
    }
    #empty-message {
      padding: 12px;
      color: #666;
      font-style: italic;
      text-align: center;
    }
    .status-message {
      padding: 10px;
      text-align: center;
      background: rgba(255,255,255,0.4);
      border-radius: 6px;
      min-height: 45px;
      border: 1px solid #79A4D2;
    }
    .popup {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 200px;
      background: white;
      border: 4px solid #28a745;
      border-radius: 30px;
      text-align: center;
      padding: 18px;
      display: none;
      z-index: 999;
    }
    .popup .circle {
      width: 60px;
      height: 60px;
      background: #28a745;
      border-radius: 50%;
      margin: 0 auto 10px;
      color: white;
      font-size: 36px;
      line-height: 60px;
    }
    .loading {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 5px solid #f3f3f3;
      border-top: 5px solid #15569B;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .gps-status {
      font-size: 12px;
      color: #15569B;
      margin-top: 4px;
      padding-left: 4px;
    }
  </style>
</head>
<body>
  <div class="device">
    <div class="header">
      <span>SCAN BARCODE</span>
      <span class="time-display" id="currentTime">--:--:--</span>
    </div>
    <div class="scan-row">
      <button class="submit-btn" id="submitButton">SUBMIT</button>
      <div class="grid-container">
        <input class="cell" maxlength="1" id="cell1">
        <input class="cell" maxlength="1" id="cell2">
        <input class="cell" maxlength="1" id="cell3">
        <input class="cell" maxlength="1" id="cell4">
        <input class="cell" maxlength="1" id="cell5">
        <input class="cell" maxlength="1" id="cell6">
      </div>
    </div>
    <div class="content">
      <div class="status-section">
        <div class="field">
          <label>Label ID (Numeric)</label>
          <input type="text" id="labelId" readonly placeholder="---">
        </div>
        <div class="field">
          <label>Type</label>
          <input type="text" id="scanType" value="manual" readonly>
        </div>
        <div class="field">
          <label>Status</label>
          <select id="statusSelect">
            <option value="Received">📥 Received</option>
            <option value="Picked Up">📬 Picked Up</option>
            <option value="Depart">🚚 Depart</option>
            <option value="Arrival">📍 Arrival</option>
          </select>
        </div>
        <div class="field">
          <label>Location (GPS Auto-detected)</label>
          <div class="location-row">
            <input type="text" id="locationField" placeholder="Detecting location..." readonly>
            <button class="gps-btn" id="gpsBtn" title="Refresh GPS">📍</button>
          </div>
          <div class="gps-status" id="gpsStatus">Initializing GPS...</div>
        </div>
        <div class="field">
          <label>ETA</label>
          <input type="date" id="etaField">
        </div>
      </div>
      <div class="result-section">
        <div class="result-header">
          <div>#</div>
          <div>SCAN DETAILS</div>
        </div>
        <div id="tableBody"></div>
        <div id="empty-message">No scans yet</div>
      </div>
      <div class="status-message" id="messageBox">Initializing...</div>
    </div>
    <div class="popup" id="successPopup">
      <div class="circle">✓</div>
      <p>SAVED TO XANO</p>
      <div class="popup-time" id="popupTime"></div>
    </div>
    <div class="loading" id="loadingOverlay">
      <div class="loading-spinner"></div>
    </div>
  </div>

  <script>
    // ===== XANO CONFIG =====
    const XANO_API_URL = 'https://x8ki-letl-twmt.n7.xano.io/api:WGx5FQAG/qr_scans';
    const USE_MOCK_MODE = false;
    
    // ===== GPS & LOCATION SERVICES =====
    let currentLocation = {
      city: 'Unknown',
      state: '',
      country: '',
      latitude: null,
      longitude: null,
      timestamp: null
    };
    
    // Reverse geocoding function (uses OpenStreetMap Nominatim - free, no API key)
    async function reverseGeocode(lat, lon) {
      try {
        const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=18&addressdetails=1`);
        const data = await response.json();
        
        let city = data.address.city || data.address.town || data.address.village || data.address.county || 'Unknown';
        let state = data.address.state || '';
        let country = data.address.country || '';
        
        return {
          city: city,
          state: state,
          country: country,
          full: `${city}, ${state} ${country}`.trim()
        };
      } catch (error) {
        console.error('Geocoding error:', error);
        return {
          city: 'Unknown',
          state: '',
          country: '',
          full: `${lat.toFixed(4)}, ${lon.toFixed(4)}`
        };
      }
    }
    
    // Get GPS location
    function getCurrentLocation() {
      const gpsBtn = document.getElementById('gpsBtn');
      const gpsStatus = document.getElementById('gpsStatus');
      const locationField = document.getElementById('locationField');
      
      if (!navigator.geolocation) {
        gpsStatus.innerHTML = '❌ GPS not supported on this device';
        locationField.value = 'GPS unavailable';
        return;
      }
      
      gpsBtn.disabled = true;
      gpsStatus.innerHTML = '📍 Acquiring GPS signal...';
      locationField.value = 'Detecting...';
      
      // Options for more accurate location
      const options = {
        enableHighAccuracy: true,
        timeout: 15000,
        maximumAge: 0
      };
      
      navigator.geolocation.getCurrentPosition(
        async (position) => {
          const lat = position.coords.latitude;
          const lon = position.coords.longitude;
          const accuracy = position.coords.accuracy;
          
          // Store coordinates
          currentLocation.latitude = lat;
          currentLocation.longitude = lon;
          currentLocation.timestamp = new Date().toISOString();
          
          // Get city/state from coordinates
          const locationInfo = await reverseGeocode(lat, lon);
          
          currentLocation.city = locationInfo.city;
          currentLocation.state = locationInfo.state;
          currentLocation.country = locationInfo.country;
          
          // Update field
          locationField.value = locationInfo.full;
          gpsStatus.innerHTML = `✅ GPS locked (Accuracy: ±${Math.round(accuracy)}m) - Updated: ${new Date().toLocaleTimeString()}`;
          gpsBtn.disabled = false;
          
          console.log('Location updated:', currentLocation);
        },
        (error) => {
          console.error('GPS error:', error);
          let errorMsg = 'GPS error: ';
          switch(error.code) {
            case error.PERMISSION_DENIED:
              errorMsg += 'Permission denied. Please enable location.';
              break;
            case error.POSITION_UNAVAILABLE:
              errorMsg += 'Position unavailable.';
              break;
            case error.TIMEOUT:
              errorMsg += 'GPS timeout. Try again.';
              break;
            default:
              errorMsg += 'Unknown error.';
          }
          
          locationField.value = 'Unable to detect location';
          gpsStatus.innerHTML = `❌ ${errorMsg}`;
          gpsBtn.disabled = false;
        },
        options
      );
    }
    
    // ===== REAL TIME CLOCK =====
    function updateClock() {
      var timeElement = document.getElementById('currentTime');
      if (!timeElement) return;
      
      var now = new Date();
      
      // Get device's local time
      var hours = now.getHours().toString().padStart(2, '0');
      var minutes = now.getMinutes().toString().padStart(2, '0');
      var seconds = now.getSeconds().toString().padStart(2, '0');
      
      // Format: HH:MM:SS (24-hour format)
      timeElement.innerHTML = hours + ':' + minutes + ':' + seconds;
      
      // Also update timezone info in status if needed
      var timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
      document.getElementById('gpsStatus').innerHTML = `🕒 Local: ${hours}:${minutes} | ${timezone}`;
    }
    
    // ===== BEEP SOUND =====
    function playBeep() {
      try {
        var AudioCtx = window.AudioContext || window.webkitAudioContext;
        if (!AudioCtx) return;
        var ctx = new AudioCtx();
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.value = 1200;
        gain.gain.value = 0.3;
        osc.start(0);
        osc.stop(ctx.currentTime + 0.15);
        
        setTimeout(function() {
          try {
            var osc2 = ctx.createOscillator();
            var gain2 = ctx.createGain();
            osc2.connect(gain2);
            gain2.connect(ctx.destination);
            osc2.type = 'sine';
            osc2.frequency.value = 1600;
            gain2.gain.value = 0.3;
            osc2.start(0);
            osc2.stop(ctx.currentTime + 0.15);
          } catch(e) {}
        }, 150);
      } catch(e) {}
    }
    
    function playErrorBeep() {
      try {
        var AudioCtx = window.AudioContext || window.webkitAudioContext;
        if (!AudioCtx) return;
        var ctx = new AudioCtx();
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'square';
        osc.frequency.value = 300;
        gain.gain.value = 0.2;
        osc.start(0);
        osc.stop(ctx.currentTime + 0.3);
      } catch(e) {}
    }
    
    // ===== CELLS HANDLING =====
    var cells = [
      document.getElementById('cell1'),
      document.getElementById('cell2'),
      document.getElementById('cell3'),
      document.getElementById('cell4'),
      document.getElementById('cell5'),
      document.getElementById('cell6')
    ];
    
    var letterMap = {
      'A':'1','B':'2','C':'3','D':'4','E':'5',
      'F':'6','G':'7','H':'8','I':'9','J':'0'
    };
    var validLetters = 'ABCDEFGHIJ';
    
    for (var i = 0; i < cells.length; i++) {
      (function(index) {
        cells[index].addEventListener('input', function() {
          var val = this.value.toUpperCase();
          if (val.length > 0 && validLetters.indexOf(val) === -1) {
            this.value = '';
            return;
          }
          this.value = val;
          if (this.value.length === 1 && index < cells.length - 1) {
            cells[index + 1].focus();
          }
          updateLabelId();
        });
        
        cells[index].addEventListener('keydown', function(e) {
          if (e.key === 'Backspace' && this.value === '' && index > 0) {
            cells[index - 1].focus();
          }
        });
      })(i);
    }
    
    function updateLabelId() {
      var code = '';
      for (var i = 0; i < cells.length; i++) {
        code = code + cells[i].value;
      }
      var labelField = document.getElementById('labelId');
      if (code.length === 6) {
        var numbers = '';
        var valid = true;
        for (var j = 0; j < code.length; j++) {
          var letter = code[j];
          if (letterMap[letter]) {
            numbers = numbers + letterMap[letter];
          } else {
            valid = false;
            break;
          }
        }
        labelField.value = valid ? numbers : 'INVALID';
      } else {
        labelField.value = '';
      }
    }
    
    function clearCells() {
      for (var i = 0; i < cells.length; i++) {
        cells[i].value = '';
      }
      document.getElementById('labelId').value = '';
      cells[0].focus();
    }
    
    function getBarcodeValue() {
      var code = '';
      for (var i = 0; i < cells.length; i++) {
        code = code + cells[i].value;
      }
      return code;
    }
    
    // ===== UI Helpers =====
    function showLoading(show) {
      document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
    }
    
    function setMessage(msg, isError) {
      const msgBox = document.getElementById('messageBox');
      msgBox.style.color = isError ? '#b52e2e' : '#1e6f3f';
      msgBox.innerHTML = msg;
    }
    
    // ===== LOCAL TABLE =====
    var scanCounter = 0;
    
    function addToLocalTable(record) {
      scanCounter++;
      var emptyMsg = document.getElementById('empty-message');
      if (emptyMsg) emptyMsg.style.display = 'none';
      
      var tableBody = document.getElementById('tableBody');
      var row = document.createElement('div');
      row.className = 'result-row';
      
      // Get current time for display
      var now = new Date();
      var timeStr = now.toLocaleTimeString();
      
      row.innerHTML = '<div>' + scanCounter + '</div><div>' + record + ' @ ' + timeStr + '</div>';
      tableBody.appendChild(row);
    }
    
    // ===== XANO SEND =====
    async function sendToXano(scanData) {
      const response = await fetch(XANO_API_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify(scanData)
      });
      
      if (!response.ok) {
        const errorText = await response.text();
        throw new Error(`XANO error (${response.status}): ${errorText}`);
      }
      
      return await response.json();
    }
    
    // ===== POPUP =====
    function showSuccessPopup() {
      var popup = document.getElementById('successPopup');
      var now = new Date();
      document.getElementById('popupTime').innerHTML = now.toLocaleDateString() + ' ' + now.toLocaleTimeString();
      popup.style.display = 'block';
      setTimeout(function() { popup.style.display = 'none'; }, 2500);
    }
    
    // ===== MAIN SUBMIT =====
    async function submitScan() {
      var rawBarcode = getBarcodeValue();
      var numericLabel = document.getElementById('labelId').value;
      
      // Validate
      var isValid = true;
      if (rawBarcode.length !== 6) isValid = false;
      for (var ch = 0; ch < rawBarcode.length; ch++) {
        if (validLetters.indexOf(rawBarcode[ch]) === -1) {
          isValid = false;
          break;
        }
      }
      
      if (!numericLabel || numericLabel === 'INVALID' || !isValid) {
        setMessage('❌ Invalid! Use A-J only', true);
        playErrorBeep();
        return;
      }
      
      // Get current GPS location if available
      const locationField = document.getElementById('locationField');
      const locationValue = locationField.value || 'Unknown';
      
      // Prepare data with REAL location and REAL time
      const scanData = {
        barcode_letters: rawBarcode,
        barcode_numbers: numericLabel,
        timestamp: new Date().toISOString(), // REAL device time
        device_time: new Date().toString(), // Full device time string
        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
        status: document.getElementById('statusSelect').value,
        location: locationValue,
        location_coords: currentLocation.latitude ? `${currentLocation.latitude},${currentLocation.longitude}` : null,
        location_accuracy: currentLocation.latitude ? 'GPS' : 'Unknown',
        eta: document.getElementById('etaField').value || new Date().toISOString().split('T')[0],
        scan_type: 'manual',
        device_info: 'Android 5.0 - 5" display with GPS'
      };
      
      showLoading(true);
      setMessage('⏳ Sending to XANO...', false);
      
      try {
        const result = await sendToXano(scanData);
        
        playBeep();
        showSuccessPopup();
        setMessage('✅ Saved to XANO successfully!', false);
        
        // Show in local table with location
        addToLocalTable(`${rawBarcode} → ${numericLabel} @ ${locationValue.split(',')[0]}`);
        
        clearCells();
        console.log('XANO response:', result);
        
      } catch (error) {
        playErrorBeep();
        setMessage('❌ XANO failed: ' + error.message, true);
        console.error('XANO error:', error);
      } finally {
        showLoading(false);
      }
    }
    
    // ===== INITIALIZATION =====
    window.addEventListener('load', function() {
      // Start real-time clock (updates every second)
      updateClock();
      setInterval(updateClock, 1000);
      
      // Get GPS location on load
      setTimeout(() => {
        getCurrentLocation();
      }, 1000);
      
      // Set today's date for ETA
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('etaField').value = today;
      
      // Focus first cell
      cells[0].focus();
      
      setMessage('✅ Ready - Using REAL device time & GPS', false);
    });
    
    // ===== EVENT LISTENERS =====
    document.getElementById('submitButton').addEventListener('click', function(e) {
      e.preventDefault();
      submitScan();
    });
    
    document.getElementById('gpsBtn').addEventListener('click', function() {
      getCurrentLocation();
    });
    
    for (var k = 0; k < cells.length; k++) {
      (function(idx) {
        cells[idx].addEventListener('keypress', function(e) {
          if (e.key === 'Enter') {
            e.preventDefault();
            submitScan();
          }
        });
      })(k);
    }
    
  </script>
</body>
</html>
