<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Scanner UI - Xano Integration</title>

  <meta name="viewport"
        content="width=360, height=640, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      height: 100vh;
      overflow: hidden;
    }

    #phone {
      width: 360px;
      height: 640px;
      background-color: #0B173B;
      font-family: "Courier New", monospace;
      color: #FFFFFF;
      overflow-y: auto;
      overflow-x: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    /* GLASSY MESH */
    #pattern {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      background-image:
        linear-gradient(to bottom,
          rgba(255,255,255,0.08) 0%,
          rgba(255,255,255,0.00) 40%,
          rgba(255,255,255,0.06) 60%,
          rgba(255,255,255,0.00) 100%
        ),
        linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px),
        linear-gradient(135deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.00) 60%);
      background-size: 100% 100%, 32px 32px, 32px 32px, 100% 100%;
      opacity: 0.35;
      z-index: 1;
    }

    /* HEADER */
    #header {
      width: 100%;
      height: 32px;
      background-color: #1A2C55;
      border-bottom: 1px solid #000;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 10px;
      box-sizing: border-box;
      position: relative;
      z-index: 2;
      flex-shrink: 0;
    }

    #leftText { font-weight: bold; font-size: 15px; }
    #rightArea { font-size: 14px; }

    /* SCAN BUTTON */
    #scanButton {
      width: calc(100% - 20px);
      height: 48px;
      background-color: #0A8A2A;
      border: 2px solid #0F5F1C;
      color: #FFFFFF;
      font-size: 20px;
      font-weight: bold;
      text-align: center;
      line-height: 48px;
      margin: 12px auto 0 auto;
      border-radius: 4px;
      position: relative;
      z-index: 2;
      box-shadow: 0 0 6px rgba(0,0,0,0.4);
      cursor: pointer;
      flex-shrink: 0;
    }

    /* SCAN FRAME */
    #scanFrame {
      width: 280px;
      height: 160px;
      border: 2px solid rgba(255,255,255,0.4);
      margin: 20px auto 0 auto;
      position: relative;
      display: none;
      z-index: 3;
      overflow: hidden;
      flex-shrink: 0;
    }

    /* video preview inside frame */
    #preview {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }

    /* LASER */
    #laser {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: rgba(255,0,0,0.8);
      box-shadow: 0 0 6px red;
      animation: laserMove 2s linear infinite;
      display: none;
      z-index: 5;
    }

    @keyframes laserMove {
      0%   { top: 0; }
      50%  { top: 158px; }
      100% { top: 0; }
    }

    /* Corner angles */
    .corner {
      width: 20px;
      height: 20px;
      border: 3px solid #00FFAA;
      position: absolute;
      pointer-events: none;
    }
    .tl { top: -3px; left: -3px; border-right: none; border-bottom: none; }
    .tr { top: -3px; right: -3px; border-left: none; border-bottom: none; }
    .bl { bottom: -3px; left: -3px; border-right: none; border-top: none; }
    .br { bottom: -3px; right: -3px; border-left: none; border-top: none; }

    /* LABEL BLOCK */
    #labelBlock {
      width: 100%;
      display: flex;
      flex-direction: column;
      background-color: transparent;
      flex: 1;
      position: relative;
      z-index: 2;
    }

    #labelTitle {
      height: 32px;
      display: flex;
      align-items: center;
      padding-left: 10px;
      font-weight: bold;
      font-size: 15px;
      background-color: #1A2C55;
      border-top: 1px solid #000;
      border-bottom: 1px solid #000;
      flex-shrink: 0;
    }

    #labelBox {
      width: calc(100% - 20px);
      min-height: 40px;
      max-height: 100px;
      margin: 8px auto 0 auto;
      border: 2px solid #FFFFFF;
      background-color: rgba(0,0,0,0.3);
      padding: 6px 10px;
      font-size: 16px;
      font-weight: bold;
      white-space: pre-line;
      overflow-y: auto;
      word-wrap: break-word;
      flex-shrink: 0;
      backdrop-filter: blur(2px);
    }

    /* ESC | ENTER BAR */
    #labelButtons {
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background-color: #111d33;
      border-top: 1px solid #000;
      border-bottom: 1px solid #000;
      margin-top: 8px;
      padding: 0 25px;
      font-weight: bold;
      font-size: 15px;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.6);
      flex-shrink: 0;
    }

    #labelButtons span {
      cursor: pointer;
    }

    #divider {
      flex: 1;
      text-align: center;
      opacity: 0.6;
    }

    /* LOCATION INPUT */
    #locationInput {
      width: calc(100% - 20px);
      margin: 8px auto 0 auto;
      padding: 8px;
      background-color: #1A2C55;
      border: 2px solid #FFFFFF;
      color: #FFFFFF;
      font-family: "Courier New", monospace;
      font-size: 14px;
      border-radius: 4px;
      box-sizing: border-box;
    }

    #locationInput::placeholder {
      color: rgba(255,255,255,0.5);
    }

    /* KEYPAD WRAPPER */
    #keypadWrapper {
      width: 100%;
      background-color: transparent;
      margin-top: auto;
      padding-top: 10px;
      padding-bottom: 0;
      position: relative;
      z-index: 2;
    }

    /* KEYPAD TABS */
    #keyTabs {
      display: flex;
      justify-content: space-around;
      margin: 0 10px 10px 10px;
    }

    #keyTabs button {
      flex: 1;
      margin: 0 4px;
      padding: 8px 0;
      background-color: #1A2C55;
      border: 1px solid #FFFFFF;
      border-radius: 4px;
      color: #FFFFFF;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      font-family: "Courier New", monospace;
    }

    #keyTabs button.active {
      background-color: #0A8A2A;
      border-color: #0F5F1C;
    }

    /* NUMERIC KEYPAD */
    #numericPad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 0 15px 15px 15px;
    }

    #numericPad button {
      background-color: #1A2C55;
      border: 1px solid #FFFFFF;
      border-radius: 4px;
      color: #FFFFFF;
      font-size: 20px;
      font-weight: bold;
      padding: 12px 0;
      height: 48px;
      text-align: center;
      cursor: pointer;
      font-family: "Courier New", monospace;
      box-shadow: 0 2px 0 #0B0F1A;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #numericPad button:active {
      transform: translateY(1px);
      box-shadow: 0 1px 0 #0B0F1A;
      background-color: #0A8A2A;
    }

    #numericPad button.backspace {
      background-color: #111d33;
      font-size: 18px;
    }

    /* QWERTY KEYPAD */
    #qwertyPad {
      display: none;
      padding: 0 10px 15px 10px;
    }

    .row {
      display: flex;
      gap: 4px;
      margin-bottom: 4px;
    }

    .row button {
      flex: 1;
      background-color: #1A2C55;
      border: 1px solid #FFFFFF;
      border-radius: 4px;
      color: #FFFFFF;
      font-size: 16px;
      font-weight: bold;
      padding: 12px 0;
      height: 48px;
      text-align: center;
      cursor: pointer;
      font-family: "Courier New", monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 0 #0B0F1A;
    }

    .row button:active {
      transform: translateY(1px);
      box-shadow: 0 1px 0 #0B0F1A;
      background-color: #0A8A2A;
    }

    .row button.special {
      background-color: #111d33;
    }

    .row button.space {
      flex: 3;
    }

    /* SYMBOL KEYPAD */
    #symbolPad {
      display: none;
      padding: 0 10px 15px 10px;
    }

    #symbolPad .row button {
      flex: 1;
      background-color: #1A2C55;
      border: 1px solid #FFFFFF;
      border-radius: 4px;
      color: #FFFFFF;
      font-size: 16px;
      font-weight: bold;
      padding: 12px 0;
      height: 48px;
      text-align: center;
      cursor: pointer;
      font-family: "Courier New", monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 0 #0B0F1A;
    }

    #symbolPad .row button:active {
      transform: translateY(1px);
      box-shadow: 0 1px 0 #0B0F1A;
      background-color: #0A8A2A;
    }

    #symbolPad .row button.special {
      background-color: #111d33;
    }

    #symbolPad .row button.space {
      flex: 3;
    }

    /* STATUS SCREEN */
    #statusScreen {
      display: none;
      flex-direction: column;
      align-items: center;
      margin-top: 20px;
      margin-bottom: 0;
      gap: 8px;
      padding: 0 20px 20px 20px;
      flex: 1;
      overflow-y: auto;
      position: relative;
      z-index: 2;
    }

    .statusBtn {
      width: 100%;
      padding: 12px;
      border: 1px solid #FFFFFF;
      background: rgba(26,44,85,0.8);
      color: #FFFFFF;
      font-size: 16px;
      text-align: center;
      border-radius: 4px;
      cursor: pointer;
      font-family: "Courier New", monospace;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      backdrop-filter: blur(2px);
    }

    .statusBtn:active {
      background-color: #0A8A2A;
    }

    .statusBtn.back {
      background-color: #111d33;
      margin-top: 10px;
    }

    /* SUCCESS POPUP */
    #successPopup {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(11,23,59,0.9);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(4px);
    }

    .popup-content {
      background-color: #1A2C55;
      border: 2px solid #0A8A2A;
      border-radius: 10px;
      padding: 30px;
      text-align: center;
      animation: popupFade 0.3s ease;
    }

    .checkmark {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px auto;
      background-color: #0A8A2A;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 50px;
      color: white;
      animation: checkmarkSpin 0.5s ease;
    }

    .popup-message {
      color: #FFFFFF;
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 10px;
      font-family: "Courier New", monospace;
    }

    .popup-submessage {
      color: #00FFAA;
      font-size: 14px;
      font-family: "Courier New", monospace;
    }

    /* ERROR POPUP */
    #errorPopup {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(11,23,59,0.9);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(4px);
    }

    .error-content {
      background-color: #1A2C55;
      border: 2px solid #FF3333;
      border-radius: 10px;
      padding: 30px;
      text-align: center;
      animation: popupFade 0.3s ease;
    }

    .error-mark {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px auto;
      background-color: #FF3333;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 50px;
      color: white;
      animation: checkmarkSpin 0.5s ease;
    }

    /* DEBUG PANEL */
    #debugPanel {
      position: fixed;
      bottom: 10px;
      left: 10px;
      right: 10px;
      background: rgba(0,0,0,0.8);
      border: 1px solid #00FFAA;
      color: #00FFAA;
      padding: 10px;
      font-size: 12px;
      font-family: monospace;
      z-index: 2000;
      display: none;
      max-height: 200px;
      overflow-y: auto;
    }

    @keyframes popupFade {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes checkmarkSpin {
      0% { transform: rotate(0deg) scale(0); }
      50% { transform: rotate(180deg) scale(1.2); }
      100% { transform: rotate(360deg) scale(1); }
    }

    /* Scrollbar styling */
    #phone::-webkit-scrollbar {
      width: 4px;
    }

    #phone::-webkit-scrollbar-track {
      background: #0B173B;
    }

    #phone::-webkit-scrollbar-thumb {
      background: #1A2C55;
    }

    #labelBox::-webkit-scrollbar {
      width: 2px;
    }

    #labelBox::-webkit-scrollbar-track {
      background: transparent;
    }

    #labelBox::-webkit-scrollbar-thumb {
      background: #1A2C55;
    }

    button {
      -webkit-tap-highlight-color: transparent;
      outline: none;
    }
  </style>

  <!-- jsQR -->
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>

  <script>
    let stream = null;
    let scanning = false;
    let scanCount = 0;
    let animationFrame = null;
    let selectedStatus = '';
    let currentScans = [];
    
    // Try different Xano endpoint formats
    const XANO_ENDPOINTS = [
      'https://x8ki-letl-twmt.n7.xano.io/api:WGx5FQAG/qr_scans',
      'https://x8ki-letl-twmt.n7.xano.io/api:WGx5FQAG/qr_scans/',
      'https://x8ki-letl-twmt.n7.xano.io/api:WGx5FQAG/qr_scan',
      'https://x8ki-letl-twmt.n7.xano.io/api:WGx5FQAG/scans'
    ];
    
    let currentEndpointIndex = 0;

    function debugLog(message, data = null) {
      const debugPanel = document.getElementById('debugPanel');
      const timestamp = new Date().toLocaleTimeString();
      let logMessage = `[${timestamp}] ${message}`;
      if (data) {
        logMessage += `\n${JSON.stringify(data, null, 2)}`;
      }
      debugPanel.innerHTML += logMessage + '\n---\n';
      debugPanel.scrollTop = debugPanel.scrollHeight;
      console.log(message, data);
    }

    function toggleDebug() {
      const panel = document.getElementById('debugPanel');
      panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
    }

    function playBeep() {
      const beep = document.getElementById('beep');
      beep.currentTime = 0;
      beep.play().catch(e => console.log('Beep failed:', e));
    }

    function updateTime() {
      const now = new Date();
      const h = now.getHours().toString().padStart(2, '0');
      const m = now.getMinutes().toString().padStart(2, '0');
      document.getElementById("rightArea").innerHTML = h + ":" + m;
    }
    setInterval(updateTime, 1000);

    window.onload = function() {
      updateTime();
      showNumeric();
      debugLog('App initialized');
    };

    async function startScan() {
      if (scanning) return;
      scanning = true;

      document.getElementById("scanFrame").style.display = "block";
      document.getElementById("laser").style.display = "block";

      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "environment" }
        });

        const video = document.getElementById("preview");
        video.srcObject = stream;
        await video.play();

        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");

        function tick() {
          if (!scanning || !video.videoWidth) {
            animationFrame = requestAnimationFrame(tick);
            return;
          }

          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;

          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const qr = jsQR(imageData.data, canvas.width, canvas.height);

          if (qr) {
            onBarcodeDecoded(qr.data);
            return;
          }

          animationFrame = requestAnimationFrame(tick);
        }

        tick();
      } catch (err) {
        console.error("Camera error:", err);
        scanning = false;
        document.getElementById("scanFrame").style.display = "none";
        document.getElementById("laser").style.display = "none";
        showErrorPopup("Could not access camera");
      }
    }

    function stopCamera() {
      if (animationFrame) {
        cancelAnimationFrame(animationFrame);
        animationFrame = null;
      }
      if (stream) {
        stream.getTracks().forEach(t => t.stop());
        stream = null;
      }
    }

    function onBarcodeDecoded(code) {
      scanning = false;
      stopCamera();

      document.getElementById("scanFrame").style.display = "none";
      document.getElementById("laser").style.display = "none";

      playBeep();

      scanCount++;
      const line = scanCount + " " + code;

      currentScans.push({
        number: scanCount,
        code: code,
        timestamp: new Date().toISOString()
      });

      const box = document.getElementById("labelBox");
      box.innerHTML += line + "\n";
      box.scrollTop = box.scrollHeight;
      
      debugLog('Barcode scanned', { code: code, scanCount: scanCount });
    }

    function clearScans() {
      if (confirm('Clear all scans?')) {
        scanCount = 0;
        currentScans = [];
        document.getElementById("labelBox").innerHTML = "";
        document.getElementById("locationInput").value = "";
        debugLog('Scans cleared');
      }
    }

    function validateBeforeStatus() {
      const location = document.getElementById("locationInput").value.trim();
      
      if (currentScans.length === 0) {
        showErrorPopup("Please scan at least one barcode first");
        return false;
      }
      
      if (!location) {
        showErrorPopup("Please enter a location");
        return false;
      }
      
      return true;
    }

    function goToStatus() {
      if (!validateBeforeStatus()) {
        return;
      }
      
      document.getElementById("labelBlock").style.display = "none";
      document.getElementById("scanButton").style.display = "none";
      document.getElementById("keypadWrapper").style.display = "none";

      document.getElementById("leftText").innerHTML = "SELECT STATUS";

      document.getElementById("statusScreen").style.display = "flex";
    }

    async function testXanoConnection() {
      debugLog('Testing Xano connection...');
      
      for (let i = 0; i < XANO_ENDPOINTS.length; i++) {
        const endpoint = XANO_ENDPOINTS[i];
        try {
          debugLog(`Testing endpoint ${i + 1}: ${endpoint}`);
          
          // Try a simple OPTIONS request first
          const response = await fetch(endpoint, {
            method: 'OPTIONS',
            mode: 'cors',
            headers: {
              'Content-Type': 'application/json',
            }
          });
          
          debugLog(`Endpoint ${i + 1} response`, {
            status: response.status,
            statusText: response.statusText,
            headers: Object.fromEntries(response.headers.entries())
          });
          
          if (response.ok) {
            return endpoint;
          }
        } catch (error) {
          debugLog(`Endpoint ${i + 1} failed`, error.message);
        }
      }
      
      return null;
    }

    async function sendToXano(status) {
      const location = document.getElementById("locationInput").value.trim();
      let successCount = 0;
      let errorCount = 0;
      const failedScans = [];

      // Show loading state
      document.getElementById("leftText").innerHTML = "SENDING...";

      // Test connection first
      const workingEndpoint = await testXanoConnection();
      if (!workingEndpoint) {
        debugLog('No working endpoint found');
        showErrorPopup('Cannot connect to server. Check network and endpoint.');
        return { success: 0, error: currentScans.length, failedScans: currentScans };
      }
      
      debugLog(`Using endpoint: ${workingEndpoint}`);

      // Send each scan as a separate record to Xano
      for (const scan of currentScans) {
        const now = new Date();
        
        // Create data matching your table structure
        const xanoData = {
          label_id: scan.code,
          barcode_type: detectBarcodeType(scan.code),
          status: status,
          date: now.toISOString().split('T')[0], // YYYY-MM-DD
          time: now.toTimeString().split(' ')[0], // HH:MM:SS
          location: location,
          eta: calculateETA(status),
          timestamp: Date.now(), // epochs
          created_at: now.toISOString()
        };

        debugLog('Sending data to Xano', xanoData);

        try {
          const response = await fetch(workingEndpoint, {
            method: 'POST',
            mode: 'cors',
            headers: {
              'Content-Type': 'application/json',
              'Accept': 'application/json'
            },
            body: JSON.stringify(xanoData)
          });

          debugLog('Xano response', {
            status: response.status,
            statusText: response.statusText,
            ok: response.ok
          });

          if (!response.ok) {
            const errorText = await response.text();
            throw new Error(`HTTP ${response.status}: ${errorText}`);
          }

          const data = await response.json();
          debugLog('Successfully sent to Xano', data);
          successCount++;
          
        } catch (error) {
          console.error('Error sending to Xano:', error);
          debugLog('Error sending to Xano', error.message);
          errorCount++;
          failedScans.push(scan);
        }
      }

      return { 
        success: successCount, 
        error: errorCount, 
        failedScans: failedScans,
        endpoint: workingEndpoint 
      };
    }

    function detectBarcodeType(code) {
      // Simple barcode type detection
      if (/^[0-9]+$/.test(code)) {
        if (code.length === 12) return "UPC-A";
        if (code.length === 13) return "EAN-13";
        if (code.length === 8) return "EAN-8";
        if (code.length === 14) return "GTIN-14";
        return "Numeric Code";
      } else if (code.startsWith('http')) {
        return "URL QR";
      } else if (code.startsWith('DM:')) {
        return "Data Matrix";
      } else {
        return "QR Code";
      }
    }

    function calculateETA(status) {
      const now = new Date();
      switch(status) {
        case 'Out For Delivery':
          now.setHours(now.getHours() + 2);
          return now.toISOString();
        case 'Depart Post Office':
          now.setDate(now.getDate() + 1);
          return now.toISOString().split('T')[0];
        case 'Delivered':
          return "Delivered";
        default:
          return "";
      }
    }

    async function chooseStatus(status) {
      selectedStatus = status;
      
      // Disable buttons to prevent double submission
      const buttons = document.querySelectorAll('.statusBtn');
      buttons.forEach(btn => btn.style.pointerEvents = 'none');
      
      const result = await sendToXano(status);
      
      // Re-enable buttons
      buttons.forEach(btn => btn.style.pointerEvents = 'auto');
      
      debugLog('Send result', result);
      
      if (result.error === 0) {
        // All successful
        showSuccessPopup(status, result.success);
        
        setTimeout(() => {
          clearScans();
          goBackToScan();
        }, 2000);
      } else if (result.success > 0) {
        // Partial success
        showSuccessPopup(status, result.success, true);
        showErrorPopup(`${result.error} scan(s) failed to send. Check debug panel.`);
        
        // Keep failed scans for retry
        if (result.failedScans && result.failedScans.length > 0) {
          currentScans = result.failedScans;
          scanCount = currentScans.length;
          
          // Update display to show only failed scans
          const box = document.getElementById("labelBox");
          box.innerHTML = "";
          currentScans.forEach((scan, index) => {
            box.innerHTML += (index + 1) + " " + scan.code + "\n";
          });
        }
        
        setTimeout(() => {
          goBackToScan();
        }, 3000);
      } else {
        // Complete failure
        showErrorPopup("Failed to send data to server. Check debug panel.");
        goBackToScan();
      }
    }

    function showSuccessPopup(status, count, partial = false) {
      const popup = document.getElementById('successPopup');
      const statusMsg = document.getElementById('popupStatus');
      const scanCountMsg = document.getElementById('popupScanCount');
      const messageEl = document.querySelector('.popup-message');
      
      statusMsg.textContent = status;
      scanCountMsg.textContent = count + ' scan' + (count !== 1 ? 's' : '') + ' recorded';
      
      if (partial) {
        messageEl.textContent = 'Partially Recorded!';
      } else {
        messageEl.textContent = 'Package Recorded!';
      }
      
      popup.style.display = 'flex';
      
      setTimeout(() => {
        popup.style.display = 'none';
      }, 2000);
    }

    function showErrorPopup(message) {
      const popup = document.getElementById('errorPopup');
      const errorMsg = document.getElementById('errorMessage');
      
      errorMsg.textContent = message;
      popup.style.display = 'flex';
      
      setTimeout(() => {
        popup.style.display = 'none';
      }, 3000);
    }

    function goBackToScan() {
      document.getElementById("statusScreen").style.display = "none";
      document.getElementById("labelBlock").style.display = "flex";
      document.getElementById("scanButton").style.display = "block";
      document.getElementById("keypadWrapper").style.display = "block";
      document.getElementById("leftText").innerHTML = "SCAN BARCODE";
    }

    function showNumeric() {
      document.getElementById("numericPad").style.display = "grid";
      document.getElementById("qwertyPad").style.display = "none";
      document.getElementById("symbolPad").style.display = "none";
      
      document.getElementById("tabNumeric").classList.add("active");
      document.getElementById("tabQwerty").classList.remove("active");
      document.getElementById("tabSymbol").classList.remove("active");
    }

    function showQwerty() {
      document.getElementById("numericPad").style.display = "none";
      document.getElementById("qwertyPad").style.display = "block";
      document.getElementById("symbolPad").style.display = "none";
      
      document.getElementById("tabQwerty").classList.add("active");
      document.getElementById("tabNumeric").classList.remove("active");
      document.getElementById("tabSymbol").classList.remove("active");
    }

    function showSymbol() {
      document.getElementById("numericPad").style.display = "none";
      document.getElementById("qwertyPad").style.display = "none";
      document.getElementById("symbolPad").style.display = "block";
      
      document.getElementById("tabSymbol").classList.add("active");
      document.getElementById("tabQwerty").classList.remove("active");
      document.getElementById("tabNumeric").classList.remove("active");
    }

    function typeChar(c) {
      const box = document.getElementById("labelBox");
      box.innerHTML += c;
      box.scrollTop = box.scrollHeight;
    }

    function backspace() {
      let t = document.getElementById("labelBox").innerHTML;
      document.getElementById("labelBox").innerHTML = t.slice(0, -1);
    }
  </script>

</head>

<body>

  <div id="phone">
    <!-- GLASSY MESH PATTERN -->
    <div id="pattern"></div>

    <div id="header">
      <div id="leftText">SCAN BARCODE</div>
      <div id="rightArea" onclick="toggleDebug()"></div>
    </div>

    <div id="scanButton" onclick="startScan()">SCAN</div>

    <div id="scanFrame">
      <video id="preview" playsinline></video>
      <div id="laser"></div>
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
    </div>

    <!-- LABEL BLOCK -->
    <div id="labelBlock">
      <div id="labelTitle"># LABEL ID</div>

      <div id="labelBox"></div>

      <!-- Location Input Field -->
      <input type="text" id="locationInput" placeholder="Enter Location" maxlength="100">

      <div id="labelButtons">
        <span onclick="clearScans()">ESC</span>
        <span id="divider">|</span>
        <span onclick="goToStatus()">ENTER</span>
      </div>

      <!-- KEYPAD WRAPPER -->
      <div id="keypadWrapper">

        <!-- KEYPAD TABS -->
        <div id="keyTabs">
          <button id="tabQwerty" onclick="showQwerty()">ABC</button>
          <button id="tabNumeric" onclick="showNumeric()" class="active">123</button>
          <button id="tabSymbol" onclick="showSymbol()">SYM</button>
        </div>

        <!-- NUMERIC KEYPAD -->
        <div id="numericPad">
          <button onclick="typeChar('1')">1</button>
          <button onclick="typeChar('2')">2</button>
          <button onclick="typeChar('3')">3</button>
          
          <button onclick="typeChar('4')">4</button>
          <button onclick="typeChar('5')">5</button>
          <button onclick="typeChar('6')">6</button>
          
          <button onclick="typeChar('7')">7</button>
          <button onclick="typeChar('8')">8</button>
          <button onclick="typeChar('9')">9</button>
          
          <button onclick="typeChar('.')">.</button>
          <button onclick="typeChar('0')">0</button>
          <button class="backspace" onclick="backspace()">⌫</button>
        </div>

        <!-- QWERTY KEYPAD -->
        <div id="qwertyPad">
          <div class="row">
            <button onclick="typeChar('q')">q</button>
            <button onclick="typeChar('w')">w</button>
            <button onclick="typeChar('e')">e</button>
            <button onclick="typeChar('r')">r</button>
            <button onclick="typeChar('t')">t</button>
            <button onclick="typeChar('y')">y</button>
            <button onclick="typeChar('u')">u</button>
            <button onclick="typeChar('i')">i</button>
            <button onclick="typeChar('o')">o</button>
            <button onclick="typeChar('p')">p</button>
          </div>
          <div class="row">
            <button onclick="typeChar('a')">a</button>
            <button onclick="typeChar('s')">s</button>
            <button onclick="typeChar('d')">d</button>
            <button onclick="typeChar('f')">f</button>
            <button onclick="typeChar('g')">g</button>
            <button onclick="typeChar('h')">h</button>
            <button onclick="typeChar('j')">j</button>
            <button onclick="typeChar('k')">k</button>
            <button onclick="typeChar('l')">l</button>
          </div>
          <div class="row">
            <button class="special" onclick="typeChar('z')">z</button>
            <button class="special" onclick="typeChar('x')">x</button>
            <button class="special" onclick="typeChar('c')">c</button>
            <button class="special" onclick="typeChar('v')">v</button>
            <button class="special" onclick="typeChar('b')">b</button>
            <button class="special" onclick="typeChar('n')">n</button>
            <button class="special" onclick="typeChar('m')">m</button>
            <button class="special" onclick="backspace()">⌫</button>
          </div>
          <div class="row">
            <button class="special" onclick="showSymbol()">?123</button>
            <button class="space" onclick="typeChar(' ')">space</button>
            <button class="special" onclick="typeChar('.')">.</button>
          </div>
        </div>

        <!-- SYMBOL KEYPAD -->
        <div id="symbolPad">
          <div class="row">
            <button onclick="typeChar('@')">@</button>
            <button onclick="typeChar('#')">#</button>
            <button onclick="typeChar('$')">$</button>
            <button onclick="typeChar('%')">%</button>
            <button onclick="typeChar('&')">&</button>
            <button onclick="typeChar('*')">*</button>
            <button onclick="typeChar('(')">(</button>
            <button onclick="typeChar(')')">)</button>
            <button onclick="typeChar('-')">-</button>
            <button onclick="typeChar('+')">+</button>
          </div>
          <div class="row">
            <button onclick="typeChar('!')">!</button>
            <button onclick="typeChar('?')">?</button>
            <button onclick="typeChar('/')">/</button>
            <button onclick="typeChar(':')">:</button>
            <button onclick="typeChar(';')">;</button>
            <button onclick="typeChar('"')">"</button>
            <button onclick="typeChar("'")">'</button>
            <button onclick="typeChar(',')">,</button>
            <button onclick="typeChar('.')">.</button>
            <button onclick="typeChar('~')">~</button>
          </div>
          <div class="row">
            <button onclick="typeChar('_')">_</button>
            <button onclick="typeChar('=')">=</button>
            <button onclick="typeChar('<')">&lt;</button>
            <button onclick="typeChar('>')">&gt;</button>
            <button onclick="typeChar('[')">[</button>
            <button onclick="typeChar(']')">]</button>
            <button onclick="typeChar('{')">{</button>
            <button onclick="typeChar('}')">}</button>
            <button onclick="typeChar('\\')">\</button>
            <button onclick="typeChar('|')">|</button>
          </div>
          <div class="row">
            <button class="special" onclick="showQwerty()">ABC</button>
            <button class="space" onclick="typeChar(' ')">space</button>
            <button class="special" onclick="backspace()">⌫</button>
          </div>
        </div>

      </div> <!-- END KEYPAD WRAPPER -->

    </div> <!-- END LABEL BLOCK -->

    <!-- STATUS SCREEN -->
    <div id="statusScreen">
      <div class="statusBtn" onclick="chooseStatus('Data Received')">Data Received</div>
      <div class="statusBtn" onclick="chooseStatus('Picked Up')">Picked Up</div>
      <div class="statusBtn" onclick="chooseStatus('Depart Post Office')">Depart Post Office</div>
      <div class="statusBtn" onclick="chooseStatus('Arrival Scan')">Arrival Scan</div>
      <div class="statusBtn" onclick="chooseStatus('Departure Scan')">Departure Scan</div>
      <div class="statusBtn" onclick="chooseStatus('Local Scan')">Local Scan</div>
      <div class="statusBtn" onclick="chooseStatus('Out For Delivery')">Out For Delivery</div>
      <div class="statusBtn" onclick="chooseStatus('Delivered')">Delivered</div>
      <div class="statusBtn back" onclick="goBackToScan()">BACK TO SCANNER</div>
    </div>

    <!-- SUCCESS POPUP -->
    <div id="successPopup">
      <div class="popup-content">
        <div class="checkmark">✓</div>
        <div class="popup-message">Package Recorded!</div>
        <div class="popup-submessage" id="popupStatus"></div>
        <div class="popup-submessage" id="popupScanCount"></div>
      </div>
    </div>

    <!-- ERROR POPUP -->
    <div id="errorPopup">
      <div class="error-content">
        <div class="error-mark">✗</div>
        <div class="popup-message">Error</div>
        <div class="popup-submessage" id="errorMessage"></div>
      </div>
    </div>

    <!-- DEBUG PANEL (click time to show) -->
    <div id="debugPanel" style="display: none;"></div>

    <!-- BEEP -->
    <audio id="beep" src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAESsAACJWAAACABAAZGF0YQAAAAA=" preload="auto"></audio>

  </div>

</body>
</html>
