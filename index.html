<!DOCTYPE html>
<html>
<head>
    <title>Simple Scanner</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/1.2.4/html5-qrcode.min.js"></script>
    <style>
        body {
            background: black;
            color: white;
            font-family: Arial;
            padding: 5px;
            margin: 0;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
        }
        h1 {
            color: #00ff00;
            font-size: 20px;
            text-align: center;
            margin: 5px 0;
        }
        .time {
            color: #00ff00;
            font-size: 16px;
            text-align: center;
            margin: 5px 0;
            font-family: monospace;
        }
        button {
            width: 100%;
            padding: 15px;
            font-size: 20px;
            background: #333;
            color: white;
            border: 2px solid #666;
            margin: 5px 0;
        }
        .grid {
            display: flex;
            gap: 3px;
            margin: 5px 0;
            width: 100%;
        }
        .grid input {
            width: 16.66%; /* Exactly 1/6th of the width */
            height: 50px;
            text-align: center;
            font-size: 28px;
            background: orange;
            border: 2px solid darkorange;
            text-transform: uppercase;
            padding: 0;
            box-sizing: border-box;
        }
        select {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            background: #333;
            color: white;
            border: 2px solid #666;
            margin: 5px 0;
            box-sizing: border-box;
        }
        select:disabled {
            opacity: 0.5;
        }
        #scanner {
            width: 100%;
            height: 250px;
            background: black;
            border: 2px solid #333;
            margin: 5px 0;
            display: none;
            box-sizing: border-box;
        }
        .list {
            border: 2px solid #333;
            margin-top: 10px;
            max-height: 250px;
            overflow-y: auto;
            width: 100%;
            box-sizing: border-box;
        }
        .list-header {
            display: flex;
            background: #333;
            padding: 8px;
            width: 100%;
            box-sizing: border-box;
        }
        .list-header div {
            width: 33.33%;
            text-align: center;
            font-size: 14px;
        }
        .list-item {
            display: flex;
            padding: 6px;
            border-bottom: 1px solid #333;
            color: #00ff00;
            font-family: monospace;
            width: 100%;
            box-sizing: border-box;
        }
        .list-item div {
            width: 33.33%;
            text-align: center;
            font-size: 14px;
        }
        .message {
            position: fixed;
            bottom: 10px;
            left: 10px;
            right: 10px;
            background: red;
            color: white;
            padding: 10px;
            text-align: center;
            display: none;
            border-radius: 5px;
            z-index: 9999;
            font-size: 14px;
        }
        .message.success {
            background: green;
        }
        /* Make sure everything fits */
        * {
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>SCAN BARCODE</h1>
        
        <div class="time" id="time"></div>
        
        <button id="scanBtn">📷 SCAN</button>
        
        <div class="grid" id="grid">
            <input type="text" maxlength="1" id="c1" placeholder="0">
            <input type="text" maxlength="1" id="c2" placeholder="0">
            <input type="text" maxlength="1" id="c3" placeholder="0">
            <input type="text" maxlength="1" id="c4" placeholder="0">
            <input type="text" maxlength="1" id="c5" placeholder="0">
            <input type="text" maxlength="1" id="c6" placeholder="0">
        </div>
        
        <select id="status" disabled>
            <option value="">-- SELECT STATUS --</option>
            <option value="Item Booked">Item Booked</option>
            <option value="Item Received">Item Received</option>
            <option value="Item Bagged">Item Bagged</option>
            <option value="Item Dispatched">Item Dispatched</option>
            <option value="In Transit">In Transit</option>
            <option value="Out for Delivery">Out for Delivery</option>
            <option value="Item Delivered">Item Delivered</option>
        </select>
        
        <div id="scanner"></div>
        
        <div class="list">
            <div class="list-header">
                <div>#</div>
                <div>CODE</div>
                <div>STATUS</div>
            </div>
            <div id="listItems"></div>
        </div>
    </div>
    
    <div class="message" id="message"></div>

    <script>
        // Simple variables
        var scanner = null;
        var isScanning = false;
        var items = [];
        var itemCount = 1;
        
        // Get elements
        var scanBtn = document.getElementById('scanBtn');
        var scannerDiv = document.getElementById('scanner');
        var statusSelect = document.getElementById('status');
        var messageBox = document.getElementById('message');
        var timeDiv = document.getElementById('time');
        var listDiv = document.getElementById('listItems');
        
        // Input fields
        var c1 = document.getElementById('c1');
        var c2 = document.getElementById('c2');
        var c3 = document.getElementById('c3');
        var c4 = document.getElementById('c4');
        var c5 = document.getElementById('c5');
        var c6 = document.getElementById('c6');
        var inputs = [c1, c2, c3, c4, c5, c6];
        
        // Time update
        function updateTime() {
            var d = new Date();
            var h = d.getHours();
            var m = d.getMinutes();
            var s = d.getSeconds();
            if (h < 10) h = '0' + h;
            if (m < 10) m = '0' + m;
            if (s < 10) s = '0' + s;
            timeDiv.innerHTML = h + ':' + m + ':' + s;
        }
        setInterval(updateTime, 1000);
        updateTime();
        
        // Grid input handling
        for (var i = 0; i < inputs.length; i++) {
            inputs[i].oninput = function(index) {
                return function() {
                    this.value = this.value.toUpperCase().substring(0,1);
                    if (this.value && index < 5) {
                        inputs[index + 1].focus();
                    }
                    checkGrid();
                };
            }(i);
            
            inputs[i].onkeydown = function(index) {
                return function(e) {
                    if (e.key === 'Backspace' && !this.value && index > 0) {
                        inputs[index - 1].focus();
                        inputs[index - 1].value = '';
                        checkGrid();
                    }
                };
            }(i);
        }
        
        function checkGrid() {
            var allFilled = true;
            for (var i = 0; i < inputs.length; i++) {
                if (!inputs[i].value) {
                    allFilled = false;
                    break;
                }
            }
            statusSelect.disabled = !allFilled;
        }
        
        function clearGrid() {
            for (var i = 0; i < inputs.length; i++) {
                inputs[i].value = '';
            }
            inputs[0].focus();
            statusSelect.disabled = true;
        }
        
        // Scanner
        function startScanner() {
            if (!scanner) {
                try {
                    scanner = new Html5Qrcode("scanner");
                } catch(e) {
                    showMessage('Scanner failed: ' + e.message);
                    return;
                }
            }
            
            scannerDiv.style.display = 'block';
            
            var config = {
                fps: 10,
                qrbox: 200
            };
            
            scanner.start(
                { facingMode: "environment" },
                config,
                function(text) {
                    showMessage('Scanned: ' + text, 'success');
                    
                    // Fill grid
                    for (var i = 0; i < 6; i++) {
                        if (inputs[i]) {
                            inputs[i].value = (text[i] || '').toUpperCase();
                        }
                    }
                    
                    stopScanner();
                    checkGrid();
                },
                function(error) {
                    // Ignore errors
                }
            ).then(function() {
                isScanning = true;
            }).catch(function(err) {
                showMessage('Camera error: ' + err.message);
                scannerDiv.style.display = 'none';
            });
        }
        
        function stopScanner() {
            if (scanner && isScanning) {
                scanner.stop().then(function() {
                    isScanning = false;
                    scannerDiv.style.display = 'none';
                }).catch(function() {});
            } else {
                scannerDiv.style.display = 'none';
            }
        }
        
        function showMessage(msg, type) {
            messageBox.innerHTML = msg;
            messageBox.className = 'message' + (type === 'success' ? ' success' : '');
            messageBox.style.display = 'block';
            setTimeout(function() {
                messageBox.style.display = 'none';
            }, 2000);
        }
        
        // Send to XANO
        function sendToXano(barcode, status, callback) {
            showMessage('Sending...', 'success');
            
            var now = new Date();
            var data = {
                created_at: now.getTime(),
                epochs: now.getTime(),
                label_id: barcode,
                text: status,
                barcode_type: 'QR_CODE',
                status: status,
                date: now.toISOString().split('T')[0],
                time: now.toTimeString().split(' ')[0],
                location: 'Default',
                eta: 'N/A',
                timestamp: now.getTime()
            };
            
            var xhr = new XMLHttpRequest();
            xhr.open('POST', 'https://x8ki-letl-twmt.n7.xano.io/api:WGx5FQAG/qr_scans', true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        showMessage('Saved!', 'success');
                        if (callback) callback(true);
                    } else {
                        showMessage('Failed: ' + xhr.status);
                        if (callback) callback(false);
                    }
                }
            };
            
            xhr.onerror = function() {
                showMessage('Network error');
                if (callback) callback(false);
            };
            
            xhr.send(JSON.stringify(data));
        }
        
        function addToList(barcode, status) {
            var b = barcode;
            while (b.length < 6) b = '0' + b;
            b = b.substring(0, 6);
            
            items.unshift({
                id: itemCount++,
                code: b,
                status: status
            });
            
            if (items.length > 20) items.pop();
            
            var html = '';
            for (var i = 0; i < items.length; i++) {
                html += '<div class="list-item">' +
                        '<div>' + items[i].id + '</div>' +
                        '<div>' + items[i].code + '</div>' +
                        '<div>' + items[i].status + '</div>' +
                        '</div>';
            }
            listDiv.innerHTML = html;
        }
        
        // Event listeners
        scanBtn.onclick = function(e) {
            e.preventDefault();
            startScanner();
        };
        
        statusSelect.onchange = function() {
            var barcode = '';
            for (var i = 0; i < inputs.length; i++) {
                barcode += inputs[i].value;
            }
            
            var status = statusSelect.value;
            
            if (barcode.length === 6 && status) {
                sendToXano(barcode, status, function(success) {
                    if (success) {
                        addToList(barcode, status);
                        clearGrid();
                        statusSelect.value = '';
                    }
                });
            }
        };
        
        // Focus first input
        inputs[0].focus();
        
        console.log('Ready');
    </script>
</body>
</html>
