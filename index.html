<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PRODUCTION XANO SCANNER</title>
  <style>
    /* [Previous styles remain exactly the same as above] */
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #1b1b1b;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: "Courier New", Courier, monospace;
      color: #ddd;
    }
    .device {
      width: 100%;
      max-width: 400px;
      background: #222;
      border: 3px solid #999;
      display: flex;
      flex-direction: column;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.5);
    }
    .header {
      background: #444;
      color: white;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      font-size: 18px;
      font-weight: bold;
      border-bottom: 3px solid #777;
    }
    .time-display {
      background: #222;
      padding: 4px 8px;
      font-size: 18px;
      font-family: monospace;
      border-radius: 8px;
      color: #f0f0f0;
    }
    .scan-row {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      background: #333;
      border-bottom: 2px solid #666;
    }
    .submit-btn {
      background: #777;
      color: white;
      border: none;
      width: 70px;
      height: 45px;
      border-radius: 5px;
      font-size: 18px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .submit-btn:hover {
      background: #555;
    }
    .grid-container {
      display: flex;
      gap: 5px;
      justify-content: flex-end;
      margin-left: 12px;
    }
    .cell {
      width: 40px;
      height: 50px;
      background: #333;
      border: 2px solid #777;
      border-radius: 6px;
      color: #f0f0f0;
      text-align: center;
      font-size: 22px;
      text-transform: uppercase;
      outline: none;
    }
    .cell:focus {
      border: 3px solid #bbb;
      background: #444;
    }
    .content {
      padding: 16px;
      background: #444;
    }
    .field {
      margin-bottom: 15px;
    }
    .field label {
      display: block;
      font-size: 14px;
      font-weight: bold;
      color: #bbb;
      margin-bottom: 4px;
    }
    .field input,
    .field select {
      width: 100%;
      padding: 12px;
      border: 2px solid #666;
      border-radius: 5px;
      font-size: 14px;
      background: #333;
      color: #f0f0f0;
    }
    .field input[readonly] {
      background: #555;
      font-weight: bold;
    }
    .gps-status {
      font-size: 12px;
      color: #aaa;
    }
    .status-message {
      padding: 12px;
      background: #444;
      border: 2px solid #777;
      border-radius: 5px;
      font-size: 14px;
      text-align: center;
      margin-top: 10px;
    }
    .popup {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 180px;
      background: #444;
      border: 3px solid #777;
      border-radius: 12px;
      text-align: center;
      padding: 16px;
      display: none;
      z-index: 999;
    }
    .popup .circle {
      width: 50px;
      height: 50px;
      background: #28a745;
      border-radius: 50%;
      margin: 0 auto 10px;
      color: white;
      font-size: 30px;
      line-height: 50px;
    }
    .result-section {
      border: 2px solid #777;
      border-radius: 5px;
      background: #555;
      margin-top: 16px;
      overflow: hidden;
    }
    .result-header {
      display: flex;
      background: #777;
      border-bottom: 2px solid #444;
    }
    .result-header div {
      padding: 8px;
      font-weight: bold;
    }
    .result-row {
      display: flex;
      border-bottom: 1px solid #777;
    }
    .result-row div {
      padding: 8px;
      font-size: 12px;
    }
    #empty-message {
      padding: 12px;
      color: #999;
      font-style: italic;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="device">
    <div class="header">
      <span>SCAN BARCODE</span>
      <span class="time-display" id="currentTime"></span>
    </div>
    
    <div class="scan-row">
      <button class="submit-btn" id="submitButton">OK</button>
      <div class="grid-container">
        <input class="cell" maxlength="1" id="cell1">
        <input class="cell" maxlength="1" id="cell2">
        <input class="cell" maxlength="1" id="cell3">
        <input class="cell" maxlength="1" id="cell4">
        <input class="cell" maxlength="1" id="cell5">
        <input class="cell" maxlength="1" id="cell6">
      </div>
    </div>
    
    <div class="content">
      <div class="field">
        <label>Label ID (A-J → 1-0)</label>
        <input type="text" id="labelId" readonly placeholder="---">
      </div>
      <div class="field">
        <label>Barcode Type</label>
        <input type="text" id="barcodeType" value="XANO-PROD" readonly>
      </div>
      <div class="field">
        <label>Status</label>
        <select id="statusSelect">
          <option value="Received">📥 Received</option>
          <option value="Picked Up">📬 Picked Up</option>
          <option value="Depart">🚚 Depart</option>
          <option value="Arrival">📍 Arrival</option>
        </select>
      </div>
      <div class="field">
        <label>📍 Location (Auto GPS)</label>
        <input type="text" id="locationField" readonly placeholder="Detecting location...">
        <div class="gps-status" id="gpsStatus">Getting GPS...</div>
      </div>
      <div class="field">
        <label>📅 ETA</label>
        <input type="date" id="etaField">
      </div>
      
      <div class="result-section">
        <div class="result-header">
          <div>#</div>
          <div>SCAN RECORD</div>
        </div>
        <div id="tableBody"></div>
        <div id="empty-message">No scans yet</div>
      </div>
      
      <div class="status-message" id="messageBox">Ready</div>
    </div>
    
    <div class="popup" id="successPopup">
      <div class="circle">✓</div>
      <p>SAVED TO XANO</p>
      <div id="popupTime"></div>
    </div>
  </div>

  <script>
    // ===== CONFIGURATION =====
    const XANO_API_URL = 'https://x8ki-letl-twmt.n7.xano.io/api:WGx5FQAG';
    const XANO_API_KEY = ''; // Add your API key if required
    
    // ===== TIME DISPLAY =====
    function updateTime() {
      const timeEl = document.getElementById('currentTime');
      if (!timeEl) return;
      const now = new Date();
      timeEl.innerHTML = now.toLocaleTimeString('en-US', { hour12: false });
    }
    updateTime();
    setInterval(updateTime, 1000);

    // ===== BARCODE INPUT HANDLING =====
    const cells = ['cell1', 'cell2', 'cell3', 'cell4', 'cell5', 'cell6'].map(id => document.getElementById(id));
    
    cells.forEach((cell, index) => {
      cell.addEventListener('input', function() {
        this.value = this.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
        if (this.value.length === 1 && index < cells.length - 1) {
          cells[index + 1].focus();
        }
        updateLabelId();
      });
      
      cell.addEventListener('keydown', function(e) {
        if (e.key === 'Backspace' && this.value.length === 0 && index > 0) {
          cells[index - 1].focus();
        }
      });
    });

    function updateLabelId() {
      const barcode = cells.map(cell => cell.value).join('');
      document.getElementById('labelId').value = barcode || '---';
    }

    // ===== GPS FUNCTION =====
    function getGPS() {
      const locField = document.getElementById('locationField');
      const gpsStatus = document.getElementById('gpsStatus');
      
      if (!navigator.geolocation) {
        locField.value = 'GPS_NOT_SUPPORTED';
        gpsStatus.innerHTML = '❌ GPS not supported';
        return;
      }
      
      gpsStatus.innerHTML = '📍 Acquiring GPS...';
      
      navigator.geolocation.getCurrentPosition(
        (position) => {
          const lat = position.coords.latitude.toFixed(6);
          const lng = position.coords.longitude.toFixed(6);
          locField.value = `${lat},${lng}`;
          gpsStatus.innerHTML = '✅ GPS locked';
        },
        (error) => {
          locField.value = 'GPS_UNAVAILABLE';
          let errorMsg = '❌ GPS error: ';
          switch(error.code) {
            case error.PERMISSION_DENIED:
              errorMsg += 'permission_denied';
              break;
            case error.POSITION_UNAVAILABLE:
              errorMsg += 'position_unavailable';
              break;
            case error.TIMEOUT:
              errorMsg += 'timeout';
              break;
            default:
              errorMsg += 'unknown';
          }
          gpsStatus.innerHTML = errorMsg;
        },
        {
          enableHighAccuracy: true,
          timeout: 15000,
          maximumAge: 0
        }
      );
    }
    getGPS();

    // ===== SET DEFAULT DATE =====
    function setDefaultDate() {
      const etaField = document.getElementById('etaField');
      const today = new Date();
      const yyyy = today.getFullYear();
      const mm = String(today.getMonth() + 1).padStart(2, '0');
      const dd = String(today.getDate()).padStart(2, '0');
      etaField.value = `${yyyy}-${mm}-${dd}`;
    }
    setDefaultDate();

    // ===== SCAN RECORDS STORAGE =====
    let scanRecords = JSON.parse(localStorage.getItem('xano_scans') || '[]');
    
    function updateTable() {
      const tableBody = document.getElementById('tableBody');
      const emptyMessage = document.getElementById('empty-message');
      
      if (scanRecords.length === 0) {
        tableBody.innerHTML = '';
        emptyMessage.style.display = 'block';
        return;
      }
      
      emptyMessage.style.display = 'none';
      
      let html = '';
      scanRecords.slice(0, 10).forEach((record, index) => {
        html += `<div class="result-row">
          <div>${index + 1}</div>
          <div>${record.labelId} | ${record.status} | ${new Date(record.timestamp).toLocaleTimeString()}</div>
        </div>`;
      });
      
      tableBody.innerHTML = html;
    }
    updateTable();

    function showPopup() {
      const popup = document.getElementById('successPopup');
      const popupTime = document.getElementById('popupTime');
      popupTime.innerHTML = new Date().toLocaleTimeString();
      popup.style.display = 'block';
      setTimeout(() => { popup.style.display = 'none'; }, 1500);
    }

    // ===== XANO API FUNCTIONS =====
    async function saveToXano(data) {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 10000);
      
      try {
        const headers = {
          'Content-Type': 'application/json',
          'Accept': 'application/json'
        };
        
        // Add API key if provided
        if (XANO_API_KEY) {
          headers['Authorization'] = `Bearer ${XANO_API_KEY}`;
        }
        
        const response = await fetch(XANO_API_URL, {
          method: 'POST',
          headers: headers,
          body: JSON.stringify(data),
          signal: controller.signal
        });
        
        clearTimeout(timeoutId);
        
        if (!response.ok) {
          const errorText = await response.text();
          throw new Error(`XANO error ${response.status}: ${errorText}`);
        }
        
        return await response.json();
      } catch (error) {
        if (error.name === 'AbortError') {
          throw new Error('XANO timeout after 10s');
        }
        throw error;
      }
    }

    // ===== SUBMIT HANDLER =====
    document.getElementById('submitButton').addEventListener('click', async function() {
      const labelId = document.getElementById('labelId').value;
      const status = document.getElementById('statusSelect').value;
      const location = document.getElementById('locationField').value;
      const eta = document.getElementById('etaField').value;
      const messageBox = document.getElementById('messageBox');
      const submitBtn = this;
      
      if (labelId === '---' || labelId === '') {
        messageBox.innerHTML = '❌ BARCODE_REQUIRED';
        messageBox.style.background = '#660000';
        setTimeout(() => {
          messageBox.innerHTML = 'Ready';
          messageBox.style.background = '#444';
        }, 2000);
        return;
      }
      
      // Prepare data
      const scanData = {
        barcode: labelId,
        status: status,
        location: location,
        eta: eta,
        timestamp: new Date().toISOString(),
        device: 'web-prod',
        type: document.getElementById('barcodeType').value
      };
      
      // Disable button during submission
      submitBtn.disabled = true;
      submitBtn.style.opacity = '0.5';
      messageBox.innerHTML = '⏳ Sending to XANO...';
      messageBox.style.background = '#886622';
      
      try {
        // Send to XANO
        const result = await saveToXano(scanData);
        
        // Create local record
        const localRecord = {
          labelId: labelId,
          status: status,
          location: location,
          eta: eta,
          timestamp: new Date().toISOString(),
          xanoId: result.id || 'pending'
        };
        
        // Save locally
        scanRecords.unshift(localRecord);
        if (scanRecords.length > 50) scanRecords.pop();
        localStorage.setItem('xano_scans', JSON.stringify(scanRecords));
        
        // Update UI
        updateTable();
        showPopup();
        
        messageBox.innerHTML = `✅ XANO OK: ${labelId}`;
        messageBox.style.background = '#226622';
        
        // Clear input
        cells.forEach(cell => cell.value = '');
        document.getElementById('labelId').value = '---';
        cells[0].focus();
        
      } catch (error) {
        console.error('XANO error:', error);
        messageBox.innerHTML = `❌ XANO FAIL: ${error.message.substring(0, 30)}`;
        messageBox.style.background = '#660000';
      } finally {
        submitBtn.disabled = false;
        submitBtn.style.opacity = '1';
        
        setTimeout(() => {
          messageBox.innerHTML = 'Ready';
          messageBox.style.background = '#444';
        }, 3000);
      }
    });

    // ===== SCANNER SUPPORT =====
    let scanBuffer = '';
    let scanTimer;
    
    document.addEventListener('keypress', (e) => {
      if (e.target.tagName !== 'INPUT') {
        const key = e.key;
        if (key.length === 1 && key.match(/[A-Za-z0-9]/i)) {
          clearTimeout(scanTimer);
          scanBuffer += key.toUpperCase();
          
          if (scanBuffer.length >= 6) {
            for (let i = 0; i < 6; i++) {
              if (cells[i]) cells[i].value = scanBuffer[i] || '';
            }
            updateLabelId();
            cells[5].focus();
            scanBuffer = '';
            
            // Auto-submit for scanner
            setTimeout(() => {
              document.getElementById('submitButton').click();
            }, 100);
          }
          
          scanTimer = setTimeout(() => { scanBuffer = ''; }, 200);
        }
      }
    });

    // ===== KEYBOARD SHORTCUTS =====
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey && e.target.tagName !== 'BUTTON') {
        e.preventDefault();
        document.getElementById('submitButton').click();
      }
    });

    // ===== INIT =====
    cells[0].focus();
  </script>
</body>
</html>
