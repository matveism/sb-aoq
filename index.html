<html>
<head>
<title>Win CE 2007 - Scan Barcode</title>

<!-- Very old school meta tags for compatibility -->

<style type="text/css">
body {
margin: 0;
padding: 0;
background: #000000;
text-align: center;
font-family: 'Arial', Helvetica, sans-serif;
}

/* Center the fixed canvas */
#wrapper {
width: 100%;
text-align: center;
margin-top: 20px;
}

/* FIXED CANVAS — EXACT 720×1280 */
#canvas {
width: 720px;
height: 1280px;
background: #1b1f2a;
border: 2px solid #333333;
margin: 0 auto;
overflow-y: auto;
overflow-x: hidden;
-webkit-box-shadow: 0px 0px 20px #000000;
-moz-box-shadow: 0px 0px 20px #000000;
box-shadow: 0px 0px 20px #000000;
}

/* Win CE 2007 style header */
#header {
width: 720px;
height: 60px;
background: #2c3e6d;
color: #ffffff;
font-size: 28px;
line-height: 60px;
border-bottom: 2px solid #4a6a9e;
position: relative;
font-weight: bold;
text-shadow: 2px 2px 2px #1a1a1a;
}

#header-left {
float: left;
padding-left: 15px;
font-weight: bold;
color: #ffffff;
}

#header-right {
float: right;
padding-right: 15px;
font-size: 28px;
font-weight: bold;
color: #ffffff;
}

.clear {
clear: both;
}

/* Content area */
#content {
width: 720px;
background: #1b1f2a;
padding: 20px;
box-sizing: border-box;
min-height: 1220px;
}

/* Container for button and grid side by side */
.scan-row {
width: 100%;
display: flex;
flex-direction: row;
gap: 20px;
margin-bottom: 20px;
}

/* Old style gray border SCAN button */
.scan-button {
width: 200px;
height: 80px;
background: #3a3f4a;
border: 3px solid #6a6f7a;
color: #ffffff;
font-size: 32px;
font-weight: bold;
text-align: center;
line-height: 80px;
text-transform: uppercase;
cursor: pointer;
box-shadow: 3px 3px 5px #0a0a0a;
text-shadow: 2px 2px 2px #1a1a1a;
flex-shrink: 0;
}

.scan-button:hover {
background: #4a4f5a;
border-color: #8a8f9a;
}

.scan-button.disabled {
opacity: 0.5;
cursor: not-allowed;
pointer-events: none;
}

/* 6-character input grid container */
.grid-container {
display: flex;
flex-direction: row;
gap: 5px;
height: 80px;
flex-grow: 1;
}

/* Individual grid cells */
.grid-cell {
width: 70px;
height: 80px;
background: #d47b2e;
border: 2px solid #a85e1f;
position: relative;
}

/* Style for the input fields inside cells */
.grid-cell input {
width: 100%;
height: 100%;
background: transparent;
border: none;
color: #000000;
font-size: 36px;
font-weight: bold;
text-align: center;
padding: 0;
margin: 0;
outline: none;
font-family: 'Arial', Helvetica, sans-serif;
text-transform: uppercase;
}

.grid-cell input:focus {
background: #e58c3f;
}

/* Status row container */
.status-row {
width: 100%;
display: flex;
flex-direction: row;
align-items: center;
gap: 15px;
margin: 25px 0 20px 0;
padding: 10px;
background: #2a2f3a;
border: 2px solid #4a5270;
box-sizing: border-box;
}

/* Status label */
.status-label {
color: #aaccff;
font-size: 24px;
font-weight: bold;
text-transform: uppercase;
white-space: nowrap;
}

/* Dropdown container */
.dropdown-container {
position: relative;
flex-grow: 1;
}

/* Old school dropdown - disabled by default */
.status-dropdown {
width: 100%;
padding: 12px 15px;
background: #1b1f2a;
border: 2px solid #6a8abe;
color: #ffffff;
font-size: 22px;
font-family: 'Arial', Helvetica, sans-serif;
cursor: pointer;
appearance: none;
-webkit-appearance: none;
-moz-appearance: none;
background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="%236a8abe" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>');
background-repeat: no-repeat;
background-position: right 15px center;
background-size: 20px;
}

.status-dropdown:disabled {
opacity: 0.5;
cursor: not-allowed;
background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="%233a4258" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>');
}

.status-dropdown option {
background: #1b1f2a;
color: #ffffff;
font-size: 20px;
padding: 10px;
}

/* Date/Time read-only display */
.datetime-row {
width: 100%;
margin: 15px 0 20px 0;
padding: 12px 15px;
background: #1b1f2a;
border: 2px solid #4a6a9e;
color: #00ff00;
font-size: 26px;
font-family: 'Courier New', monospace;
text-align: center;
box-sizing: border-box;
letter-spacing: 2px;
}

/* Table header - darker light blue */
.table-header {
width: 100%;
display: flex;
flex-direction: row;
background: #2c3e6d; /* Darker light blue */
border: 2px solid #4a6a9e;
margin-bottom: 5px;
box-sizing: border-box;
}

.header-cell {
padding: 12px 10px;
color: #ffffff;
font-size: 22px;
font-weight: bold;
text-align: center;
}

.header-num {
width: 20%;
border-right: 2px solid #4a6a9e;
}

.header-barcode {
width: 40%;
border-right: 2px solid #4a6a9e;
}

.header-label {
width: 40%;
}

/* Scanned items container - transparent light blue */
.scanned-items {
width: 100%;
height: 350px;
background: rgba(74, 106, 158, 0.15); /* Transparent light blue */
border: 2px solid #4a6a9e;
overflow-y: auto;
box-sizing: border-box;
}

/* Individual scanned item row */
.scanned-row {
display: flex;
flex-direction: row;
border-bottom: 1px solid #4a6a9e;
font-size: 20px;
font-family: 'Courier New', monospace;
}

.scanned-row:last-child {
border-bottom: none;
}

.scanned-num {
width: 20%;
padding: 8px;
color: #aaccff;
text-align: center;
border-right: 1px solid #4a6a9e;
}

.scanned-barcode {
width: 40%;
padding: 8px;
color: #00ff00;
text-align: center;
border-right: 1px solid #4a6a9e;
font-weight: bold;
letter-spacing: 1px;
}

.scanned-label {
width: 40%;
padding: 8px;
color: #ffffff;
text-align: center;
}

/* Scanner container - visible when scanning */
#scanner-container {
width: 100%;
margin-top: 20px;
border: 2px solid #4a6a9e;
background: #000000;
display: none;
position: relative;
}

/* Scanner element */
#reader {
width: 100%;
height: 300px;
background: #000000;
overflow: hidden;
}

#reader video {
width: 100% !important;
height: auto !important;
object-fit: cover;
}

#reader__dashboard_section {
background: #1b1f2a !important;
color: #ffffff !important;
}

#reader__dashboard_section button {
background: #3a3f4a !important;
color: #ffffff !important;
border: 2px solid #6a6f7a !important;
font-size: 18px !important;
padding: 10px 20px !important;
margin: 10px !important;
}

/* Close scanner button */
.close-scanner {
position: absolute;
top: 10px;
right: 10px;
background: #ff4444;
color: white;
border: none;
font-size: 20px;
width: 40px;
height: 40px;
border-radius: 50%;
cursor: pointer;
z-index: 1000;
display: flex;
align-items: center;
justify-content: center;
font-weight: bold;
}

.close-scanner:hover {
background: #ff6666;
}

/* Simple instruction */
.scan-instruction {
color: #aaccff;
font-size: 16px;
margin-top: 10px;
text-align: center;
font-family: 'Courier New', monospace;
display: none;
}

/* Loading overlay */
.loading-overlay {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: rgba(0, 0, 0, 0.8);
display: none;
justify-content: center;
align-items: center;
z-index: 9999;
}

.loading-spinner {
color: #ffffff;
font-size: 24px;
text-align: center;
}

.loading-spinner::after {
content: '';
display: block;
width: 50px;
height: 50px;
border: 5px solid #ffffff;
border-top-color: #00ff00;
border-radius: 50%;
margin: 20px auto;
animation: spin 1s linear infinite;
}

@keyframes spin {
from { transform: rotate(0deg); }
to { transform: rotate(360deg); }
}

.error-toast {
position: fixed;
bottom: 20px;
left: 50%;
transform: translateX(-50%);
background: #ff4444;
color: white;
padding: 15px 30px;
border-radius: 5px;
font-size: 20px;
display: none;
z-index: 10000;
}

.success-toast {
position: fixed;
bottom: 20px;
left: 50%;
transform: translateX(-50%);
background: #00C851;
color: white;
padding: 15px 30px;
border-radius: 5px;
font-size: 20px;
display: none;
z-index: 10000;
}

/* Camera error message */
.camera-error {
color: #ff4444;
font-size: 18px;
text-align: center;
padding: 20px;
background: #1b1f2a;
margin-top: 10px;
display: none;
}
</style>
</head>

<body>
<div id="wrapper">
<div id="canvas">

<div id="header">
<div id="header-left">SCAN BARCODE</div>
<div id="header-right">12:00:00</div>
<div class="clear"></div>
</div>

<div id="content">
<!-- SCAN button and 6-character grid side by side -->
<div class="scan-row">
<div class="scan-button" id="scanBtn">SCAN</div>
<div class="grid-container">
<div class="grid-cell"><input type="text" maxlength="1" class="char-input" id="char1"></div>
<div class="grid-cell"><input type="text" maxlength="1" class="char-input" id="char2"></div>
<div class="grid-cell"><input type="text" maxlength="1" class="char-input" id="char3"></div>
<div class="grid-cell"><input type="text" maxlength="1" class="char-input" id="char4"></div>
<div class="grid-cell"><input type="text" maxlength="1" class="char-input" id="char5"></div>
<div class="grid-cell"><input type="text" maxlength="1" class="char-input" id="char6"></div>
</div>
</div>

<!-- Status dropdown row - initially disabled -->
<div class="status-row">
<div class="status-label">STATUS</div>
<div class="dropdown-container">
<select class="status-dropdown" id="statusDropdown" disabled>
<option value="">-- Select Status --</option>
<option value="Item Booked">Item Booked</option>
<option value="Item Received">Item Received</option>
<option value="Item Bagged">Item Bagged</option>
<option value="Item Dispatched">Item Dispatched</option>
<option value="In Transit">In Transit</option>
<option value="Out for Delivery">Out for Delivery</option>
<option value="Item Delivered">Item Delivered</option>
</select>
</div>
</div>

<!-- Date/Time read-only display -->
<div class="datetime-row" id="datetimeDisplay">
2024-01-15 14:30:45
</div>

<!-- Table header - darker light blue -->
<div class="table-header">
<div class="header-cell header-num">#</div>
<div class="header-cell header-barcode">BARCODE</div>
<div class="header-cell header-label">STATUS</div>
</div>

<!-- Scanned items container - transparent light blue -->
<div class="scanned-items" id="scannedItems">
<!-- Items will be added here when scanned -->
</div>

<!-- Camera error message -->
<div class="camera-error" id="cameraError">
Camera not available or permission denied
</div>

<!-- Visible scanner container -->
<div id="scanner-container">
<button class="close-scanner" id="closeScanner">×</button>
<div id="reader"></div>
</div>

<!-- Simple instruction -->
<div class="scan-instruction" id="scanInstruction">
Point camera at barcode
</div>
</div>

</div>
</div>

<!-- Loading overlay -->
<div class="loading-overlay" id="loadingOverlay">
<div class="loading-spinner">Sending to XANO...</div>
</div>

<!-- Toast notifications -->
<div class="error-toast" id="errorToast"></div>
<div class="success-toast" id="successToast"></div>

<script type="text/javascript">
// =============================================
// XANO API CONFIGURATION
// =============================================
const XANO_API_URL = 'https://x8ki-letl-twmt.n7.xano.io/api:WGx5FQAG/qr_scans';

// =============================================
// TOAST NOTIFICATION FUNCTIONS
// =============================================
function showError(message) {
var toast = document.getElementById('errorToast');
toast.innerHTML = message;
toast.style.display = 'block';
setTimeout(function() {
toast.style.display = 'none';
}, 3000);
}

function showSuccess(message) {
var toast = document.getElementById('successToast');
toast.innerHTML = message;
toast.style.display = 'block';
setTimeout(function() {
toast.style.display = 'none';
}, 3000);
}

// =============================================
// LOADING OVERLAY
// =============================================
function showLoading() {
document.getElementById('loadingOverlay').style.display = 'flex';
}

function hideLoading() {
document.getElementById('loadingOverlay').style.display = 'none';
}

// =============================================
// BEEP SOUND FUNCTION
// =============================================
function playBeep() {
try {
// Try to use Web Audio API for beep
var audioCtx = new (window.AudioContext || window.webkitAudioContext)();
var oscillator = audioCtx.createOscillator();
var gainNode = audioCtx.createGain();

oscillator.connect(gainNode);
gainNode.connect(audioCtx.destination);

oscillator.frequency.value = 800;
oscillator.type = 'sine';

gainNode.gain.value = 0.1;

oscillator.start();
oscillator.stop(audioCtx.currentTime + 0.1);
} catch (e) {
// Fallback for older browsers - use simple beep
console.log("Beep sound not supported");
}
}

// =============================================
// SEND DATA TO XANO DATABASE
// =============================================
async function sendToXano(barcode, status) {
try {
showLoading();

// Get current timestamp in epochs (milliseconds)
var now = new Date();
var epochs = Math.floor(now.getTime());

// Format date as YYYY-MM-DD
var dateStr = now.toISOString().split('T')[0];

// Format time as HH:MM:SS
var timeStr = now.toTimeString().split(' ')[0];

// Prepare the data according to your table structure
var data = {
created_at: epochs,
epochs: epochs,
label_id: barcode, // Using barcode as label_id
text: status,
barcode_type: "QR_CODE",
status: status,
date: dateStr,
time: timeStr,
location: "Default Location", // You can modify this as needed
eta: "N/A",
timestamp: epochs
};

console.log("Sending to XANO:", data);

// Send to XANO
var response = await fetch(XANO_API_URL, {
method: 'POST',
headers: {
'Content-Type': 'application/json',
'Accept': 'application/json'
},
body: JSON.stringify(data)
});

if (!response.ok) {
var errorText = await response.text();
throw new Error(`HTTP error! status: ${response.status}, message: ${errorText}`);
}

var responseData = await response.json();
console.log("XANO Response:", responseData);

// Hide loading
hideLoading();

// Show success message
showSuccess('Data sent to XANO successfully!');

return true;

} catch (error) {
console.error("Error sending to XANO:", error);
hideLoading();
showError('Failed to send to XANO: ' + error.message);
return false;
}
}

// =============================================
// TIME DISPLAYS - Real time clock
// =============================================
function updateTime() {
var now = new Date();
var hours = now.getHours();
var minutes = now.getMinutes();
var seconds = now.getSeconds();

hours = hours < 10 ? '0' + hours : hours;
minutes = minutes < 10 ? '0' + minutes : minutes;
seconds = seconds < 10 ? '0' + seconds : seconds;

var timeString = hours + ':' + minutes + ':' + seconds;

// Update header time
var timeElement = document.getElementById('header-right');
if (timeElement) {
timeElement.innerHTML = timeString;
}

// Update full date/time display
updateDateTimeDisplay();
}

function updateDateTimeDisplay() {
var now = new Date();
var year = now.getFullYear();
var month = (now.getMonth() + 1).toString().padStart(2, '0');
var day = now.getDate().toString().padStart(2, '0');
var hours = now.getHours().toString().padStart(2, '0');
var minutes = now.getMinutes().toString().padStart(2, '0');
var seconds = now.getSeconds().toString().padStart(2, '0');

var dateTimeString = year + '-' + month + '-' + day + ' ' + hours + ':' + minutes + ':' + seconds;

var dateTimeElement = document.getElementById('datetimeDisplay');
if (dateTimeElement) {
dateTimeElement.innerHTML = dateTimeString;
}
}

// =============================================
// GRID CELLS - Track when filled
// =============================================

var gridFilled = false;

function checkGridFilled() {
var allFilled = true;
for (var i = 1; i <= 6; i++) {
var input = document.getElementById('char' + i);
if (!input || input.value === '') {
allFilled = false;
break;
}
}

if (allFilled && !gridFilled) {
// Grid just became filled - enable dropdown
gridFilled = true;
document.getElementById('statusDropdown').disabled = false;
document.getElementById('statusDropdown').focus();
playBeep(); // Beep when grid is filled
} else if (!allFilled && gridFilled) {
// Grid became empty - disable dropdown
gridFilled = false;
document.getElementById('statusDropdown').disabled = true;
}

return allFilled;
}

function setupInputFields() {
var inputs = document.querySelectorAll('.char-input');

for (var i = 0; i < inputs.length; i++) {
inputs[i].addEventListener('input', function(e) {
var currentInput = e.target;
var currentValue = currentInput.value;
var currentId = parseInt(currentInput.id.replace('char', ''));

if (currentValue.length > 0) {
currentInput.value = currentValue.charAt(0).toUpperCase();

if (currentId < 6) {
document.getElementById('char' + (currentId + 1)).focus();
}
}

// Check if grid is now filled
checkGridFilled();
});

inputs[i].addEventListener('keydown', function(e) {
var currentInput = e.target;
var currentId = parseInt(currentInput.id.replace('char', ''));

if (e.key === 'Backspace' && currentInput.value.length === 0) {
if (currentId > 1) {
e.preventDefault();
var prevInput = document.getElementById('char' + (currentId - 1));
prevInput.focus();
prevInput.value = '';

// Check if grid is now empty
checkGridFilled();
}
}
});
}
}

// Clear grid cells
function clearGrid() {
for (var i = 1; i <= 6; i++) {
document.getElementById('char' + i).value = '';
}
document.getElementById('char1').focus();
checkGridFilled();
}

// =============================================
// SCANNED ITEMS LIST
// =============================================

var scannedItems = [];
var itemCounter = 1;

// Add scanned item to list
function addScannedItem(barcode, status) {
// Format barcode to 6 digits
var formattedBarcode = barcode.padStart(6, '0').substring(0, 6).toUpperCase();

// Create item object
var item = {
id: itemCounter++,
barcode: formattedBarcode,
status: status
};

scannedItems.unshift(item); // Add to beginning (newest first)

// Limit to 30 items
if (scannedItems.length > 30) {
scannedItems.pop();
}

// Refresh display
renderScannedItems();
}

// Render scanned items list
function renderScannedItems() {
var container = document.getElementById('scannedItems');
container.innerHTML = '';

if (scannedItems.length === 0) {
return; // Empty container
}

for (var i = 0; i < scannedItems.length; i++) {
var item = scannedItems[i];

var row = document.createElement('div');
row.className = 'scanned-row';

var numCell = document.createElement('div');
numCell.className = 'scanned-num';
numCell.innerHTML = item.id;

var barcodeCell = document.createElement('div');
barcodeCell.className = 'scanned-barcode';
barcodeCell.innerHTML = item.barcode;

var statusCell = document.createElement('div');
statusCell.className = 'scanned-label';
statusCell.innerHTML = item.status;

row.appendChild(numCell);
row.appendChild(barcodeCell);
row.appendChild(statusCell);

container.appendChild(row);
}

// Scroll to top
container.scrollTop = 0;
}

// =============================================
// BARCODE SCANNER - FIXED VERSION
// =============================================

var html5QrCode = null;
var isScanning = false;
var scannerInitialized = false;

function createScanner() {
try {
// Check if Html5Qrcode is available
if (typeof Html5Qrcode === 'undefined') {
console.error("Html5Qrcode library not loaded");
showError("Scanner library not loaded. Please refresh.");
return false;
}

// Get the reader element
var readerElement = document.getElementById('reader');
if (!readerElement) {
console.error("Reader element not found");
return false;
}

// Clear any existing scanner
if (html5QrCode) {
try {
html5QrCode.clear();
} catch (e) {}
}

// Create new scanner
html5QrCode = new Html5Qrcode("reader");
scannerInitialized = true;
console.log("Scanner created successfully");
return true;
} catch (err) {
console.error("Scanner creation error:", err);
showError("Failed to initialize scanner: " + err.message);
return false;
}
}

function stopCamera() {
if (html5QrCode && isScanning) {
html5QrCode.stop().then(function() {
isScanning = false;
document.getElementById('scanner-container').style.display = 'none';
document.getElementById('scanInstruction').style.display = 'none';
document.getElementById('cameraError').style.display = 'none';
console.log("Camera stopped");
}).catch(function(err) {
console.error("Error stopping camera:", err);
});
} else {
document.getElementById('scanner-container').style.display = 'none';
document.getElementById('scanInstruction').style.display = 'none';
}
}

function startCamera() {
// Hide any previous errors
document.getElementById('cameraError').style.display = 'none';

// Check if camera is supported
if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
document.getElementById('cameraError').innerHTML = 'Camera not supported on this device/browser';
document.getElementById('cameraError').style.display = 'block';
showError('Camera not supported on this device');
return;
}

// Create scanner if not initialized
if (!scannerInitialized) {
var created = createScanner();
if (!created) {
return;
}
}

// Show scanner container
document.getElementById('scanner-container').style.display = 'block';
document.getElementById('scanInstruction').style.display = 'block';

// Scanner configuration
var config = {
fps: 10,
qrbox: { width: 250, height: 150 },
aspectRatio: 1.7777,
rememberLastUsedCamera: true,
showTorchButtonIfSupported: true
};

// Start scanning
html5QrCode.start(
{ facingMode: "environment" },
config,
// Success callback
function(decodedText, decodedResult) {
console.log("Scan success:", decodedText);
            
// Get the scanned barcode
var barcode = decodedText.trim();

// Fill grid cells with barcode
for (var i = 1; i <= 6; i++) {
var charInput = document.getElementById('char' + i);
if (charInput) {
if (i <= barcode.length) {
charInput.value = barcode.charAt(i-1).toUpperCase();
} else {
charInput.value = '';
}
}
}

// Beep when scanned
playBeep();

// Check if grid is filled
checkGridFilled();

// Stop camera and hide scanner
stopCamera();
},
// Error callback
function(errorMessage) {
// Only log errors, don't show to user
console.log("Scan error:", errorMessage);
}
).then(function() {
isScanning = true;
console.log("Camera started successfully");
}).catch(function(err) {
console.error("Camera start error:", err);
document.getElementById('scanner-container').style.display = 'none';
document.getElementById('scanInstruction').style.display = 'none';
document.getElementById('cameraError').innerHTML = 'Failed to start camera: ' + (err.message || 'Unknown error');
document.getElementById('cameraError').style.display = 'block';
showError('Failed to start camera. Please check permissions.');
});
}

// =============================================
// STATUS DROPDOWN HANDLER - NOW SENDS TO XANO
// =============================================

async function handleStatusSelected() {
var dropdown = document.getElementById('statusDropdown');
var selectedIndex = dropdown.selectedIndex;

if (selectedIndex > 0) { // Not the placeholder
var selectedStatus = dropdown.options[selectedIndex].text;

// Get barcode from grid
var barcode = '';
for (var i = 1; i <= 6; i++) {
barcode += document.getElementById('char' + i).value;
}

if (barcode.length === 6) {
// Send to XANO first
var sent = await sendToXano(barcode, selectedStatus);
            
if (sent) {
// Add to list only if XANO save was successful
addScannedItem(barcode, selectedStatus);

// Clear grid and reset dropdown
clearGrid();
dropdown.selectedIndex = 0;
dropdown.disabled = true;

// Beep for confirmation
playBeep();
} else {
// If failed, keep the data for retry
showError('Failed to save to XANO. Please try again.');
}
}
}
}

// =============================================
// INITIALIZATION
// =============================================
window.onload = function() {
console.log("Page loaded, initializing...");
    
updateTime();
setInterval(updateTime, 1000);
setupInputFields();

// Initialize scanner
createScanner();

// SCAN button click
document.getElementById('scanBtn').onclick = function(e) {
e.preventDefault();
console.log("SCAN button clicked");
startCamera();
};

// Close scanner button
document.getElementById('closeScanner').onclick = function(e) {
e.preventDefault();
stopCamera();
};

// Status dropdown change
document.getElementById('statusDropdown').onchange = function() {
handleStatusSelected();
};

// Focus on first cell
document.getElementById('char1').focus();

// Test XANO connection on load (optional)
console.log("Ready to send data to XANO at:", XANO_API_URL);
};

// Cleanup
window.onbeforeunload = function() {
if (html5QrCode && isScanning) {
html5QrCode.stop();
}
};
</script>
