<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Android 5.0 Barcode Scanner - SIMPLE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    * {
      -webkit-box-sizing: border-box;
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: Roboto, Arial, sans-serif;
    }
    .device {
      width: 100%;
      max-width: 400px;
      height: 100vh;
      max-height: 800px;
      background: #B0C8E2;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .header {
      background: #15569B;
      color: white;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      font-size: 20px;
      font-weight: bold;
    }
    .time-display {
      background: #1e3a6b;
      padding: 8px 16px;
      border-radius: 30px;
      font-size: 18px;
    }
    .scan-row {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      gap: 10px;
      background: #B0C8E2;
      border-bottom: 2px solid #79A4D2;
    }
    .submit-btn {
      background: #28a745;
      color: white;
      border: none;
      width: 70px;
      height: 55px;
      border-radius: 8px;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
    }
    .submit-btn:active {
      background: #1e7e34;
    }
    .grid-container {
      display: flex;
      gap: 4px;
      flex: 1;
      justify-content: flex-end;
    }
    .cell {
      width: 40px;
      height: 55px;
      background: white;
      border: 2px solid #666;
      border-radius: 8px;
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      text-transform: uppercase;
      outline: none;
      color: black;
      /* FORCE NUMBER KEYBOARD on Android */
      -webkit-appearance: none;
      -moz-appearance: textfield;
      appearance: none;
    }
    .cell:focus {
      border: 3px solid #FCC57A;
      background: #FB9809;
    }
    .content {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      background: #B0C8E2;
    }
    .status-section {
      background: #96BEEE;
      border: 2px solid #79A4D2;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .field {
      margin-bottom: 15px;
    }
    .field label {
      display: block;
      font-size: 14px;
      font-weight: bold;
      color: #15569B;
      margin-bottom: 4px;
    }
    .location-row {
      display: flex;
      gap: 8px;
    }
    .location-row input {
      flex: 1;
      padding: 12px;
      border: 2px solid #79A4D2;
      border-radius: 8px;
      font-size: 14px;
      background: white;
    }
    .gps-btn {
      background: #15569B;
      color: white;
      border: none;
      border-radius: 8px;
      width: 50px;
      font-size: 24px;
      cursor: pointer;
    }
    .field input, .field select {
      width: 100%;
      padding: 12px;
      border: 2px solid #79A4D2;
      border-radius: 8px;
      font-size: 14px;
      background: white;
    }
    .field input[readonly] {
      background: #e2e8d3;
      font-weight: bold;
    }
    .gps-status {
      font-size: 12px;
      color: #15569B;
      margin-top: 4px;
    }
    .result-section {
      border: 2px solid #79A4D2;
      border-radius: 8px;
      overflow: hidden;
      background: white;
      margin-bottom: 16px;
    }
    .result-header {
      display: flex;
      background: #79A4D2;
      border-bottom: 2px solid #15569B;
    }
    .result-header div:first-child {
      width: 45px;
      padding: 10px;
      text-align: center;
      border-right: 2px solid #15569B;
      font-weight: bold;
    }
    .result-header div:last-child {
      flex: 1;
      padding: 10px;
      font-weight: bold;
    }
    .result-row {
      display: flex;
      border-bottom: 1px solid #79A4D2;
    }
    .result-row div:first-child {
      width: 45px;
      padding: 10px;
      text-align: center;
      border-right: 1px solid #79A4D2;
    }
    .result-row div:last-child {
      flex: 1;
      padding: 10px;
    }
    #empty-message {
      padding: 15px;
      color: #666;
      font-style: italic;
      text-align: center;
    }
    .status-message {
      padding: 12px;
      text-align: center;
      background: white;
      border-radius: 8px;
      border: 2px solid #79A4D2;
      font-size: 14px;
      font-weight: bold;
    }
    .popup {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 200px;
      background: white;
      border: 4px solid #28a745;
      border-radius: 20px;
      text-align: center;
      padding: 20px;
      display: none;
    }
    .popup .circle {
      width: 60px;
      height: 60px;
      background: #28a745;
      border-radius: 50%;
      margin: 0 auto 10px;
      color: white;
      font-size: 40px;
      line-height: 60px;
    }
  </style>
</head>
<body>
  <div class="device">
    <div class="header">
      <span>SCAN BARCODE</span>
      <span class="time-display" id="currentTime"></span>
    </div>
    
    <div class="scan-row">
      <button class="submit-btn" id="submitButton">OK</button>
      <div class="grid-container">
        <input class="cell" type="tel" inputmode="numeric" pattern="[A-Ja-j]*" maxlength="1" id="cell1" placeholder="A">
        <input class="cell" type="tel" inputmode="numeric" pattern="[A-Ja-j]*" maxlength="1" id="cell2" placeholder="B">
        <input class="cell" type="tel" inputmode="numeric" pattern="[A-Ja-j]*" maxlength="1" id="cell3" placeholder="C">
        <input class="cell" type="tel" inputmode="numeric" pattern="[A-Ja-j]*" maxlength="1" id="cell4" placeholder="D">
        <input class="cell" type="tel" inputmode="numeric" pattern="[A-Ja-j]*" maxlength="1" id="cell5" placeholder="E">
        <input class="cell" type="tel" inputmode="numeric" pattern="[A-Ja-j]*" maxlength="1" id="cell6" placeholder="F">
      </div>
    </div>
    
    <div class="content">
      <div class="status-section">
        <div class="field">
          <label>Label ID</label>
          <input type="text" id="labelId" readonly placeholder="---">
        </div>
        <div class="field">
          <label>Status</label>
          <select id="statusSelect">
            <option value="Received">📥 Received</option>
            <option value="Picked Up">📬 Picked Up</option>
            <option value="Depart">🚚 Depart</option>
            <option value="Arrival">📍 Arrival</option>
          </select>
        </div>
        <div class="field">
          <label>📍 Location</label>
          <div class="location-row">
            <input type="text" id="locationField" readonly value="Getting GPS...">
            <button class="gps-btn" id="gpsBtn">📍</button>
          </div>
          <div class="gps-status" id="gpsStatus"></div>
        </div>
        <div class="field">
          <label>📅 Date</label>
          <input type="date" id="etaField">
        </div>
      </div>
      
      <div class="result-section">
        <div class="result-header">
          <div>#</div>
          <div>SCAN</div>
        </div>
        <div id="tableBody"></div>
        <div id="empty-message">No scans yet</div>
      </div>
      
      <div class="status-message" id="messageBox">Ready</div>
    </div>
    
    <div class="popup" id="successPopup">
      <div class="circle">✓</div>
      <p>SAVED</p>
      <div id="popupTime"></div>
    </div>
  </div>

  <script>
    // ===== PRODUCTION READY =====
    var XANO_URL = 'https://x8ki-letl-twmt.n7.xano.io/api:WGx5FQAG/qr_scans';
    
    // ===== SIMPLE TIME =====
    function updateTime() {
      var d = new Date();
      var h = d.getHours().toString().padStart(2,'0');
      var m = d.getMinutes().toString().padStart(2,'0');
      var s = d.getSeconds().toString().padStart(2,'0');
      document.getElementById('currentTime').innerHTML = h + ':' + m + ':' + s;
    }
    updateTime();
    setInterval(updateTime, 1000);
    
    // ===== SIMPLE CELLS - ONE TAP ONLY =====
    var cells = [
      document.getElementById('cell1'),
      document.getElementById('cell2'),
      document.getElementById('cell3'),
      document.getElementById('cell4'),
      document.getElementById('cell5'),
      document.getElementById('cell6')
    ];
    
    // Map letters to numbers
    var map = {
      'A':'1','B':'2','C':'3','D':'4','E':'5',
      'F':'6','G':'7','H':'8','I':'9','J':'0'
    };
    
    // Setup cells - ONE TAP, auto advance
    for (var i = 0; i < cells.length; i++) {
      cells[i].addEventListener('input', function(e) {
        var val = this.value.toUpperCase();
        
        // Only accept A-J
        if (val.match(/[A-J]/)) {
          this.value = val;
          updateLabel();
          
          // Auto move to next cell
          var next = this.nextElementSibling;
          if (next && next.classList.contains('cell')) {
            next.focus();
          }
        } else {
          this.value = '';
        }
      });
      
      // Backspace to previous
      cells[i].addEventListener('keydown', function(e) {
        if (e.key === 'Backspace' && this.value === '') {
          var prev = this.previousElementSibling;
          if (prev && prev.classList.contains('cell')) {
            prev.focus();
          }
        }
      });
      
      // Enter submits
      cells[i].addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
          submitScan();
        }
      });
    }
    
    // Update label with numbers
    function updateLabel() {
      var code = '';
      for (var i = 0; i < cells.length; i++) {
        code += cells[i].value;
      }
      
      if (code.length === 6) {
        var numbers = '';
        for (var j = 0; j < code.length; j++) {
          numbers += map[code[j]] || '';
        }
        document.getElementById('labelId').value = numbers;
      } else {
        document.getElementById('labelId').value = '';
      }
    }
    
    // ===== SIMPLE GPS =====
    function getGPS() {
      if (!navigator.geolocation) {
        document.getElementById('locationField').value = 'GPS not available';
        return;
      }
      
      document.getElementById('gpsStatus').innerHTML = 'Getting GPS...';
      
      navigator.geolocation.getCurrentPosition(
        function(pos) {
          var lat = pos.coords.latitude.toFixed(4);
          var lon = pos.coords.longitude.toFixed(4);
          var acc = Math.round(pos.coords.accuracy);
          
          document.getElementById('locationField').value = lat + ', ' + lon;
          document.getElementById('gpsStatus').innerHTML = '±' + acc + 'm • ' + new Date().toLocaleTimeString();
        },
        function(err) {
          document.getElementById('locationField').value = 'GPS denied';
          document.getElementById('gpsStatus').innerHTML = 'Tap 📍 to retry';
        }
      );
    }
    
    // ===== ADD TO LIST =====
    var counter = 0;
    function addToList(text) {
      counter++;
      var empty = document.getElementById('empty-message');
      if (empty) empty.style.display = 'none';
      
      var row = document.createElement('div');
      row.className = 'result-row';
      row.innerHTML = '<div>' + counter + '</div><div>' + text + '</div>';
      document.getElementById('tableBody').appendChild(row);
    }
    
    // ===== SEND TO XANO =====
    function sendToXano(data) {
      var xhr = new XMLHttpRequest();
      xhr.open('POST', XANO_URL, true);
      xhr.setRequestHeader('Content-Type', 'application/json');
      
      xhr.onload = function() {
        if (xhr.status >= 200 && xhr.status < 300) {
          document.getElementById('messageBox').innerHTML = '✓ Saved to XANO';
          document.getElementById('messageBox').style.color = '#1e6f3f';
          
          // Show popup
          var pop = document.getElementById('successPopup');
          document.getElementById('popupTime').innerHTML = new Date().toLocaleTimeString();
          pop.style.display = 'block';
          setTimeout(function() { pop.style.display = 'none'; }, 1500);
          
          // Add to list
          addToList(data.barcode_letters + ' → ' + data.barcode_numbers);
          
          // Clear cells
          for (var i = 0; i < cells.length; i++) {
            cells[i].value = '';
          }
          cells[0].focus();
          document.getElementById('labelId').value = '';
          
        } else {
          document.getElementById('messageBox').innerHTML = '✗ XANO error ' + xhr.status;
          document.getElementById('messageBox').style.color = '#b52e2e';
        }
      };
      
      xhr.onerror = function() {
        document.getElementById('messageBox').innerHTML = '✗ Network error';
        document.getElementById('messageBox').style.color = '#b52e2e';
      };
      
      xhr.send(JSON.stringify(data));
    }
    
    // ===== SUBMIT =====
    function submitScan() {
      // Get letters
      var letters = '';
      for (var i = 0; i < cells.length; i++) {
        letters += cells[i].value;
      }
      
      // Validate
      if (letters.length !== 6) {
        document.getElementById('messageBox').innerHTML = '✗ Enter 6 letters A-J';
        document.getElementById('messageBox').style.color = '#b52e2e';
        return;
      }
      
      for (var i = 0; i < letters.length; i++) {
        if (!letters[i].match(/[A-J]/)) {
          document.getElementById('messageBox').innerHTML = '✗ Use A-J only';
          document.getElementById('messageBox').style.color = '#b52e2e';
          return;
        }
      }
      
      // Convert to numbers
      var numbers = '';
      for (var i = 0; i < letters.length; i++) {
        numbers += map[letters[i]];
      }
      
      // Prepare data
      var data = {
        barcode_letters: letters,
        barcode_numbers: numbers,
        timestamp: new Date().toISOString(),
        status: document.getElementById('statusSelect').value,
        location: document.getElementById('locationField').value,
        eta: document.getElementById('etaField').value,
        device: 'Android 5.0'
      };
      
      document.getElementById('messageBox').innerHTML = '⏳ Sending...';
      document.getElementById('messageBox').style.color = '#15569B';
      
      sendToXano(data);
    }
    
    // ===== INIT =====
    // Set today's date
    var today = new Date();
    var y = today.getFullYear();
    var m = ('0' + (today.getMonth()+1)).slice(-2);
    var d = ('0' + today.getDate()).slice(-2);
    document.getElementById('etaField').value = y + '-' + m + '-' + d;
    
    // Get GPS on start
    setTimeout(getGPS, 500);
    
    // Button listeners
    document.getElementById('submitButton').onclick = function(e) {
      e.preventDefault();
      submitScan();
    };
    
    document.getElementById('gpsBtn').onclick = function() {
      getGPS();
    };
    
    // Focus first cell
    cells[0].focus();
  </script>
</body>
</html>
