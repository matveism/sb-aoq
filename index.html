<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>A-J XANO SENDER</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; font-family:Arial, sans-serif; padding:5px; }
.phone { max-width:360px; margin:0 auto; background:#2b4b70; padding:10px; border-radius:10px; }
.header { background:#2e5a88; color:white; padding:10px; text-align:center; font-size:18px; border-radius:5px; margin-bottom:10px; }
.hint { background:#0A3A6B; color:white; padding:8px; text-align:center; font-size:14px; border-radius:5px; margin-bottom:10px; }
.hint span { color:#ffcc00; font-weight:bold; display:inline-block; margin:0 5px; }

.cells { display:flex; gap:3px; justify-content:center; margin-bottom:10px; }
.cell { width:48px; height:48px; background:#E2E8D3; border:2px solid #1f3f5c; text-align:center; font-size:28px; font-weight:bold; line-height:48px; border-radius:5px; color:#000; }

.history { background:#A6BEEF; min-height:80px; max-height:120px; margin-bottom:10px; padding:5px; border:2px solid #1f3f5c; overflow-y:auto; border-radius:5px; color:#000; }
.entry { background:#c0d4f5; padding:6px; margin:3px 0; border-radius:3px; font-weight:bold; font-size:14px; }

.keypad { display:table; width:100%; margin-bottom:10px; border-collapse:collapse; }
.keypad-row { display:table-row; }
.key { display:table-cell; background:#3a5f8a; color:white; text-align:center; font-size:24px; font-weight:bold; padding:12px 0; border:1px solid #1f3f5c; width:33.33%; cursor:pointer; }
.key.enter { background:#4CAF50; }
.key.esc { background:#dc3545; }
.key.back { background:#ffc107; color:#000; }

.buttons { display:flex; gap:5px; margin-top:5px; }
.btn { flex:1; background:#7496C4; color:white; padding:12px; text-align:center; font-size:16px; font-weight:bold; border-radius:5px; border:1px solid #1f3f5c; cursor:pointer; }

#statusScreen { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); padding:15px; overflow-y:auto; z-index:100; }
.status-btn { background:#3f6b9c; border:2px solid #ffcc00; padding:15px; margin:8px 0; text-align:center; border-radius:5px; cursor:pointer; color:white; font-size:16px; font-weight:bold; }
.back-btn { background:#dc3545; border-color:#fff; }

#popup { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#2b4b70; border:3px solid #4CAF50; padding:20px; border-radius:10px; text-align:center; color:white; z-index:200; width:260px; }
</style>
</head>
<body>
<div class="phone">
  <div class="header">📦 A-J XANO SENDER</div>
  
  <div class="hint">
    <span>A=1</span> <span>B=2</span> <span>C=3</span> <span>D=4</span> <span>E=5</span>
    <span>F=6</span> <span>G=7</span> <span>H=8</span> <span>I=9</span> <span>J=0</span>
  </div>
  
  <div class="cells">
    <div class="cell" id="cell1"></div>
    <div class="cell" id="cell2"></div>
    <div class="cell" id="cell3"></div>
    <div class="cell" id="cell4"></div>
    <div class="cell" id="cell5"></div>
    <div class="cell" id="cell6"></div>
  </div>
  
  <div class="history" id="history"></div>
  
  <div class="keypad">
    <div class="keypad-row">
      <div class="key" onclick="addLetter('A')">A</div>
      <div class="key" onclick="addLetter('B')">B</div>
      <div class="key" onclick="addLetter('C')">C</div>
    </div>
    <div class="keypad-row">
      <div class="key" onclick="addLetter('D')">D</div>
      <div class="key" onclick="addLetter('E')">E</div>
      <div class="key" onclick="addLetter('F')">F</div>
    </div>
    <div class="keypad-row">
      <div class="key" onclick="addLetter('G')">G</div>
      <div class="key" onclick="addLetter('H')">H</div>
      <div class="key" onclick="addLetter('I')">I</div>
    </div>
    <div class="keypad-row">
      <div class="key" onclick="addLetter('J')">J</div>
      <div class="key back" onclick="backspace()">⌫</div>
      <div class="key enter" onclick="showStatus()">ENT</div>
    </div>
  </div>
  
  <div class="buttons">
    <div class="btn" onclick="clearCells()">CLEAR</div>
    <div class="btn" onclick="clearAll()">CLEAR ALL</div>
  </div>
  
  <div id="statusScreen">
    <div class="status-btn" onclick="sendToXano('Data Received')">📥 DATA RECEIVED</div>
    <div class="status-btn" onclick="sendToXano('Picked Up')">📬 PICKED UP</div>
    <div class="status-btn" onclick="sendToXano('Depart Post Office')">🚚 DEPART</div>
    <div class="status-btn" onclick="sendToXano('Arrival Scan')">📍 ARRIVAL</div>
    <div class="status-btn" onclick="sendToXano('Local Scan')">🏙️ LOCAL</div>
    <div class="status-btn" onclick="sendToXano('Out For Delivery')">🛵 OUT</div>
    <div class="status-btn" onclick="sendToXano('Delivered')">✅ DELIVERED</div>
    <div class="status-btn back-btn" onclick="hideStatus()">⬅️ BACK</div>
  </div>
  
  <div id="popup">
    <div style="font-size:48px; color:#4CAF50; margin-bottom:10px;" id="popupIcon">✓</div>
    <p id="popupMessage">SENDING...</p>
  </div>
</div>

<script>
// Cell elements
var cell1 = document.getElementById('cell1');
var cell2 = document.getElementById('cell2');
var cell3 = document.getElementById('cell3');
var cell4 = document.getElementById('cell4');
var cell5 = document.getElementById('cell5');
var cell6 = document.getElementById('cell6');
var cells = [cell1, cell2, cell3, cell4, cell5, cell6];

var savedCodes = [];
var codeCount = 0;

function addLetter(letter) {
  for (var i = 0; i < cells.length; i++) {
    if (cells[i].innerHTML === '') {
      cells[i].innerHTML = letter;
      break;
    }
  }
  checkComplete();
}

function backspace() {
  for (var i = cells.length - 1; i >= 0; i--) {
    if (cells[i].innerHTML !== '') {
      cells[i].innerHTML = '';
      break;
    }
  }
}

function clearCells() {
  for (var i = 0; i < cells.length; i++) {
    cells[i].innerHTML = '';
  }
}

function clearAll() {
  savedCodes = [];
  codeCount = 0;
  document.getElementById('history').innerHTML = '';
  clearCells();
}

function checkComplete() {
  var filled = true;
  var letters = '';
  
  for (var i = 0; i < cells.length; i++) {
    if (cells[i].innerHTML === '') {
      filled = false;
    } else {
      letters += cells[i].innerHTML;
    }
  }
  
  if (filled && letters.length === 6) {
    var numbers = '';
    for (var i = 0; i < letters.length; i++) {
      var ch = letters.charAt(i);
      if (ch === 'A') numbers += '1';
      else if (ch === 'B') numbers += '2';
      else if (ch === 'C') numbers += '3';
      else if (ch === 'D') numbers += '4';
      else if (ch === 'E') numbers += '5';
      else if (ch === 'F') numbers += '6';
      else if (ch === 'G') numbers += '7';
      else if (ch === 'H') numbers += '8';
      else if (ch === 'I') numbers += '9';
      else if (ch === 'J') numbers += '0';
    }
    
    codeCount++;
    savedCodes.push({
      letters: letters,
      numbers: numbers
    });
    
    var historyDiv = document.getElementById('history');
    var entry = document.createElement('div');
    entry.className = 'entry';
    entry.innerHTML = '#' + codeCount + ': ' + letters + ' → ' + numbers;
    historyDiv.appendChild(entry);
    historyDiv.scrollTop = historyDiv.scrollHeight;
    clearCells();
  }
}

function showStatus() {
  if (savedCodes.length === 0) {
    alert('Please enter a code first');
    return;
  }
  document.getElementById('statusScreen').style.display = 'block';
}

function hideStatus() {
  document.getElementById('statusScreen').style.display = 'none';
}

function sendToXano(status) {
  if (savedCodes.length === 0) {
    hideStatus();
    return;
  }
  
  var popup = document.getElementById('popup');
  var popupMsg = document.getElementById('popupMessage');
  var popupIcon = document.getElementById('popupIcon');
  
  popupIcon.innerHTML = '⏳';
  popupIcon.style.color = '#ffcc00';
  popupMsg.innerHTML = 'CONNECTING...';
  popup.style.display = 'block';
  
  var sentCount = 0;
  var failedCount = 0;
  var totalCodes = savedCodes.length;
  var timeoutId = null;
  
  function checkComplete() {
    if (sentCount + failedCount === totalCodes) {
      if (failedCount === 0) {
        popupIcon.innerHTML = '✓';
        popupIcon.style.color = '#4CAF50';
        popupMsg.innerHTML = '✅ ALL ' + totalCodes + ' CODES SENT!';
        savedCodes = [];
        codeCount = 0;
        document.getElementById('history').innerHTML = '';
      } else {
        popupIcon.innerHTML = '⚠️';
        popupIcon.style.color = '#ffcc00';
        popupMsg.innerHTML = '⚠️ ' + sentCount + ' SENT, ' + failedCount + ' FAILED';
      }
      
      setTimeout(function() {
        popup.style.display = 'none';
        hideStatus();
      }, 3000);
    }
  }
  
  for (var i = 0; i < savedCodes.length; i++) {
    var code = savedCodes[i];
    
    var now = new Date();
    var year = now.getFullYear();
    var month = now.getMonth() + 1;
    if (month < 10) month = '0' + month;
    var day = now.getDate();
    if (day < 10) day = '0' + day;
    var dateStr = year + '-' + month + '-' + day;
    
    var hours = now.getHours();
    if (hours < 10) hours = '0' + hours;
    var minutes = now.getMinutes();
    if (minutes < 10) minutes = '0' + minutes;
    var seconds = now.getSeconds();
    if (seconds < 10) seconds = '0' + seconds;
    var timeStr = hours + ':' + minutes + ':' + seconds;
    
    var timestamp = Math.floor(now.getTime() / 1000);
    
    var etaDate = new Date(now);
    etaDate.setDate(etaDate.getDate() + 1);
    var etaYear = etaDate.getFullYear();
    var etaMonth = etaDate.getMonth() + 1;
    if (etaMonth < 10) etaMonth = '0' + etaMonth;
    var etaDay = etaDate.getDate();
    if (etaDay < 10) etaDay = '0' + etaDay;
    var etaStr = etaYear + '-' + etaMonth + '-' + etaDay;
    
    var data = {
      label_id: code.numbers,
      barcode_type: 'manual',
      status: status,
      timestamp: timestamp,
      time: timeStr,
      date: dateStr,
      location: 'Unknown',
      eta: etaStr
    };
    
    console.log('SENDING:', JSON.stringify(data));
    
    var xhr = new XMLHttpRequest();
    
    // Set timeout to prevent hanging
    xhr.timeout = 10000; // 10 seconds
    
    xhr.ontimeout = function() {
      console.log('Request timeout');
      failedCount++;
      checkComplete();
    };
    
    xhr.onreadystatechange = function() {
      if (xhr.readyState === 4) {
        if (xhr.status === 200 || xhr.status === 201 || xhr.status === 204) {
          sentCount++;
          console.log('✓ SENT SUCCESSFULLY');
        } else {
          failedCount++;
          console.log('✗ FAILED:', xhr.status, xhr.responseText);
        }
        checkComplete();
      }
    };
    
    xhr.onerror = function() {
      console.log('Network error');
      failedCount++;
      checkComplete();
    };
    
    xhr.open('POST', 'https://x8ki-letl-twmt.n7.xano.io/api:WGx5FQAG/qr_scans', true);
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.send(JSON.stringify(data));
  }
}

// Make functions global
window.addLetter = addLetter;
window.backspace = backspace;
window.clearCells = clearCells;
window.clearAll = clearAll;
window.showStatus = showStatus;
window.hideStatus = hideStatus;
window.sendToXano = sendToXano;

console.log('App ready with timeout handling');
</script>
</body>
</html>
